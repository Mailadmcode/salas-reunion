<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Ocupación de Salas</title>

  <style>
    /* ==========================================================
       ESTILOS GENERALES
       Compatible con WebKit antiguo: sin flex ni grid.
       Usa tablas y floats.
    ========================================================== */

    * {
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      background-color: #F0F2F5;
      color: #1A1A2E;
      height: 100%;
      overflow: hidden;
    }

    /* ==========================================================
       ENCABEZADO
    ========================================================== */
    #encabezado {
      background-color: #1A1A2E;
      color: #FFFFFF;
      padding: 10px 18px;
      overflow: hidden;
      height: 52px;
    }

    #encabezado h1 {
      font-size: 20px;
      font-weight: bold;
      float: left;
      line-height: 32px;
      letter-spacing: 1px;
    }

    #info-actualizacion {
      float: right;
      font-size: 11px;
      color: #A0A8C0;
      line-height: 32px;
      text-align: right;
    }

    #estado-carga {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #4CAF50;
      margin-right: 6px;
      vertical-align: middle;
    }

    #estado-carga.cargando {
      background-color: #FFC107;
    }

    #estado-carga.error {
      background-color: #F44336;
    }

    /* ==========================================================
       CONTENEDOR PRINCIPAL (panel izquierdo + panel derecho)
    ========================================================== */
    #contenedor-principal {
      overflow: hidden;
      /* Altura total menos el encabezado (52px) */
      height: calc(100vh - 52px);
    }

    /* ==========================================================
       PANEL IZQUIERDO — Plano de salas (20%)
    ========================================================== */
    #panel-izquierdo {
      float: left;
      width: 20%;
      height: 100%;
      background-color: #FFFFFF;
      border-right: 3px solid #1A1A2E;
      overflow: hidden;
      padding: 12px;
    }

    #panel-izquierdo h2 {
      font-size: 13px;
      color: #1A1A2E;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      border-bottom: 2px solid #E84545;
      padding-bottom: 6px;
    }

    #panel-izquierdo img {
      width: 100%;
      display: block;
      border: 1px solid #CCC;
    }

    #panel-izquierdo p.plano-placeholder {
      background-color: #F0F2F5;
      border: 2px dashed #BBBBBB;
      color: #888;
      font-size: 12px;
      text-align: center;
      padding: 30px 10px;
      margin-top: 8px;
    }

    /* ==========================================================
       PANEL DERECHO — Tabla de ocupación (80%)
    ========================================================== */
    #panel-derecho {
      float: left;
      width: 80%;
      height: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 12px;
    }

    /* Wrapper que ocupa todo el alto del panel derecho */
    #contenido-tabla {
      height: 100%;
    }

    /* ==========================================================
       TABLA DE SALAS
    ========================================================== */
    #tabla-ocupacion {
      width: 100%;
      height: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    /* Encabezado de la tabla */
    #tabla-ocupacion thead tr {
      background-color: #1A1A2E;
      color: #FFFFFF;
    }

    #tabla-ocupacion thead th {
      padding: 10px 8px;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
      border: 1px solid #2E2E4E;
      letter-spacing: 0.5px;
    }

    /* Columna de nombre de sala */
    #tabla-ocupacion thead th:first-child {
      text-align: left;
      background-color: #0D0D1A;
      width: 160px;
    }

    /* Filas de salas — altura uniforme repartida */
    #tabla-ocupacion tbody {
      height: 100%;
    }

    #tabla-ocupacion tbody tr {
      background-color: #FFFFFF;
      height: 1%;  /* truco: con height:100% en tbody, 1% se reparte equitativamente */
    }

    #tabla-ocupacion tbody tr:nth-child(even) {
      background-color: #F7F8FA;
    }

    /* Celda nombre de sala */
    #tabla-ocupacion tbody td.nombre-sala {
      font-weight: bold;
      font-size: 13px;
      color: #1A1A2E;
      padding: 10px 8px;
      border: 1px solid #DCDDE1;
      vertical-align: middle;
      background-color: #EAECF2;
      width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Celdas de días */
    #tabla-ocupacion tbody td.celda-dia {
      padding: 6px 8px;
      border: 1px solid #DCDDE1;
      vertical-align: middle;
      min-width: 160px;
    }

    /* Sin eventos */
    .sin-eventos {
      color: #BBBBBB;
      font-size: 11px;
      text-align: center;
      padding: 14px 0;
      font-style: italic;
    }

    /* Bloque de evento individual */
    .bloque-evento {
      background-color: #E8F4FD;
      border-left: 3px solid #2196F3;
      border-radius: 2px;
      padding: 5px 8px;
      margin-bottom: 4px;
      font-size: 13px;
      line-height: 1.4;
      overflow: hidden;
    }

    .bloque-evento:last-child {
      margin-bottom: 0;
    }

    /* Hora e organizador en la misma línea */
    .evento-hora {
      font-weight: bold;
      color: #1565C0;
      font-size: 13px;
      display: inline;
    }

    .evento-organizador {
      color: #444;
      font-size: 13px;
      display: inline;
      margin-left: 5px;
    }

    /* Error en celda */
    .celda-error {
      color: #C62828;
      font-size: 11px;
      font-style: italic;
      padding: 6px;
    }

    /* ==========================================================
       DÍA ACTUAL DESTACADO
    ========================================================== */
    #tabla-ocupacion thead th.dia-hoy {
      background-color: #E84545;
    }

    #tabla-ocupacion tbody td.celda-hoy {
      background-color: #FFF5F5;
    }

    .bloque-evento.evento-hoy {
      background-color: #FDECEA;
      border-left-color: #E84545;
    }

    .evento-hora.hora-hoy {
      color: #C62828;
    }

    /* ==========================================================
       MENSAJE DE CARGA Y ERROR GLOBAL
    ========================================================== */
    #mensaje-global {
      text-align: center;
      padding: 40px;
      font-size: 16px;
      color: #888;
    }

    /* ==========================================================
       CLEARFIX
    ========================================================== */
    .clearfix:after {
      content: "";
      display: table;
      clear: both;
    }
  </style>
</head>
<body>

  <!-- ENCABEZADO -->
  <div id="encabezado">
    <h1>&#128197; Ocupación de Salas — Semana Actual</h1>
    <div id="info-actualizacion">
      <span id="estado-carga"></span>
      <span id="texto-actualizacion">Cargando...</span>
    </div>
  </div>

  <!-- CONTENEDOR PRINCIPAL -->
  <div id="contenedor-principal" class="clearfix">

    <!-- PANEL IZQUIERDO: Plano -->
    <div id="panel-izquierdo">
      <h2>Plano de Salas</h2>
      <!--
        Reemplaza "plano.png" por la ruta real de tu imagen.
        El archivo debe estar en la misma carpeta que este HTML
        dentro del reproductor MagicInfo.
        Si no tienes plano, puedes eliminar esta etiqueta img.
      -->
      <img src="plano.png" alt="Plano de salas"
           onerror="this.style.display='none'; document.getElementById('plano-placeholder').style.display='block';">
      <p class="plano-placeholder" id="plano-placeholder" style="display:none;">
        Agrega el archivo<br><strong>plano.png</strong><br>en la misma carpeta
      </p>
    </div>

    <!-- PANEL DERECHO: Tabla de ocupación -->
    <div id="panel-derecho">
      <div id="contenido-tabla">
        <div id="mensaje-global">Cargando datos de salas...</div>
      </div>
    </div>

  </div><!-- fin contenedor-principal -->


  <script>
    /* ==========================================================
       CONFIGURACIÓN PRINCIPAL
       ¡IMPORTANTE! Reemplaza la URL por la de tu Apps Script
       publicado como Web App.
    ========================================================== */
    var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyiqhNOkcDySimG5rx7cb8BBveqn7E7vEt1Jj06IKR3pjFgriDo6CsGRxYV1MzfWD50eA/exec";

    /* Intervalo de actualización en milisegundos (5 minutos) */
    var INTERVALO_MS = 5 * 60 * 1000;

    /* ==========================================================
       UTILIDADES DE FECHA (sin librerías externas)
    ========================================================== */

    /* Retorna "YYYY-MM-DD" para la fecha actual en Chile.
       Nota: en MagicInfo el navegador puede tener la zona
       del sistema; si el reproductor está en Chile, new Date()
       ya será hora local. */
    function obtenerFechaKeyHoy() {
      var hoy = new Date();
      var y = hoy.getFullYear();
      var m = hoy.getMonth() + 1;
      var d = hoy.getDate();
      return y + "-" + (m < 10 ? "0" + m : m) + "-" + (d < 10 ? "0" + d : d);
    }

    /* Formatea hora actual como "HH:MM:SS DD/MM/YYYY" */
    function formatearAhora() {
      var d = new Date();
      var hh = d.getHours();   var mm = d.getMinutes();   var ss = d.getSeconds();
      var dd = d.getDate();    var mo = d.getMonth() + 1; var yy = d.getFullYear();
      function p(n) { return n < 10 ? "0" + n : "" + n; }
      return p(hh) + ":" + p(mm) + ":" + p(ss) + "  " + p(dd) + "/" + p(mo) + "/" + yy;
    }

    /* ==========================================================
       ESTADO GLOBAL
    ========================================================== */
    var estadoCarga    = document.getElementById("estado-carga");
    var textoActual    = document.getElementById("texto-actualizacion");
    var contenidoTabla = document.getElementById("contenido-tabla");

    /* ==========================================================
       PETICIÓN A APPS SCRIPT (XMLHttpRequest ES5)
    ========================================================== */
    function cargarDatos() {
      /* Indicar que está cargando */
      estadoCarga.className = "cargando";
      textoActual.innerHTML = "Actualizando...";

      var xhr = new XMLHttpRequest();
      /* Agregar timestamp para evitar caché */
      var url = APPS_SCRIPT_URL + "?t=" + new Date().getTime();

      xhr.open("GET", url, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) { return; }

        if (xhr.status === 200) {
          try {
            var respuesta = JSON.parse(xhr.responseText);
            if (respuesta.ok) {
              renderizarTabla(respuesta.datos);
              estadoCarga.className = "";
              textoActual.innerHTML = "Actualizado: " + formatearAhora();
            } else {
              mostrarErrorGlobal("Error del servidor: " + (respuesta.error || "desconocido"));
            }
          } catch (e) {
            mostrarErrorGlobal("Error al procesar respuesta: " + e.message);
          }
        } else {
          mostrarErrorGlobal("Error de red (HTTP " + xhr.status + ")");
        }
      };

      xhr.onerror = function() {
        mostrarErrorGlobal("No se pudo conectar con el servidor.");
      };

      xhr.send();
    }

    /* ==========================================================
       CALCULAR TAMAÑO DE BLOQUE SEGÚN MÁXIMO DE EVENTOS POR FILA
       Recibe el número máximo de eventos que tiene cualquier
       celda de esa fila (sala) y devuelve estilos inline
       para que todo quepa sin desbordar.
    ========================================================== */
    function calcularEstilosBloque(maxEventos) {
      /* Valores base (1 evento) → valores mínimos (10+ eventos) */
      var fontSize, padding, marginB, iconSize;

      if (maxEventos <= 1) {
        fontSize = 14; padding = "6px 8px"; marginB = 5; iconSize = 14;
      } else if (maxEventos === 2) {
        fontSize = 13; padding = "5px 7px"; marginB = 4; iconSize = 13;
      } else if (maxEventos === 3) {
        fontSize = 12; padding = "4px 7px"; marginB = 4; iconSize = 12;
      } else if (maxEventos === 4) {
        fontSize = 12; padding = "3px 6px"; marginB = 3; iconSize = 12;
      } else if (maxEventos === 5) {
        fontSize = 11; padding = "3px 6px"; marginB = 3; iconSize = 11;
      } else if (maxEventos === 6) {
        fontSize = 11; padding = "2px 5px"; marginB = 2; iconSize = 11;
      } else if (maxEventos === 7) {
        fontSize = 10; padding = "2px 5px"; marginB = 2; iconSize = 10;
      } else if (maxEventos === 8) {
        fontSize = 10; padding = "2px 4px"; marginB = 2; iconSize = 10;
      } else if (maxEventos === 9) {
        fontSize = 9;  padding = "1px 4px"; marginB = 1; iconSize = 9;
      } else {
        /* 10 o más */
        fontSize = 9;  padding = "1px 3px"; marginB = 1; iconSize = 9;
      }

      return {
        bloque: "padding:" + padding + ";margin-bottom:" + marginB + "px;font-size:" + fontSize + "px;",
        texto:  "font-size:" + fontSize + "px;",
        ultimo: "padding:" + padding + ";margin-bottom:0;font-size:" + fontSize + "px;"
      };
    }

    /* ==========================================================
       RENDERIZAR TABLA
    ========================================================== */
    function renderizarTabla(datos) {
      var hoyKey = obtenerFechaKeyHoy();
      var dias   = datos.dias;
      var salas  = datos.salas;

      /* Construir HTML de la tabla como string (ES5) */
      var html = '<table id="tabla-ocupacion">';

      /* --- ENCABEZADO --- */
      html += "<thead><tr>";
      html += '<th>Sala</th>';
      for (var d = 0; d < dias.length; d++) {
        var claseHoy = (dias[d].key === hoyKey) ? ' class="dia-hoy"' : '';
        html += "<th" + claseHoy + ">" + escapeHtml(dias[d].label) + "</th>";
      }
      html += "</tr></thead>";

      /* --- CUERPO --- */
      html += "<tbody>";
      for (var s = 0; s < salas.length; s++) {
        var sala = salas[s];

        /* Calcular máximo de eventos en cualquier celda de esta fila (sala).
           Esto define el tamaño de bloque para TODA la fila,
           así todos los días tienen bloques del mismo tamaño. */
        var maxEventosFila = 0;
        if (!sala.error) {
          for (var dk = 0; dk < dias.length; dk++) {
            var evsDia = sala.eventos[dias[dk].key] || [];
            if (evsDia.length > maxEventosFila) {
              maxEventosFila = evsDia.length;
            }
          }
        }
        var estilos = calcularEstilosBloque(maxEventosFila);

        html += "<tr>";
        html += '<td class="nombre-sala">' + escapeHtml(sala.nombre) + "</td>";

        for (var dd = 0; dd < dias.length; dd++) {
          var diaKey   = dias[dd].key;
          var esHoy    = (diaKey === hoyKey);
          var claseCelda = "celda-dia" + (esHoy ? " celda-hoy" : "");

          html += '<td class="' + claseCelda + '">';

          if (sala.error) {
            html += '<span class="celda-error">&#9888; ' + escapeHtml(sala.error) + "</span>";
          } else {
            var eventos = sala.eventos[diaKey] || [];
            if (eventos.length === 0) {
              html += '<div class="sin-eventos">&#10003; Libre</div>';
            } else {
              for (var ev = 0; ev < eventos.length; ev++) {
                var evento    = eventos[ev];
                var esUltimo  = (ev === eventos.length - 1);
                var claseEvento = "bloque-evento" + (esHoy ? " evento-hoy" : "");
                var claseHora   = "evento-hora"   + (esHoy ? " hora-hoy"   : "");
                var estiloBloque = esUltimo ? estilos.ultimo : estilos.bloque;

                /* Abreviar organizador: solo la parte antes del @ */
                var nombreCorto = "";
                if (evento.organizador) {
                  var partes = evento.organizador.split("@");
                  nombreCorto = partes[0];
                }

                html += '<div class="' + claseEvento + '" style="' + estiloBloque + '">';
                html += '<span class="' + claseHora + '" style="' + estilos.texto + '">';
                html += escapeHtml(evento.inicio) + "–" + escapeHtml(evento.fin);
                html += "</span>";
                if (nombreCorto) {
                  html += '<span class="evento-organizador" style="' + estilos.texto + '">&#128100; ' + escapeHtml(nombreCorto) + "</span>";
                }
                html += "</div>";
              }
            }
          }

          html += "</td>";
        }

        html += "</tr>";
      }
      html += "</tbody></table>";

      contenidoTabla.innerHTML = html;
    }

    /* ==========================================================
       MOSTRAR ERROR GLOBAL
    ========================================================== */
    function mostrarErrorGlobal(mensaje) {
      estadoCarga.className = "error";
      textoActual.innerHTML = "Error — reintentando en 5 min";
      contenidoTabla.innerHTML =
        '<div id="mensaje-global" style="color:#C62828;">&#9888; ' +
        escapeHtml(mensaje) +
        '<br><span style="font-size:13px;color:#888;">Se reintentará automáticamente.</span></div>';
    }

    /* ==========================================================
       ESCAPE HTML (seguridad básica)
    ========================================================== */
    function escapeHtml(texto) {
      if (!texto) { return ""; }
      return String(texto)
        .replace(/&/g,  "&amp;")
        .replace(/</g,  "&lt;")
        .replace(/>/g,  "&gt;")
        .replace(/"/g,  "&quot;")
        .replace(/'/g,  "&#39;");
    }

    /* ==========================================================
       INICIO Y ACTUALIZACIÓN AUTOMÁTICA
    ========================================================== */

    /* Carga inicial al abrir la página */
    cargarDatos();

    /* Recarga automática cada 5 minutos */
    setInterval(cargarDatos, INTERVALO_MS);

  </script>
</body>
</html>
