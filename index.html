<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <title>Salas – Prodalam</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%; overflow:hidden;
      background:#EEF2FB;
      font-family:'Barlow', Arial, sans-serif;
    }

    #page-wrap {
      display:flex;
      flex-direction:column;
      width:100%;
      height:100vh;
    }

    /* ══ HEADER ══ */
    #header {
      flex:0 0 80px;
      width:100%;
      background:#fff;
      border-bottom:6px solid #FF7D10;
      display:flex;
      align-items:stretch;
    }
    .h-logo-zone {
      width:18%;
      display:flex;
      align-items:center;
      padding:0 16px;
      border-right:2px solid #E0E8F4;
      gap:12px;
    }
    #logo-img { height:44px; display:block; }
    .h-sub {
      font-size:11px; letter-spacing:2px; text-transform:uppercase;
      color:#0047CC; font-weight:800;
      font-family:'Barlow Condensed', sans-serif;
      border-left:3px solid #FF7D10; padding-left:8px;
      white-space:nowrap;
    }
    .h-legend-zone {
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:32px;
    }
    .leg-item { display:flex; align-items:center; gap:8px; }
    .leg-dot { width:20px; height:20px; border-radius:50%; flex-shrink:0; }
    .leg-txt {
      font-size:20px; font-weight:800; color:#1A2E6E;
      font-family:'Barlow Condensed', sans-serif;
    }
    .h-clock-zone {
      width:32%;
      display:flex;
      flex-direction:column;
      justify-content:center;
      padding:0 20px;
      border-left:2px solid #E0E8F4;
    }
    #clk-meta { font-size:11px; color:#5572A0; font-family:'Barlow Condensed', sans-serif; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
    #clk-time { font-size:60px; font-weight:900; letter-spacing:3px; color:#0047CC; line-height:1; font-family:'Barlow Condensed', sans-serif; }
    #clk-date { font-size:14px; color:#1A2E6E; font-family:'Barlow Condensed', sans-serif; font-weight:700; text-transform:uppercase; margin-top:2px; }

    /* ══ TABLA ══ */
    #tabla-wrap {
      flex:1 1 0;
      min-height:0;
      overflow:hidden;
      background:#fff;
      border:2px solid #D0DCEE;
      margin:5px 8px 8px 8px;
    }

    #grid {
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    #grid thead td {
      background:#0047CC;
      border-right:1px solid rgba(255,255,255,0.15);
      border-bottom:4px solid #FF7D10;
      text-align:center;
      vertical-align:middle;
      padding:4px 0;
      height:58px;
    }
    #grid thead td.corner {
      background:#003399;
      font-size:20px; font-weight:900; letter-spacing:4px;
      text-transform:uppercase; color:#fff;
      font-family:'Barlow Condensed', sans-serif;
      width:155px;
    }
    #grid thead td.day-hd.hoy { background:rgba(255,125,16,0.35); }
    .dh-nom { font-size:28px; font-weight:900; text-transform:uppercase; color:#fff; display:block; line-height:1; font-family:'Barlow Condensed', sans-serif; }
    .dh-fec { font-size:14px; color:rgba(255,255,255,0.85); display:block; font-family:'Barlow Condensed', sans-serif; font-weight:600; margin-top:1px; }
    .hoy-badge { display:inline-block; background:#FF7D10; color:#fff; font-size:11px; font-weight:900; padding:2px 7px; border-radius:4px; margin-top:2px; font-family:'Barlow Condensed', sans-serif; }

    #grid tbody tr { border-bottom:2px solid #E0E8F4; }
    #grid tbody tr:last-child { border-bottom:none; }

    td.sala-lbl {
      background:#F4F7FF;
      border-right:3px solid #D8E4F4;
      vertical-align:middle;
      padding:6px 10px;
      width:155px;
    }
    .sala-nombre { font-size:26px; font-weight:800; color:#0A1F5C; font-family:'Barlow Condensed', sans-serif; line-height:1; display:block; }
    .sala-estado { font-size:13px; font-weight:700; display:block; margin-top:3px; }

    td.day-cell {
      background:#fff;
      border-right:1px solid #E8EEF8;
      vertical-align:top;
      padding:4px 5px;
      overflow:hidden;
    }
    td.day-cell.hoy { background:#F0F6FF; border-left:4px solid #FF7D10; }
    /* celda vacía: centrar texto verticalmente */
    td.day-cell.vacia { vertical-align:middle; text-align:center; }

    .ev-container { display:flex; flex-direction:column; gap:4px; height:100%; }

    .ev-bloque {
      flex:1;
      border-radius:7px;
      padding:6px 10px;
      border-left:6px solid transparent;
      display:flex;
      flex-direction:column;
      justify-content:center;
      overflow:hidden;
      min-height:0;
    }
    .ev-ocup    { background:#FFF3EA; border-color:#FF7D10; }
    .ev-pronto  { background:#EBF0FF; border-color:#0047CC; }
    .ev-proxima { background:#EAF7EE; border-color:#1CB85B; }

    .ev-hora { font-size:22px; font-weight:900; display:block; white-space:nowrap; font-family:'Barlow Condensed', sans-serif; line-height:1.2; }
    .ev-user { font-size:18px; font-weight:700; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.2; }
    .ev-ocup .ev-hora, .ev-ocup .ev-user       { color:#CC5000; }
    .ev-pronto .ev-hora, .ev-pronto .ev-user   { color:#003099; }
    .ev-proxima .ev-hora, .ev-proxima .ev-user { color:#0A6B30; }

    .libre-txt { font-size:13px; color:#C8D4E8; font-style:italic; }

    #overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#EEF2FB; z-index:999; text-align:center; }
    .ov-inner { display:inline-block; margin-top:40%; }
    .spinner { width:55px; height:55px; border:6px solid #C8D8F0; border-top:6px solid #0047CC; border-radius:50%; display:inline-block; }
    .ov-txt { display:block; margin-top:15px; font-size:22px; color:#0047CC; font-weight:800; font-family:'Barlow Condensed', sans-serif; letter-spacing:3px; text-transform:uppercase; }
  </style>
</head>
<body>

<div id="overlay"><div class="ov-inner"><div class="spinner" id="spinner"></div><span class="ov-txt">Cargando...</span></div></div>

<div id="page-wrap">

  <div id="header">
    <div class="h-logo-zone">
      <img id="logo-img" src="https://i.imgur.com/fXLdGez.png"
           onerror="this.style.display='none';document.getElementById('logo-txt').style.display='block';"
           alt="Prodalam"/>
      <span id="logo-txt" style="display:none;font-size:26px;font-weight:900;color:#0047CC;font-family:'Barlow Condensed',sans-serif;">Prodalam</span>
      <span class="h-sub">Tiempo real</span>
    </div>
    <div class="h-legend-zone">
      <div class="leg-item"><span class="leg-dot" style="background:#1CB85B"></span><span class="leg-txt">Disponible</span></div>
      <div class="leg-item"><span class="leg-dot" style="background:#0047CC"></span><span class="leg-txt">Próxima &lt;30 min</span></div>
      <div class="leg-item"><span class="leg-dot" style="background:#FF7D10"></span><span class="leg-txt">Ocupada ahora</span></div>
    </div>
    <div class="h-clock-zone">
      <span id="clk-meta"></span>
      <span id="clk-time">--:--</span>
      <span id="clk-date"></span>
    </div>
  </div>

  <div id="tabla-wrap">
    <table id="grid">
      <thead><tr id="thead-row"><td class="corner">SALA</td></tr></thead>
      <tbody id="grid-body"></tbody>
    </table>
  </div>

</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyn7VSKT-IFULCC2bPx2SlK2W2GlaXQNoKZ44WLQq5Ev94ESTC45vlJgcpmPgaN_IYQ/exec";

var DIAS_FULL = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
var DIAS_CORT = ["DOM","LUN","MAR","MIÉ","JUE","VIE","SÁB"];
var MESES     = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
var SALAS     = ["Sala Villarica","Sala 6","Sala 5","Sala 4","Sala 3","Sala 2","Sala 1"];
var SHORT     = {"Sala 1":"Sala 1","Sala 2":"Sala 2","Sala 3":"Sala 3","Sala 4":"Sala 4","Sala 5":"Sala 5","Sala 6":"Sala 6","Sala Villarica":"Villarica"};
var COLORES   = {"Sala 1":"#AB47BC","Sala 2":"#29B6F6","Sala 3":"#FF5722","Sala 4":"#26C6A6","Sala 5":"#C6D000","Sala 6":"#00BCD4","Sala Villarica":"#2196F3"};

/* Altura mínima para filas sin eventos (px) */
var ALTO_VACIA  = 26;
/* Altura por cada evento en la fila (px) — ajusta este valor para hacer tarjetas más/menos grandes */
var ALTO_EVENTO = 82;

var lastData = null;

function pad(n){ return n<10?"0"+n:""+n; }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtH(iso){ var d=new Date(iso); return pad(d.getHours())+":"+pad(d.getMinutes()); }
function soloFecha(d){ var x=new Date(d); x.setHours(0,0,0,0); return x.getTime(); }

function obtenerLunes(f){
  var d=new Date(f), dow=d.getDay();
  d.setDate(d.getDate()+(dow===0?-6:1-dow));
  d.setHours(0,0,0,0); return d;
}
function obtenerDias(ahora){
  var hoy=new Date(ahora); hoy.setHours(0,0,0,0);
  var dow=hoy.getDay(), lun=new Date(hoy);
  if(dow===0)      lun.setDate(hoy.getDate()+1);
  else if(dow===6) lun.setDate(hoy.getDate()+2);
  else             lun.setDate(hoy.getDate()-(dow-1));
  var dias=[];
  for(var i=0;i<5;i++){ var d=new Date(lun); d.setDate(lun.getDate()+i); dias.push(d); }
  return dias;
}

/* — Spinner — */
var spinAngle=0, spinTimer=null;
function startSpinner(){
  var el=document.getElementById("spinner");
  spinTimer=setInterval(function(){
    spinAngle=(spinAngle+15)%360;
    if(el) el.style.transform="rotate("+spinAngle+"deg)";
  },50);
}
function stopSpinner(){
  if(spinTimer){ clearInterval(spinTimer); spinTimer=null; }
  var ov=document.getElementById("overlay"); if(ov) ov.style.display="none";
}
startSpinner();

/* — Reloj — */
function tickClock(){
  var n=new Date();
  document.getElementById("clk-time").textContent=pad(n.getHours())+":"+pad(n.getMinutes());
  document.getElementById("clk-date").textContent=DIAS_FULL[n.getDay()]+" "+pad(n.getDate())+" "+MESES[n.getMonth()]+" "+n.getFullYear();
  var lun=obtenerLunes(n), vie=new Date(lun); vie.setDate(lun.getDate()+4);
  document.getElementById("clk-meta").textContent=
    "Semana "+pad(lun.getDate())+"/"+pad(lun.getMonth()+1)+" – "+pad(vie.getDate())+"/"+pad(vie.getMonth()+1)
    +"  ·  Act. "+pad(n.getHours())+":"+pad(n.getMinutes())+":"+pad(n.getSeconds());
  if(n.getSeconds()===0 && lastData) renderGrid(lastData);
}
setInterval(tickClock,1000); tickClock();

/* ════════════════════════════════════════════════
   AJUSTE DE ALTURAS
   Regla simple y robusta:
     • fila sin eventos  → ALTO_VACIA px (fijo)
     • fila con N eventos → N × ALTO_EVENTO px (base)
   Si la suma base cabe en el espacio disponible,
   el sobrante se reparte entre filas-con-eventos
   en proporción a su número de eventos,
   para que siempre llenen la pantalla.
════════════════════════════════════════════════ */
function ajustarAltos(){
  var wrap  = document.getElementById("tabla-wrap");
  var thr   = document.getElementById("thead-row");
  var tbody = document.getElementById("grid-body");
  if(!wrap||!thr||!tbody) return;

  var bodyH = wrap.clientHeight - (thr.offsetHeight||58) - 2;
  if(bodyH<50) return;

  var rows = tbody.querySelectorAll("tr");
  if(!rows.length) return;

  /* contar máximo de eventos por fila */
  var counts=[];
  for(var i=0;i<rows.length;i++){
    var celdas=rows[i].querySelectorAll("td.day-cell");
    var mx=0;
    for(var c=0;c<celdas.length;c++){
      var n=celdas[c].querySelectorAll(".ev-bloque").length;
      if(n>mx) mx=n;
    }
    counts.push(mx);
  }

  /* alturas base */
  var altos=[], base=0;
  for(var i=0;i<counts.length;i++){
    var h=counts[i]===0 ? ALTO_VACIA : counts[i]*ALTO_EVENTO;
    altos.push(h); base+=h;
  }

  /* distribuir sobrante entre filas con eventos */
  if(base<bodyH){
    var extra=bodyH-base, pesoTotal=0;
    for(var i=0;i<counts.length;i++) if(counts[i]>0) pesoTotal+=counts[i];
    if(pesoTotal>0){
      for(var i=0;i<altos.length;i++){
        if(counts[i]>0) altos[i]+=Math.floor(extra*(counts[i]/pesoTotal));
      }
    }
  }

  /* aplicar */
  for(var i=0;i<rows.length;i++){
    rows[i].style.height=altos[i]+"px";
    rows[i].style.maxHeight=altos[i]+"px";
    rows[i].style.minHeight=altos[i]+"px";
  }
}
setInterval(ajustarAltos,300);
window.addEventListener("resize",function(){ setTimeout(ajustarAltos,50); });

/* — Render — */
function renderGrid(data){
  lastData=data;
  var salas=data.salas||data;
  if(!salas||!salas.length){ stopSpinner(); return; }

  var ahora=new Date(), ahoraMs=ahora.getTime(), hoyTs=soloFecha(ahora);
  var dias=obtenerDias(ahora);
  var map={};
  for(var i=0;i<salas.length;i++) map[salas[i].nombre]=salas[i];

  /* cabeceras */
  var thr=document.getElementById("thead-row");
  var viejos=thr.querySelectorAll(".day-hd");
  for(var i=0;i<viejos.length;i++) viejos[i].parentNode.removeChild(viejos[i]);
  for(var d=0;d<dias.length;d++){
    var f=dias[d], esHoy=(soloFecha(f)===hoyTs);
    var td=document.createElement("td");
    td.className="day-hd"+(esHoy?" hoy":"");
    td.innerHTML='<span class="dh-nom">'+DIAS_CORT[f.getDay()]+'</span>'
                +'<span class="dh-fec">'+pad(f.getDate())+"/"+pad(f.getMonth()+1)+'</span>'
                +(esHoy?'<span class="hoy-badge">HOY</span>':"");
    thr.appendChild(td);
  }

  /* filas */
  var tbody=document.getElementById("grid-body");
  tbody.innerHTML="";

  for(var si=0;si<SALAS.length;si++){
    var nombre=SALAS[si], s=map[nombre];
    var tr=document.createElement("tr");

    /* etiqueta sala */
    var eCol=s?(s.estado==="ocupada"?"#FF7D10":s.estado==="pronto"?"#0047CC":"#1CB85B"):"#888";
    var eTxt=s?(s.estado==="ocupada"?"● Ocupada ahora":s.estado==="pronto"?"● Próxima reserva":"● Disponible"):"";
    var cBar=COLORES[nombre]||"#0047CC";
    var tdL=document.createElement("td"); tdL.className="sala-lbl";
    tdL.innerHTML='<div style="display:flex;align-items:center;gap:9px;">'
      +'<div style="background:'+cBar+';width:7px;min-height:40px;border-radius:5px;flex-shrink:0;"></div>'
      +'<div><span class="sala-nombre">'+esc(SHORT[nombre]||nombre)+'</span>'
      +'<span class="sala-estado" style="color:'+eCol+'">'+eTxt+'</span></div></div>';
    tr.appendChild(tdL);

    for(var d=0;d<dias.length;d++){
      var f=dias[d], fTs=soloFecha(f), esH2=(fTs===hoyTs);
      var tdC=document.createElement("td");

      /* recolectar eventos */
      var evs=[];
      if(s&&s.eventosSemana){
        for(var ei=0;ei<s.eventosSemana.length;ei++){
          var ev=s.eventosSemana[ei];
          if(soloFecha(new Date(ev.inicio))!==fTs) continue;
          if(esH2&&new Date(ev.fin).getTime()<=ahoraMs) continue;
          evs.push(ev);
        }
      }
      if(esH2&&s){
        if(s.actual&&soloFecha(new Date(s.actual.inicio))===fTs&&new Date(s.actual.fin).getTime()>ahoraMs)
          evs.push(s.actual);
        if(s.proximas) for(var pi=0;pi<s.proximas.length;pi++){
          var p=s.proximas[pi];
          if(soloFecha(new Date(p.inicio))===fTs&&new Date(p.fin).getTime()>ahoraMs) evs.push(p);
        }
        var seen={},uniq=[];
        for(var ei=0;ei<evs.length;ei++) if(!seen[evs[ei].inicio]){seen[evs[ei].inicio]=1;uniq.push(evs[ei]);}
        evs=uniq;
      }
      evs.sort(function(a,b){return new Date(a.inicio)-new Date(b.inicio);});

      if(evs.length===0){
        tdC.className="day-cell"+(esH2?" hoy":"")+" vacia";
        tdC.innerHTML='<span class="libre-txt">Sin reservas</span>';
      } else {
        tdC.className="day-cell"+(esH2?" hoy":"");
        var html='<div class="ev-container">';
        for(var ei=0;ei<evs.length;ei++){
          var ev=evs[ei];
          var ini=new Date(ev.inicio).getTime(), fin=new Date(ev.fin).getTime();
          var cls=ini<=ahoraMs&&fin>ahoraMs?"ev-ocup":ini>ahoraMs&&ini<=ahoraMs+1800000?"ev-pronto":"ev-proxima";
          html+='<div class="ev-bloque '+cls+'">'
               +'<span class="ev-hora">'+fmtH(ev.inicio)+" – "+fmtH(ev.fin)+'</span>'
               +(ev.creador?'<span class="ev-user">'+esc(ev.creador)+'</span>':"")
               +'</div>';
        }
        html+='</div>';
        tdC.innerHTML=html;
      }
      tr.appendChild(tdC);
    }
    tbody.appendChild(tr);
  }
  stopSpinner();
  setTimeout(ajustarAltos,50);
}

/* — JSONP, actualiza cada 60 s — */
var cbCount=0;
function cargarDatos(){
  cbCount++; var cn="cb"+cbCount;
  window[cn]=function(data){
    try{ renderGrid(data); }catch(e){ console.error(e); }
    try{ var el=document.getElementById("jsonp-script"); if(el&&el.parentNode) el.parentNode.removeChild(el); delete window[cn]; }catch(e){}
  };
  var sc=document.createElement("script");
  sc.id="jsonp-script";
  sc.src=SCRIPT_URL+"?callback="+cn+"&t="+Date.now();
  document.getElementsByTagName("head")[0].appendChild(sc);
}
cargarDatos();
setInterval(cargarDatos,60000);
</script>
</body>
</html>
