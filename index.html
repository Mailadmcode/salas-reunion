<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salas de Reunion</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; overflow:hidden;
      background:#090d18; color:#e6e9f0;
      font-family:Arial, Helvetica, sans-serif;
    }

    /* ══ LAYOUT PRINCIPAL ══ */
    .app { display:flex; flex-direction:column; width:100vw; height:100vh; }

    /* ══ HEADER ══ */
    .header {
      flex-shrink:0;
      background:#0d1528;
      border-bottom:2px solid #1c2840;
      padding:0 1.5vw;
      height:7vh; min-height:52px;
      display:flex; align-items:center;
    }
    .h-logo { display:flex; align-items:center; gap:0.8vw; flex:0 0 auto; }
    .h-logo img { height:5vh; min-height:32px; max-height:48px; display:block; }
    .h-logo span { font-size:clamp(8px,0.7vw,11px); letter-spacing:2px; text-transform:uppercase; color:#5a6a88; }
    .h-legend { flex:1; text-align:center; }
    .leg-item { display:inline-block; margin:0 1vw; font-size:clamp(9px,0.8vw,13px); letter-spacing:1px; text-transform:uppercase; color:#5a6a88; vertical-align:middle; }
    .leg-dot  { display:inline-block; width:clamp(7px,0.6vw,11px); height:clamp(7px,0.6vw,11px); border-radius:50%; margin-right:5px; vertical-align:middle; }
    .h-clock  { flex:0 0 auto; text-align:right; }
    .clock-lbl  { font-size:clamp(7px,0.6vw,10px); letter-spacing:1px; text-transform:uppercase; color:#5a6a88; display:block; }
    .clock-time { font-size:clamp(22px,3.2vw,52px); font-weight:700; letter-spacing:4px; color:#fff; line-height:1; display:block; }
    .clock-date { font-size:clamp(9px,0.85vw,14px); letter-spacing:2px; text-transform:uppercase; color:#5a6a88; margin-top:3px; display:block; }

    /* ══ BODY: plano + calendario ══ */
    .body { flex:1; display:flex; overflow:hidden; padding:1vh 1vw 1vh 1vw; gap:1vw; min-height:0; }

    /* ══ PLANO IZQUIERDA ══ */
    .plano {
      flex:0 0 auto;
      width:clamp(90px,10vw,160px);
      display:flex; flex-direction:column;
      background:#0d1528; border:1px solid #1c2840; border-radius:10px;
      overflow:hidden;
    }
    .plano-title {
      text-align:center; font-size:clamp(7px,0.55vw,10px);
      letter-spacing:2px; text-transform:uppercase; color:#5a6a88;
      padding:6px 0; border-bottom:1px solid #1c2840; flex-shrink:0;
    }
    .plano-rooms { flex:1; display:flex; flex-direction:column-reverse; padding:6px 6px; gap:4px; min-height:0; }
    .plano-room {
      flex:1; border-radius:7px; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      border:1.5px solid #1c2840; background:#101623;
      transition:background 0.4s, border-color 0.4s;
      min-height:0; padding:2px;
    }
    .plano-room.libre   { background:#0a2e1e; border-color:#00e5a0; }
    .plano-room.ocupada { background:#2e0a10; border-color:#ff4060; }
    .plano-room.pronto  { background:#2e2000; border-color:#ffb800; }
    .plano-room-name {
      font-size:clamp(7px,0.65vw,11px); font-weight:700;
      text-transform:uppercase; letter-spacing:1px; color:#fff;
      text-align:center; line-height:1.2;
    }
    .plano-room-dot {
      width:clamp(6px,0.5vw,9px); height:clamp(6px,0.5vw,9px);
      border-radius:50%; background:#1c2840; margin-top:3px; flex-shrink:0;
    }
    .plano-room.libre   .plano-room-dot { background:#00e5a0; }
    .plano-room.ocupada .plano-room-dot { background:#ff4060; }
    .plano-room.pronto  .plano-room-dot { background:#ffb800; }

    /* ══ CALENDARIO DERECHA ══ */
    .cal { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }

    /* Cabecera de columnas */
    .cal-head { flex-shrink:0; display:flex; margin-left:clamp(36px,3.5vw,56px); gap:4px; padding-bottom:4px; }
    .cal-col-head {
      flex:1; background:#0d1528; border:1px solid #1c2840; border-radius:8px 8px 0 0;
      padding:clamp(4px,0.6vh,8px) 4px; text-align:center; min-width:0;
    }
    .col-name {
      font-size:clamp(9px,0.9vw,15px); font-weight:700;
      text-transform:uppercase; letter-spacing:1px; color:#fff;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block;
    }
    .col-badge {
      display:inline-block; margin-top:3px;
      padding:2px 8px; border-radius:20px;
      font-size:clamp(7px,0.6vw,10px); font-weight:700; letter-spacing:1px; text-transform:uppercase;
    }
    .b-libre   { background:#0a2e1e; color:#00e5a0; border:1px solid #00e5a0; }
    .b-ocupada { background:#2e0a10; color:#ff4060; border:1px solid #ff4060; }
    .b-pronto  { background:#2e2000; color:#ffb800; border:1px solid #ffb800; }
    .b-error   { background:#1a1a1a; color:#888;    border:1px solid #444; }

    /* Grid de horas */
    .cal-grid { flex:1; display:flex; overflow:hidden; min-height:0; position:relative; }

    /* Eje de horas */
    .cal-axis { flex-shrink:0; width:clamp(36px,3.5vw,56px); display:flex; flex-direction:column; position:relative; }
    .axis-slot {
      flex:1; display:flex; align-items:flex-start; justify-content:flex-end;
      padding-right:6px; min-height:0;
    }
    .axis-slot span {
      font-size:clamp(7px,0.6vw,10px); color:#3a4a62; letter-spacing:1px;
      transform:translateY(-50%); display:block; white-space:nowrap;
    }

    /* Columnas de salas */
    .cal-cols { flex:1; display:flex; gap:4px; overflow:hidden; min-width:0; }
    .cal-col  { flex:1; position:relative; background:#0d1528; border:1px solid #1c2840; border-radius:0 0 8px 8px; min-width:0; overflow:hidden; }

    /* Líneas de hora */
    .hour-line {
      position:absolute; left:0; right:0; height:1px;
      background:#1c2840; pointer-events:none;
    }
    .hour-line.half { background:#131e30; }

    /* Evento en columna */
    .cal-event {
      position:absolute; left:3px; right:3px;
      border-radius:5px; padding:3px 5px; overflow:hidden;
      border-left:3px solid transparent;
      cursor:default;
    }
    .cal-event.libre   { background:#0a2e1e; border-color:#00e5a0; }
    .cal-event.ocupada { background:#2e0a10; border-color:#ff4060; }
    .cal-event.pronto  { background:#2e2000; border-color:#ffb800; }
    .ev-time  { font-size:clamp(7px,0.6vw,10px); font-weight:700; display:block; white-space:nowrap; }
    .ev-quien { font-size:clamp(8px,0.7vw,11px); display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#e6e9f0; }
    .cal-event.libre   .ev-time { color:#00e5a0; }
    .cal-event.ocupada .ev-time { color:#ff4060; }
    .cal-event.pronto  .ev-time { color:#ffb800; }

    /* Línea de "ahora" */
    .now-line {
      position:absolute; left:0; right:0; height:2px;
      background:#3b82f6; pointer-events:none; z-index:10;
    }
    .now-dot {
      position:absolute; left:-4px; top:-4px;
      width:10px; height:10px; border-radius:50%; background:#3b82f6;
    }

    /* ══ OVERLAY ══ */
    #overlay {
      position:fixed; inset:0; background:#090d18; z-index:999;
      display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px;
    }
    .spinner {
      width:38px; height:38px;
      border:3px solid #1c2840; border-top-color:#3b82f6;
      border-radius:50%; animation:spin 0.9s linear infinite;
    }
    .ov-text { font-size:10px; color:#5a6a88; letter-spacing:3px; text-transform:uppercase; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<div id="overlay">
  <div class="spinner"></div>
  <span class="ov-text">Cargando...</span>
</div>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="h-logo">
      <img src="https://i.imgur.com/fXLdGez.png" alt="Logo"/>
      <span>Estado en tiempo real</span>
    </div>
    <div class="h-legend">
      <span class="leg-item"><span class="leg-dot" style="background:#00e5a0"></span>Disponible</span>
      <span class="leg-item"><span class="leg-dot" style="background:#ffb800"></span>Próxima (&lt;30 min)</span>
      <span class="leg-item"><span class="leg-dot" style="background:#ff4060"></span>Ocupada</span>
    </div>
    <div class="h-clock">
      <span class="clock-lbl" id="actTxt">Actualizando...</span>
      <span class="clock-time" id="clkTime">--:--</span>
      <span class="clock-date" id="clkDate">---</span>
    </div>
  </div>

  <!-- BODY -->
  <div class="body">

    <!-- PLANO -->
    <div class="plano">
      <div class="plano-title">Plano</div>
      <div class="plano-rooms" id="plano-rooms">
        <!-- generado por JS -->
      </div>
    </div>

    <!-- CALENDARIO -->
    <div class="cal">
      <!-- Cabecera columnas -->
      <div class="cal-head" id="cal-head"></div>
      <!-- Grid -->
      <div class="cal-grid">
        <!-- Eje horas -->
        <div class="cal-axis" id="cal-axis"></div>
        <!-- Columnas -->
        <div class="cal-cols" id="cal-cols"></div>
      </div>
    </div>

  </div>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyn7VSKT-IFULCC2bPx2SlK2W2GlaXQNoKZ44WLQq5Ev94ESTC45vlJgcpmPgaN_IYQ/exec";

// Rango de horas a mostrar
var HORA_INI = 7;   // 07:00
var HORA_FIN = 21;  // 21:00
var TOTAL_H  = HORA_FIN - HORA_INI; // 14 horas

var DIAS  = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
var MESES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

function pad(n){ return n<10?"0"+n:""+n; }

/* ── RELOJ ── */
function tickClock(){
  var n = new Date();
  document.getElementById("clkTime").textContent = pad(n.getHours())+":"+pad(n.getMinutes());
  document.getElementById("clkDate").textContent = DIAS[n.getDay()]+" "+pad(n.getDate())+" "+MESES[n.getMonth()]+" "+n.getFullYear();
}
setInterval(tickClock,1000); tickClock();

/* ── HELPERS ── */
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtH(iso){ if(!iso)return"--:--"; var d=new Date(iso); return pad(d.getHours())+":"+pad(d.getMinutes()); }
function diffMin(iso){ return Math.max(0,Math.round((new Date(iso)-Date.now())/60000)); }
function pct(ini,fin){ var n=Date.now(),s=new Date(ini),e=new Date(fin); if(n<=s)return 0; if(n>=e)return 100; return Math.round((n-s)/(e-s)*100); }

/* ── POSICIÓN EN EL EJE DE HORAS ── */
function horaPct(iso){
  var d = new Date(iso);
  var mins = (d.getHours() - HORA_INI)*60 + d.getMinutes();
  return Math.max(0, Math.min(100, mins / (TOTAL_H*60) * 100));
}

/* ── CONSTRUCCIÓN DEL EJE ── */
function buildAxis(){
  var axis = document.getElementById("cal-axis");
  axis.innerHTML = "";
  for(var h=HORA_INI; h<=HORA_FIN; h++){
    var slot = document.createElement("div");
    slot.className = "axis-slot";
    var hStr = h < 12 ? h+"AM" : (h===12?"12PM":(h-12)+"PM");
    slot.innerHTML = "<span>"+hStr+"</span>";
    axis.appendChild(slot);
  }
}

/* ── LÍNEAS DE HORA en una columna ── */
function buildHourLines(col){
  for(var h=0; h<=TOTAL_H; h++){
    var pctH = h/TOTAL_H*100;
    var line = document.createElement("div");
    line.className = "hour-line";
    line.style.top = pctH+"%";
    col.appendChild(line);
    // media hora
    if(h < TOTAL_H){
      var half = document.createElement("div");
      half.className = "hour-line half";
      half.style.top = (pctH + 50/TOTAL_H)+"%";
      col.appendChild(half);
    }
  }
}

/* ── LÍNEA DE AHORA ── */
function buildNowLine(col){
  var now = new Date();
  var mins = (now.getHours()-HORA_INI)*60+now.getMinutes();
  if(mins<0||mins>TOTAL_H*60) return;
  var pctNow = mins/(TOTAL_H*60)*100;
  var line = document.createElement("div");
  line.className = "now-line";
  line.style.top = pctNow+"%";
  line.innerHTML = '<div class="now-dot"></div>';
  col.appendChild(line);
}

/* ── EVENTO EN COLUMNA ── */
function buildEvent(col, ev, estado){
  var topPct  = horaPct(ev.inicio);
  var botPct  = horaPct(ev.fin);
  var heightPct = Math.max(botPct - topPct, 2);

  var div = document.createElement("div");
  div.className = "cal-event "+estado;
  div.style.top    = topPct+"%";
  div.style.height = heightPct+"%";
  div.innerHTML =
    '<span class="ev-time">'+fmtH(ev.inicio)+" – "+fmtH(ev.fin)+'</span>'+
    (ev.creador?'<span class="ev-quien">'+esc(ev.creador)+'</span>':'');
  col.appendChild(div);
}

/* ── PLANO ── */
// Orden de abajo a arriba (flex-direction:column-reverse invertirá visualmente)
var ORDEN_PLANO = ["Sala 1","Sala 2","Sala 3","Sala 4","Sala 5","Sala 6","Sala Villarica"];

function buildPlano(salas){
  var container = document.getElementById("plano-rooms");
  container.innerHTML = "";
  // Construimos en orden 1→Villarica; column-reverse lo muestra Villarica arriba
  for(var i=0; i<ORDEN_PLANO.length; i++){
    var nombre = ORDEN_PLANO[i];
    var sala = null;
    for(var j=0;j<salas.length;j++){ if(salas[j].nombre===nombre){ sala=salas[j]; break; } }
    var estado = sala ? sala.estado : "error";

    var div = document.createElement("div");
    div.className = "plano-room "+estado;
    div.id = "plano-"+i;

    var nameDiv = document.createElement("div");
    nameDiv.className = "plano-room-name";
    nameDiv.textContent = nombre.replace("Sala ","S.");
    div.appendChild(nameDiv);

    var dot = document.createElement("div");
    dot.className = "plano-room-dot";
    div.appendChild(dot);

    container.appendChild(div);
  }
}

/* ── RENDER PRINCIPAL ── */
function renderGrid(salas){
  if(!salas||!salas.length){ ocultarOverlay(); return; }

  buildAxis();
  buildPlano(salas);

  /* Cabecera */
  var head = document.getElementById("cal-head");
  head.innerHTML = "";
  /* Columnas */
  var cols = document.getElementById("cal-cols");
  cols.innerHTML = "";

  for(var i=0; i<salas.length; i++){
    var s = salas[i];
    var bc = s.estado==="libre"?"b-libre":s.estado==="ocupada"?"b-ocupada":s.estado==="pronto"?"b-pronto":"b-error";
    var bt = s.estado==="libre"?"Disponible":s.estado==="ocupada"?"Ocupada":s.estado==="pronto"?"Próxima":"Error";

    /* Cabecera de columna */
    var ch = document.createElement("div");
    ch.className = "cal-col-head";
    ch.innerHTML = '<span class="col-name">'+esc(s.nombre)+'</span><span class="col-badge '+bc+'">'+bt+'</span>';
    head.appendChild(ch);

    /* Columna */
    var col = document.createElement("div");
    col.className = "cal-col";
    buildHourLines(col);

    /* Evento actual */
    if(s.actual){ buildEvent(col, s.actual, "ocupada"); }

    /* Próximas */
    if(s.proximas){
      for(var j=0;j<s.proximas.length;j++){
        var ev = s.proximas[j];
        var evEstado = (new Date(ev.inicio)-Date.now() < 30*60*1000) ? "pronto" : "libre";
        buildEvent(col, ev, evEstado);
      }
    }

    buildNowLine(col);
    cols.appendChild(col);
  }

  var n = new Date();
  document.getElementById("actTxt").textContent = "Act. "+pad(n.getHours())+":"+pad(n.getMinutes())+":"+pad(n.getSeconds());
  ocultarOverlay();
}

function ocultarOverlay(){
  var ov = document.getElementById("overlay");
  if(ov) ov.style.display="none";
}

/* ── JSONP ── */
var cbCount=0;
function cargarDatos(){
  cbCount++;
  var cbName="cb"+cbCount;
  window[cbName]=function(data){
    renderGrid(data.salas||data);
    try{
      var el=document.getElementById("jsonp-script");
      if(el)el.parentNode.removeChild(el);
      delete window[cbName];
    }catch(e){}
  };
  var s=document.createElement("script");
  s.id="jsonp-script";
  s.src=SCRIPT_URL+"?callback="+cbName+"&t="+Date.now();
  document.head.appendChild(s);
}

cargarDatos();
setInterval(cargarDatos, 60000);

/* Actualizar línea de "ahora" cada minuto */
setInterval(function(){
  var lines = document.querySelectorAll(".now-line");
  for(var i=0;i<lines.length;i++) lines[i].parentNode.removeChild(lines[i]);
  var cols = document.querySelectorAll(".cal-col");
  for(var i=0;i<cols.length;i++) buildNowLine(cols[i]);
}, 60000);
</script>
</body>
</html>
