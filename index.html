<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salas de Reunion – Prodalam</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; overflow:hidden;
      background:#EEF2FB;
      font-family:'Barlow', Arial, sans-serif;
    }
    .app { display:flex; flex-direction:column; width:100vw; height:100vh; }

    /* ══════════════════════════════════════
       HEADER — fondo blanco, acentos azul/naranja
    ══════════════════════════════════════ */
    .header {
      flex-shrink:0; height:76px;
      background:#ffffff;
      border-bottom:5px solid #FF7D10;
      box-shadow:0 2px 12px rgba(0,0,0,0.10);
      display:flex; align-items:center;
      padding:0 24px; gap:0;
    }

    /* Logo */
    .h-left {
      flex:0 0 22%;
      display:flex; align-items:center; gap:12px;
      border-right:2px solid #E0E8F8; padding-right:20px;
    }
    .h-logo { height:42px; }
    .h-divider {
      width:2px; height:32px; background:#FF7D10; border-radius:2px;
    }
    .h-sub {
      font-size:11px; letter-spacing:2px; text-transform:uppercase;
      color:#0047CC; font-weight:800; white-space:nowrap;
      font-family:'Barlow Condensed',sans-serif;
    }

    /* Leyenda */
    .h-center {
      flex:0 0 56%;
      display:flex; align-items:center; justify-content:center; gap:36px;
      padding:0 16px;
    }
    .leg { display:flex; align-items:center; gap:10px; }
    .leg-dot {
      width:20px; height:20px; border-radius:50%; flex-shrink:0;
      border:3px solid rgba(0,0,0,0.10);
    }
    .leg-txt {
      font-size:15px; font-weight:800; letter-spacing:0.5px;
      color:#1A2E6E; white-space:nowrap;
      font-family:'Barlow Condensed',sans-serif;
    }

    /* Reloj */
    .h-right {
      flex:0 0 22%;
      display:flex; flex-direction:column; align-items:flex-end;
      border-left:2px solid #E0E8F8; padding-left:20px;
    }
    .clk-semana {
      font-size:10px; letter-spacing:1px; text-transform:uppercase;
      color:#5572A0; white-space:nowrap;
      font-family:'Barlow Condensed',sans-serif; font-weight:700;
    }
    .clk-time {
      font-size:48px; font-weight:900; letter-spacing:2px;
      color:#0047CC; line-height:1;
      font-family:'Barlow Condensed',sans-serif;
    }
    .clk-fecha {
      font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
      color:#5572A0; white-space:nowrap;
      font-family:'Barlow Condensed',sans-serif; font-weight:700;
    }

    /* ══════════════════════════════════════
       MAIN — solo la tabla, sin plano
    ══════════════════════════════════════ */
    .main {
      flex:1; display:flex; overflow:hidden;
      min-height:0; padding:12px; gap:0;
    }

    /* ══ TABLA SEMANAL ══ */
    .tabla {
      flex:1; display:flex; flex-direction:column;
      min-width:0; overflow:hidden;
      background:#fff;
      border-radius:14px;
      border:2px solid #D0DCEE;
      box-shadow:0 4px 20px rgba(0,71,204,0.07);
      overflow:hidden;
    }

    /* Cabecera días */
    .tb-head {
      flex-shrink:0; display:flex;
      background:#0047CC;
      border-bottom:3px solid #FF7D10;
    }
    .th-sala {
      flex:0 0 150px;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; font-weight:900; letter-spacing:3px;
      text-transform:uppercase; color:#fff;
      font-family:'Barlow Condensed',sans-serif;
      border-right:2px solid rgba(255,255,255,0.15);
      padding:14px 8px;
    }
    .th-dia {
      flex:1;
      padding:10px 8px; text-align:center;
      border-right:1px solid rgba(255,255,255,0.12);
    }
    .th-dia:last-child { border-right:none; }
    .th-dia.hoy {
      background:rgba(255,125,16,0.25);
      border-bottom:3px solid #FF7D10;
      margin-bottom:-3px;
    }
    .th-dia-nombre {
      font-size:18px; font-weight:900;
      text-transform:uppercase; letter-spacing:2px;
      color:#fff; display:block;
      font-family:'Barlow Condensed',sans-serif;
    }
    .th-dia-fecha {
      font-size:14px; color:rgba(255,255,255,0.75);
      letter-spacing:1px; display:block; margin-top:2px;
      font-family:'Barlow Condensed',sans-serif; font-weight:600;
    }
    .th-dia.hoy .th-dia-fecha { color:#FFD080; }
    .hoy-badge {
      display:inline-block; background:#FF7D10; color:#fff;
      font-size:10px; font-weight:900; letter-spacing:1px;
      padding:2px 8px; border-radius:4px; margin-top:3px;
      font-family:'Barlow Condensed',sans-serif;
    }

    /* Cuerpo tabla */
    .tb-body {
      flex:1; display:flex; flex-direction:column;
      min-height:0; overflow:hidden;
    }
    .tb-row {
      flex:1; display:flex; min-height:0;
      border-bottom:2px solid #E0E8F4;
    }
    .tb-row:last-child { border-bottom:none; }

    /* Celda sala — nombre */
    .tc-sala {
      flex:0 0 150px;
      background:#F8FAFF;
      border-right:3px solid #E0E8F4;
      display:flex; align-items:center;
      padding:0 12px; gap:10px;
    }
    .sala-colorbar {
      width:6px; height:60%; border-radius:3px; flex-shrink:0;
    }
    .sala-info { display:flex; flex-direction:column; gap:3px; }
    .sala-nombre {
      font-size:18px; font-weight:800;
      color:#0A1F5C; white-space:nowrap;
      font-family:'Barlow Condensed',sans-serif;
      letter-spacing:0.5px;
    }
    .sala-status {
      font-size:12px; white-space:nowrap;
      display:block;
      font-family:'Barlow',sans-serif;
      font-weight:700; letter-spacing:0.3px;
    }

    /* Celda día */
    .tc-dia {
      flex:1;
      background:#fff;
      border-right:1px solid #E8EEF8;
      position:relative; overflow:hidden; min-width:0;
    }
    .tc-dia:last-child { border-right:none; }
    .tc-dia.hoy { background:#F5F8FF; }

    /* Franja naranja izquierda en columna HOY */
    .tc-dia.hoy::before {
      content:''; position:absolute; left:0; top:0; bottom:0;
      width:3px; background:#FF7D10;
    }

    .tc-libre-txt {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      font-size:13px; color:#C8D4E8;
      font-style:italic; white-space:nowrap;
      font-family:'Barlow',sans-serif; font-weight:500;
    }

    /* ── Eventos ── */
    .ev-block {
      position:absolute; left:6px; right:6px;
      border-radius:8px; padding:6px 10px;
      overflow:hidden;
      border-left:5px solid transparent;
      display:flex; flex-direction:column; justify-content:center;
      gap:1px;
    }

    /* Ocupada ahora → naranja */
    .ev-block.ocupada {
      background:#FFF3EA;
      border-color:#FF7D10;
    }
    /* Próxima < 30 min → azul */
    .ev-block.pronto {
      background:#EBF0FF;
      border-color:#0047CC;
    }
    /* Futura → verde */
    .ev-block.proxima {
      background:#EAF7EE;
      border-color:#1CB85B;
    }

    .ev-hora {
      font-size:15px; font-weight:800;
      display:block; white-space:nowrap;
      font-family:'Barlow Condensed',sans-serif; letter-spacing:0.5px;
    }
    .ev-block.ocupada .ev-hora { color:#CC5000; }
    .ev-block.pronto  .ev-hora { color:#0047CC; }
    .ev-block.proxima .ev-hora { color:#0A6B30; }

    .ev-quien {
      font-size:15px; font-weight:700;
      display:block; white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis;
      font-family:'Barlow',sans-serif;
    }
    .ev-block.ocupada .ev-quien { color:#7A3000; }
    .ev-block.pronto  .ev-quien { color:#003099; }
    .ev-block.proxima .ev-quien { color:#0A4A20; }

    .ev-titulo {
      font-size:12px;
      display:block; white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis;
      font-family:'Barlow',sans-serif; font-weight:500;
    }
    .ev-block.ocupada .ev-titulo { color:#AA6030; }
    .ev-block.pronto  .ev-titulo { color:#3A5AAA; }
    .ev-block.proxima .ev-titulo { color:#3A7A50; }

    /* Overlay carga */
    #overlay {
      position:fixed; inset:0; background:#EEF2FB; z-index:999;
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:16px;
    }
    .spinner {
      width:52px; height:52px;
      border:5px solid #C8D8F0;
      border-top-color:#0047CC;
      border-radius:50%;
      animation:spin .85s linear infinite;
    }
    .ov-txt {
      font-size:14px; color:#0047CC;
      letter-spacing:3px; text-transform:uppercase;
      font-weight:800; font-family:'Barlow Condensed',sans-serif;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<div id="overlay">
  <div class="spinner"></div>
  <span class="ov-txt">Cargando...</span>
</div>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="h-left">
      <img src="https://i.imgur.com/fXLdGez.png" class="h-logo" alt="Prodalam"/>
      <div class="h-divider"></div>
      <span class="h-sub">Estado en tiempo real</span>
    </div>

    <div class="h-center">
      <div class="leg">
        <div class="leg-dot" style="background:#1CB85B"></div>
        <span class="leg-txt">Disponible</span>
      </div>
      <div class="leg">
        <div class="leg-dot" style="background:#0047CC"></div>
        <span class="leg-txt">Próxima &lt;30 min</span>
      </div>
      <div class="leg">
        <div class="leg-dot" style="background:#FF7D10"></div>
        <span class="leg-txt">Ocupada ahora</span>
      </div>
    </div>

    <div class="h-right">
      <span class="clk-semana" id="clkSemana">---</span>
      <span class="clk-time"   id="clkTime">--:--</span>
      <span class="clk-fecha"  id="clkFecha">---</span>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="tabla">
      <div class="tb-head" id="tb-head"></div>
      <div class="tb-body" id="tb-body"></div>
    </div>
  </div>

</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyn7VSKT-IFULCC2bPx2SlK2W2GlaXQNoKZ44WLQq5Ev94ESTC45vlJgcpmPgaN_IYQ/exec";

var DIAS_FULL  = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
var DIAS_CORTO = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
var MESES      = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

var SALA_COLORS = {
  "Sala 1":       "#AB47BC",
  "Sala 2":       "#29B6F6",
  "Sala 3":       "#FF5722",
  "Sala 4":       "#26C6A6",
  "Sala 5":       "#C6D000",
  "Sala 6":       "#00BCD4",
  "Sala Villarica":"#2196F3"
};

var ORDEN = ["Sala 1","Sala 2","Sala 3","Sala 4","Sala 5","Sala 6","Sala Villarica"];
var SHORT  = {
  "Sala 1":"Sala 1","Sala 2":"Sala 2","Sala 3":"Sala 3",
  "Sala 4":"Sala 4","Sala 5":"Sala 5","Sala 6":"Sala 6",
  "Sala Villarica":"Villarica"
};

function pad(n){ return n<10?"0"+n:""+n; }

/* ── RELOJ ── */
function tickClock(){
  var n = new Date();
  document.getElementById("clkTime").textContent  = pad(n.getHours())+":"+pad(n.getMinutes());
  document.getElementById("clkFecha").textContent = DIAS_FULL[n.getDay()]+" "+pad(n.getDate())+" "+MESES[n.getMonth()]+" "+n.getFullYear();
  var lun = new Date(n);
  lun.setDate(n.getDate() - (n.getDay()===0 ? 6 : n.getDay()-1));
  var vie = new Date(lun); vie.setDate(lun.getDate()+4);
  document.getElementById("clkSemana").textContent =
    "Semana "+pad(lun.getDate())+"/"+pad(lun.getMonth()+1)
    +" – "+pad(vie.getDate())+"/"+pad(vie.getMonth()+1)
    +" · "+pad(n.getHours())+":"+pad(n.getMinutes())+":"+pad(n.getSeconds());
}
setInterval(tickClock, 1000);
tickClock();

function fmtH(iso){
  if(!iso) return "--:--";
  var d = new Date(iso);
  return pad(d.getHours())+":"+pad(d.getMinutes());
}

/* Días lunes→viernes de la semana actual */
function diasSemana(){
  var hoy = new Date(), dias = [];
  var lun = new Date(hoy);
  lun.setDate(hoy.getDate() - (hoy.getDay()===0 ? 6 : hoy.getDay()-1));
  for(var i=0; i<5; i++){
    var d = new Date(lun);
    d.setDate(lun.getDate()+i);
    dias.push(d);
  }
  return dias;
}

function mismodia(iso, fecha){
  var d = new Date(iso);
  return d.getDate()===fecha.getDate()
      && d.getMonth()===fecha.getMonth()
      && d.getFullYear()===fecha.getFullYear();
}

/* ── RENDER PRINCIPAL ── */
function renderGrid(salas){
  if(!salas || !salas.length){ ocultarOverlay(); return; }

  var dias   = diasSemana();
  var hoy    = new Date();
  var ahoraMs = Date.now();
  var idx    = {};
  for(var i=0; i<salas.length; i++) idx[salas[i].nombre] = salas[i];

  /* ── CABECERA ── */
  var head = document.getElementById("tb-head");
  head.innerHTML = '<div class="th-sala">SALA</div>';
  for(var d=0; d<dias.length; d++){
    var dia   = dias[d];
    var esHoy = (dia.getDate()===hoy.getDate() && dia.getMonth()===hoy.getMonth());
    var th    = document.createElement("div");
    th.className = "th-dia" + (esHoy ? " hoy" : "");
    th.innerHTML  = '<span class="th-dia-nombre">'+DIAS_CORTO[dia.getDay()]+'</span>'
                  + '<span class="th-dia-fecha">'+pad(dia.getDate())+"/"+pad(dia.getMonth()+1)+'</span>'
                  + (esHoy ? '<span class="hoy-badge">HOY</span>' : "");
    head.appendChild(th);
  }

  /* ── FILAS ── */
  var body = document.getElementById("tb-body");
  body.innerHTML = "";

  for(var r=0; r<ORDEN.length; r++){
    var nombre = ORDEN[r];
    var sala   = idx[nombre];
    if(!sala) continue;

    var fila = document.createElement("div");
    fila.className = "tb-row";

    /* — Celda nombre sala — */
    var cSala = document.createElement("div");
    cSala.className = "tc-sala";

    var cb = document.createElement("div");
    cb.className = "sala-colorbar";
    cb.style.background = SALA_COLORS[nombre] || "#0047CC";

    var si = document.createElement("div");
    si.className = "sala-info";

    var sn = document.createElement("span");
    sn.className = "sala-nombre";
    sn.textContent = SHORT[nombre] || nombre;

    var ss = document.createElement("span");
    ss.className = "sala-status";
    if(sala.estado === "ocupada"){
      ss.textContent   = "● Ocupada ahora";
      ss.style.color   = "#CC5000";
    } else if(sala.estado === "pronto"){
      ss.textContent   = "● Próxima reserva";
      ss.style.color   = "#0047CC";
    } else {
      ss.textContent   = "● Disponible";
      ss.style.color   = "#0A8A40";
    }

    si.appendChild(sn);
    si.appendChild(ss);
    cSala.appendChild(cb);
    cSala.appendChild(si);
    fila.appendChild(cSala);

    /* — Celdas por día — */
    for(var d=0; d<dias.length; d++){
      var dia    = dias[d];
      var esHoy2 = (dia.getDate()===hoy.getDate() && dia.getMonth()===hoy.getMonth());
      var cDia   = document.createElement("div");
      cDia.className = "tc-dia" + (esHoy2 ? " hoy" : "");

      /* ── TODOS los eventos del día desde eventosSemana ── */
      var fuente = sala.eventosSemana || sala.proximas || [];
      var evsDia = [];

      for(var p=0; p<fuente.length; p++){
        var evp = fuente[p];
        if(!mismodia(evp.inicio, dia)) continue;

        var iniMs = new Date(evp.inicio).getTime();
        var finMs = new Date(evp.fin).getTime();
        var cls;

        if(iniMs <= ahoraMs && finMs > ahoraMs){
          cls = "ocupada";
        } else if(iniMs > ahoraMs && (iniMs - ahoraMs) < 30*60*1000){
          cls = "pronto";
        } else {
          cls = "proxima";
        }
        evsDia.push({ ev:evp, cls:cls });
      }

      if(evsDia.length === 0){
        cDia.innerHTML = '<span class="tc-libre-txt">Sin reservas</span>';
      } else {
        /* Distribuir eventos verticalmente de forma equitativa */
        var pct = 100 / evsDia.length;
        for(var e=0; e<evsDia.length; e++){
          var ev  = evsDia[e].ev;
          var blk = document.createElement("div");
          blk.className  = "ev-block " + evsDia[e].cls;
          blk.style.top  = (e * pct + 0.8) + "%";
          blk.style.height = (pct - 1.6) + "%";

          /* Hora */
          var hs = document.createElement("span");
          hs.className   = "ev-hora";
          hs.textContent = "🕐 " + fmtH(ev.inicio) + " – " + fmtH(ev.fin);
          blk.appendChild(hs);

          /* Creador */
          if(ev.creador){
            var qs = document.createElement("span");
            qs.className   = "ev-quien";
            qs.textContent = "👤 " + ev.creador;
            blk.appendChild(qs);
          }

          /* Título */
          if(ev.titulo && !ev.esPrivado){
            var ts = document.createElement("span");
            ts.className   = "ev-titulo";
            ts.textContent = ev.titulo;
            blk.appendChild(ts);
          }

          cDia.appendChild(blk);
        }
      }

      fila.appendChild(cDia);
    }

    body.appendChild(fila);
  }

  ocultarOverlay();
}

function ocultarOverlay(){
  var ov = document.getElementById("overlay");
  if(ov) ov.style.display = "none";
}

/* ── CARGA JSONP ── */
var cbCount = 0;
function cargarDatos(){
  cbCount++;
  var cn = "cb" + cbCount;
  window[cn] = function(data){
    renderGrid(data.salas || data);
    try{
      var el = document.getElementById("jsonp-script");
      if(el) el.parentNode.removeChild(el);
      delete window[cn];
    } catch(e){}
  };
  var sc = document.createElement("script");
  sc.id  = "jsonp-script";
  sc.src = SCRIPT_URL + "?callback=" + cn + "&t=" + Date.now();
  document.head.appendChild(sc);
}

cargarDatos();
setInterval(cargarDatos, 60000);
</script>
</body>
</html>
