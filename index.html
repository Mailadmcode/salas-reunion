<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <title>Salas – Prodalam</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100vw; height:100vh; overflow:hidden;
      background:#EEF2FB;
      font-family:'Barlow', Arial, sans-serif;
    }

    /* ══ HEADER ══ */
    #header {
      position:absolute; left:0; top:0; width:100%; height:90px;
      background:#fff;
      border-bottom:6px solid #FF7D10;
      box-shadow:0 3px 12px rgba(0,0,0,0.12);
      display:flex; align-items:center;
      padding:0 28px; gap:0;
    }
    /* Logo 22% */
    .h-logo-zone {
      flex:0 0 22%; display:flex; align-items:center; gap:14px;
      border-right:2px solid #E0E8F4; padding-right:24px;
    }
    #logo-img { height:52px; display:block; }
    .h-sub {
      font-size:13px; letter-spacing:3px; text-transform:uppercase;
      color:#0047CC; font-weight:800; white-space:nowrap;
      font-family:'Barlow Condensed', sans-serif;
      border-left:3px solid #FF7D10; padding-left:12px;
    }
    /* Leyenda 56% */
    .h-legend-zone {
      flex:0 0 56%; display:flex; align-items:center; justify-content:center; gap:40px;
    }
    .leg { display:flex; align-items:center; gap:12px; }
    .leg-dot { width:22px; height:22px; border-radius:50%; flex-shrink:0; }
    .leg-txt {
      font-size:22px; font-weight:800; color:#1A2E6E; white-space:nowrap;
      font-family:'Barlow Condensed', sans-serif; letter-spacing:1px;
    }
    /* Reloj 22% */
    .h-clock-zone {
      flex:0 0 22%; display:flex; flex-direction:column; align-items:flex-end;
      border-left:2px solid #E0E8F4; padding-left:24px;
    }
    .clk-meta {
      font-size:12px; letter-spacing:1px; text-transform:uppercase;
      color:#5572A0; white-space:nowrap;
      font-family:'Barlow Condensed', sans-serif; font-weight:700;
    }
    #clk-time {
      font-size:62px; font-weight:900; letter-spacing:3px;
      color:#0047CC; line-height:1;
      font-family:'Barlow Condensed', sans-serif;
    }
    #clk-date {
      font-size:14px; letter-spacing:1px; text-transform:uppercase;
      color:#5572A0; white-space:nowrap;
      font-family:'Barlow Condensed', sans-serif; font-weight:700;
    }

    /* ══ TABLA ══ */
    #tabla {
      position:absolute; left:10px; top:100px;
      right:10px; bottom:10px;
      background:#fff; border-radius:12px;
      border:2px solid #D0DCEE; overflow:hidden;
    }
    #fila-header {
      position:absolute; left:0; top:0; right:0; height:75px;
      background:#0047CC; border-bottom:5px solid #FF7D10;
    }
    #corner {
      position:absolute; left:0; top:0; width:210px; height:75px;
      display:flex; align-items:center; justify-content:center;
      font-size:22px; font-weight:900; letter-spacing:3px;
      text-transform:uppercase; color:#fff;
      border-right:2px solid rgba(255,255,255,0.2);
      font-family:'Barlow Condensed', sans-serif;
      background:#003399;
    }
    .day-head {
      position:absolute; top:0; height:75px;
      border-right:1px solid rgba(255,255,255,0.15);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
    }
    .day-head.hoy { background:rgba(255,125,16,0.35); }
    .day-head-nom {
      font-size:30px; font-weight:900; text-transform:uppercase;
      letter-spacing:2px; color:#fff; line-height:1;
      font-family:'Barlow Condensed', sans-serif;
    }
    .day-head-fec {
      font-size:18px; color:rgba(255,255,255,0.85);
      font-family:'Barlow Condensed', sans-serif; font-weight:600; margin-top:2px;
    }
    .day-head.hoy .day-head-fec { color:#FFD080; }
    .hoy-badge {
      display:inline-block; background:#FF7D10; color:#fff;
      font-size:12px; font-weight:900; letter-spacing:1px;
      padding:2px 9px; border-radius:4px; margin-top:3px;
      font-family:'Barlow Condensed', sans-serif;
    }

    /* Filas salas */
    .sala-row {
      position:absolute; left:0; right:0;
      border-bottom:2px solid #E0E8F4;
    }
    .sala-row:last-child { border-bottom:none; }
    .sala-lbl {
      position:absolute; left:0; width:210px; height:100%;
      background:#F4F7FF; border-right:3px solid #D8E4F4;
      display:flex; align-items:center; padding:0 14px; gap:12px;
    }
    .sala-colorbar { width:9px; border-radius:5px; flex-shrink:0; }
    .sala-nombre {
      font-size:30px; font-weight:800; color:#0A1F5C;
      font-family:'Barlow Condensed', sans-serif; line-height:1; display:block;
    }
    .sala-estado {
      font-size:16px; font-weight:700; line-height:1;
      display:block; margin-top:4px;
    }

    /* Celdas días */
    .day-cell {
      position:absolute; height:100%;
      border-right:1px solid #E8EEF8; background:#fff; overflow:hidden;
    }
    .day-cell.hoy { background:#F0F6FF; border-left:5px solid #FF7D10; }
    .libre-txt {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      font-size:17px; color:#C8D4E8; font-style:italic; white-space:nowrap;
    }

    /* Eventos */
    .ev-bloque {
      position:absolute; left:6px; right:6px;
      border-radius:8px; padding:6px 12px;
      border-left:7px solid transparent; overflow:hidden;
      display:flex; flex-direction:column; justify-content:center;
    }
    .ev-ocup    { background:#FFF3EA; border-color:#FF7D10; }
    .ev-pronto  { background:#EBF0FF; border-color:#0047CC; }
    .ev-proxima { background:#EAF7EE; border-color:#1CB85B; }
    .ev-hora {
      font-size:20px; font-weight:900; display:block; white-space:nowrap;
      font-family:'Barlow Condensed', sans-serif;
    }
    .ev-ocup .ev-hora    { color:#CC5000; }
    .ev-pronto .ev-hora  { color:#0047CC; }
    .ev-proxima .ev-hora { color:#0A6B30; }
    .ev-user {
      font-size:18px; font-weight:700; display:block;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .ev-ocup .ev-user    { color:#7A3000; }
    .ev-pronto .ev-user  { color:#003099; }
    .ev-proxima .ev-user { color:#0A4A20; }

    /* Overlay */
    #overlay {
      position:fixed; inset:0; background:#EEF2FB; z-index:999;
      display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px;
    }
    .spinner {
      width:60px; height:60px;
      border:7px solid #C8D8F0; border-top-color:#0047CC;
      border-radius:50%; animation:spin .85s linear infinite;
    }
    .ov-txt {
      font-size:20px; color:#0047CC; letter-spacing:4px;
      text-transform:uppercase; font-weight:800;
      font-family:'Barlow Condensed', sans-serif;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<div id="overlay"><div class="spinner"></div><span class="ov-txt">Cargando...</span></div>

<!-- HEADER — fondo blanco, letras azul oscuro, bien legibles -->
<div id="header">
  <div class="h-logo-zone">
    <!-- Logo con fallback por si no carga imgur -->
    <img id="logo-img"
         src="https://i.imgur.com/fXLdGez.png"
         onerror="this.style.display='none'; document.getElementById('logo-txt').style.display='block';"
         alt="Prodalam"/>
    <span id="logo-txt" style="display:none; font-size:32px; font-weight:900; color:#0047CC; font-family:'Barlow Condensed',sans-serif; letter-spacing:2px;">Prodalam</span>
    <span class="h-sub">Tiempo real</span>
  </div>
  <div class="h-legend-zone">
    <div class="leg"><div class="leg-dot" style="background:#1CB85B"></div><span class="leg-txt">Disponible</span></div>
    <div class="leg"><div class="leg-dot" style="background:#0047CC"></div><span class="leg-txt">Próxima &lt;30 min</span></div>
    <div class="leg"><div class="leg-dot" style="background:#FF7D10"></div><span class="leg-txt">Ocupada ahora</span></div>
  </div>
  <div class="h-clock-zone">
    <span class="clk-meta" id="clk-meta">---</span>
    <span id="clk-time">--:--</span>
    <span id="clk-date">---</span>
  </div>
</div>

<!-- TABLA -->
<div id="tabla">
  <div id="fila-header"><div id="corner">SALA</div></div>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyn7VSKT-IFULCC2bPx2SlK2W2GlaXQNoKZ44WLQq5Ev94ESTC45vlJgcpmPgaN_IYQ/exec";

var DIAS_FULL = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
var DIAS_CORT = ["LUN","MAR","MIÉ","JUE","VIE"];
var MESES     = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

/* Orden: Villarica arriba → Sala 1 abajo */
var SALAS  = ["Sala Villarica","Sala 6","Sala 5","Sala 4","Sala 3","Sala 2","Sala 1"];
var SHORT  = {"Sala 1":"Sala 1","Sala 2":"Sala 2","Sala 3":"Sala 3","Sala 4":"Sala 4","Sala 5":"Sala 5","Sala 6":"Sala 6","Sala Villarica":"Villarica"};
var COLORES= {"Sala 1":"#AB47BC","Sala 2":"#29B6F6","Sala 3":"#FF5722","Sala 4":"#26C6A6","Sala 5":"#C6D000","Sala 6":"#00BCD4","Sala Villarica":"#2196F3"};

function pad(n){ return n<10?"0"+n:""+n; }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtH(iso){ var d=new Date(iso); return pad(d.getHours())+":"+pad(d.getMinutes()); }
function soloFecha(d){ var x=new Date(d); x.setHours(0,0,0,0); return x.getTime(); }
function getLunes(f){ var d=new Date(f),dow=d.getDay(); d.setDate(d.getDate()+(dow===0?-6:1-dow)); d.setHours(0,0,0,0); return d; }

function tickClock(){
  var n=new Date();
  document.getElementById("clk-time").textContent = pad(n.getHours())+":"+pad(n.getMinutes());
  document.getElementById("clk-date").textContent = DIAS_FULL[n.getDay()]+" "+pad(n.getDate())+" "+MESES[n.getMonth()]+" "+n.getFullYear();
  var lun=getLunes(n), vie=new Date(lun); vie.setDate(lun.getDate()+4);
  document.getElementById("clk-meta").textContent =
    "Semana "+pad(lun.getDate())+"/"+pad(lun.getMonth()+1)+" – "+pad(vie.getDate())+"/"+pad(vie.getMonth()+1)
    +"  |  Act. "+pad(n.getHours())+":"+pad(n.getMinutes())+":"+pad(n.getSeconds());
}
setInterval(tickClock,1000); tickClock();

function getDims(){
  var tabla=document.getElementById("tabla");
  var TW=tabla.offsetWidth, TH=tabla.offsetHeight;
  var CW=210, HH=75, ND=5, NSW=SALAS.length;
  return { TW:TW, TH:TH, CW:CW, HH:HH, ND:ND, NSW:NSW,
           COLW:Math.floor((TW-CW)/ND), RH:Math.floor((TH-HH)/NSW) };
}

function renderGrid(data){
  var salas=data.salas||data;
  if(!salas||!salas.length){ ocultarOverlay(); return; }
  var D=getDims();
  var ahora=new Date(), ahoraMs=ahora.getTime();
  var lunes=getLunes(ahora), hoyTs=soloFecha(ahora);
  var map={};
  for(var i=0;i<salas.length;i++) map[salas[i].nombre]=salas[i];

  var tabla=document.getElementById("tabla");
  var viejos=tabla.querySelectorAll(".sala-row,.day-head");
  for(var i=0;i<viejos.length;i++) viejos[i].parentNode.removeChild(viejos[i]);

  /* Cabeceras días */
  var fh=document.getElementById("fila-header");
  for(var d=0;d<D.ND;d++){
    var fecha=new Date(lunes); fecha.setDate(lunes.getDate()+d);
    var esHoy=(soloFecha(fecha)===hoyTs);
    var dh=document.createElement("div");
    dh.className="day-head"+(esHoy?" hoy":"");
    dh.style.left=(D.CW+d*D.COLW)+"px";
    dh.style.width=D.COLW+"px";
    dh.innerHTML='<span class="day-head-nom">'+DIAS_CORT[d]+'</span>'
                +'<span class="day-head-fec">'+pad(fecha.getDate())+"/"+pad(fecha.getMonth()+1)+'</span>'
                +(esHoy?'<span class="hoy-badge">HOY</span>':"");
    fh.appendChild(dh);
  }

  /* Filas salas */
  for(var si=0;si<SALAS.length;si++){
    var nombre=SALAS[si], s=map[nombre];
    var row=document.createElement("div");
    row.className="sala-row";
    row.style.top=(D.HH+si*D.RH)+"px";
    row.style.height=D.RH+"px";

    var estadoColor=s?(s.estado==="ocupada"?"#FF7D10":s.estado==="pronto"?"#0047CC":"#1CB85B"):"#888";
    var estadoTxt=s?(s.estado==="ocupada"?"● Ocupada ahora":s.estado==="pronto"?"● Próxima reserva":"● Disponible"):"";

    var lbl=document.createElement("div"); lbl.className="sala-lbl";
    var cb=document.createElement("div"); cb.className="sala-colorbar";
    cb.style.background=COLORES[nombre]||"#0047CC";
    cb.style.height="60%";
    var info=document.createElement("div");
    info.innerHTML='<span class="sala-nombre">'+esc(SHORT[nombre]||nombre)+'</span>'
                  +'<span class="sala-estado" style="color:'+estadoColor+'">'+estadoTxt+'</span>';
    lbl.appendChild(cb); lbl.appendChild(info);
    row.appendChild(lbl);

    for(var d=0;d<D.ND;d++){
      var fecha=new Date(lunes); fecha.setDate(lunes.getDate()+d);
      var fechaTs=soloFecha(fecha), esHoy2=(fechaTs===hoyTs);
      var cell=document.createElement("div");
      cell.className="day-cell"+(esHoy2?" hoy":"");
      cell.style.left=(D.CW+d*D.COLW)+"px";
      cell.style.width=D.COLW+"px";

      var evsDia=[];
      if(s&&s.eventosSemana){
        for(var ei=0;ei<s.eventosSemana.length;ei++){
          var ev=s.eventosSemana[ei];
          if(soloFecha(new Date(ev.inicio))!==fechaTs) continue;
          if(esHoy2&&new Date(ev.fin).getTime()<=ahoraMs) continue;
          evsDia.push(ev);
        }
      }
      if(esHoy2&&s){
        if(s.actual&&soloFecha(new Date(s.actual.inicio))===fechaTs) evsDia.push(s.actual);
        if(s.proximas) for(var pi=0;pi<s.proximas.length;pi++){
          if(soloFecha(new Date(s.proximas[pi].inicio))===fechaTs) evsDia.push(s.proximas[pi]);
        }
        var seen={},uniq=[];
        for(var ei=0;ei<evsDia.length;ei++){
          if(!seen[evsDia[ei].inicio]){seen[evsDia[ei].inicio]=1;uniq.push(evsDia[ei]);}
        }
        evsDia=uniq;
      }

      if(evsDia.length===0){
        var lt=document.createElement("div"); lt.className="libre-txt"; lt.textContent="Sin reservas";
        cell.appendChild(lt);
      } else {
        evsDia.sort(function(a,b){return new Date(a.inicio)-new Date(b.inicio);});
        var EVH=Math.min(Math.floor((D.RH-10)/evsDia.length),72);
        var now=Date.now();
        for(var ei=0;ei<evsDia.length;ei++){
          var ev=evsDia[ei];
          var iniMs=new Date(ev.inicio).getTime(),finMs=new Date(ev.fin).getTime();
          var cls=iniMs<=now&&finMs>now?"ev-ocup":iniMs>now&&iniMs<=now+1800000?"ev-pronto":"ev-proxima";
          var blk=document.createElement("div");
          blk.className="ev-bloque "+cls;
          blk.style.top=(5+ei*(EVH+4))+"px";
          blk.style.height=EVH+"px";
          blk.innerHTML='<span class="ev-hora">'+fmtH(ev.inicio)+" – "+fmtH(ev.fin)+'</span>'
                       +(ev.creador?'<span class="ev-user">'+esc(ev.creador)+'</span>':"");
          cell.appendChild(blk);
        }
      }
      row.appendChild(cell);
    }
    tabla.appendChild(row);
  }
  ocultarOverlay();
}

function ocultarOverlay(){var ov=document.getElementById("overlay");if(ov)ov.style.display="none";}

var cbCount=0;
function cargarDatos(){
  cbCount++; var cn="cb"+cbCount;
  window[cn]=function(data){
    renderGrid(data);
    try{var el=document.getElementById("jsonp-script");if(el)el.parentNode.removeChild(el);delete window[cn];}catch(e){}
  };
  var sc=document.createElement("script"); sc.id="jsonp-script";
  sc.src=SCRIPT_URL+"?callback="+cn+"&t="+Date.now();
  document.head.appendChild(sc);
}
cargarDatos();
setInterval(cargarDatos,60000);
</script>
</body>
</html>
