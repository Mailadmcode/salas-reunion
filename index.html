<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <title>Salas de Reunion</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:1920px; height:1080px; overflow:hidden; background:#0A0E2E; color:#fff; font-family:Arial, Helvetica, sans-serif; }

    /* ══ HEADER ══ */
    #header { position:absolute; left:0; top:0; width:1920px; height:64px; background:#003399; border-bottom:4px solid #FF7D10; }
    #logo-img { position:absolute; left:20px; top:10px; height:42px; }
    #logo-sub { position:absolute; left:150px; top:24px; font-size:11px; letter-spacing:4px; text-transform:uppercase; color:#AECDFF; font-weight:700; border-left:2px solid #FF7D10; padding-left:12px; }
    #act-txt  { position:absolute; right:20px; top:5px;  font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#AECDFF; }
    #clk-time { position:absolute; right:20px; top:14px; font-size:40px; font-weight:800; letter-spacing:3px; color:#fff; }
    #clk-date { position:absolute; right:20px; top:58px; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#AECDFF; }

    /* ══ TABLA ══ */
    /* top:68 (header 64 + 4 gap), height=1080-68-8=1004 */
    #tabla { position:absolute; left:8px; top:68px; width:1904px; height:1004px; }

    /* Fila de cabecera de días */
    #fila-header { position:absolute; left:0; top:0; width:1904px; height:52px; }

    /* Celda de la esquina (label "Sala") */
    #corner {
      position:absolute; left:0; top:0; width:148px; height:52px;
      background:#001F70; border:1px solid rgba(255,255,255,0.2); border-radius:8px 0 0 0;
      font-size:13px; font-weight:900; letter-spacing:3px; text-transform:uppercase;
      color:#AECDFF; text-align:center; line-height:52px;
    }

    /* Cabeceras de días — 5 columnas, left calculado por JS */
    .day-head {
      position:absolute; top:0; height:52px;
      border:1px solid rgba(255,255,255,0.2);
      text-align:center; line-height:52px;
      font-size:15px; font-weight:900; letter-spacing:2px; text-transform:uppercase; color:#fff;
      background:#001F70;
    }
    .day-head.hoy { background:#CC3300; color:#fff; }
    .day-head span { font-size:11px; font-weight:400; color:#AECDFF; margin-left:6px; }
    .day-head.hoy span { color:#FFD0C0; }

    /* Filas de salas */
    .sala-row { position:absolute; left:0; width:1904px; }

    /* Etiqueta de sala (columna izquierda) */
    .sala-lbl {
      position:absolute; left:0; width:148px;
      background:#001F70; border:1px solid rgba(255,255,255,0.15);
      font-size:13px; font-weight:900; letter-spacing:1px; text-transform:uppercase;
      color:#fff; text-align:center;
      display:table; /* para centrado vertical sin flex */
    }
    .sala-lbl-inner { display:table-cell; vertical-align:middle; }
    .sala-dot { width:10px; height:10px; border-radius:5px; display:inline-block; margin-right:6px; vertical-align:middle; }

    /* Celdas de días dentro de cada sala-row */
    .day-cell {
      position:absolute;
      border:1px solid rgba(255,255,255,0.1);
      background:#0D1545;
      overflow:hidden;
    }
    .day-cell.hoy { background:#1A0A00; border-color:rgba(255,80,0,0.3); }
    .day-cell.libre-cell { }

    /* Texto "Libre" */
    .libre-txt {
      position:absolute; left:0; top:0; width:100%; height:100%;
      font-size:11px; color:rgba(255,255,255,0.2); font-style:italic;
      text-align:center;
      display:table;
    }
    .libre-txt span { display:table-cell; vertical-align:middle; }

    /* Eventos dentro de celda */
    .ev-bloque {
      position:absolute; left:4px; right:4px;
      border-radius:5px; padding:3px 6px;
      border-left:3px solid transparent; overflow:hidden;
    }
    .ev-ocup    { background:#C85200; border-color:#fff; }
    .ev-pronto  { background:#1A55CC; border-color:#fff; }
    .ev-proxima { background:rgba(100,140,255,0.18); border-color:rgba(100,140,255,0.5); }
    .ev-pasada  { background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.2); }
    .ev-hora  { font-size:11px; font-weight:700; color:#fff; display:block; white-space:nowrap; }
    .ev-user  { font-size:10px; color:rgba(255,255,255,0.85); display:block; white-space:nowrap; overflow:hidden; }
    .ev-pasada .ev-hora { color:#AECDFF; }
    .ev-pasada .ev-user { color:#7AA8FF; }
    .ev-proxima .ev-hora { color:#C8DFFF; }
    .ev-proxima .ev-user { color:#A0C0FF; }

    /* ══ OVERLAY ══ */
    #overlay { position:fixed; left:0; top:0; width:1920px; height:1080px; background:#0A0E2E; z-index:999; }
    .spinner { position:absolute; left:944px; top:490px; width:48px; height:48px; border:5px solid #002080; border-top-color:#FF7D10; border-radius:24px; -webkit-animation:spin .9s linear infinite; animation:spin .9s linear infinite; }
    .ov-txt  { position:absolute; left:0; top:556px; width:1920px; font-size:12px; color:#AECDFF; letter-spacing:4px; text-transform:uppercase; font-weight:700; text-align:center; }
    @-webkit-keyframes spin { to { -webkit-transform:rotate(360deg); } }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<div id="overlay"><div class="spinner"></div><span class="ov-txt">Cargando...</span></div>

<div id="header">
  <img id="logo-img" src="https://i.imgur.com/fXLdGez.png" alt="Prodalam"/>
  <span id="logo-sub">Estado en tiempo real</span>
  <span id="act-txt">Actualizando...</span>
  <span id="clk-time">--:--</span>
  <span id="clk-date">---</span>
</div>

<div id="tabla">
  <div id="fila-header">
    <div id="corner">Sala</div>
  </div>
  <!-- filas generadas por JS -->
</div>

<script>
var SCRIPT_URL="https://script.google.com/macros/s/AKfycbyn7VSKT-IFULCC2bPx2SlK2W2GlaXQNoKZ44WLQq5Ev94ESTC45vlJgcpmPgaN_IYQ/exec";

var DIAS_SHORT=["Dom","Lun","Mar","Mie","Jue","Vie","Sab"];
var DIAS_FULL =["Domingo","Lunes","Martes","Miercoles","Jueves","Viernes","Sabado"];
var MESES     =["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
var DIAS_SEM  =["Lunes","Martes","Miercoles","Jueves","Viernes"];

function pad(n){ return n<10?"0"+n:""+n; }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtH(iso){ var d=new Date(iso); return pad(d.getHours())+":"+pad(d.getMinutes()); }
function soloFecha(iso){ var d=new Date(iso); d.setHours(0,0,0,0); return d.getTime(); }

function getLunes(fecha){
  var d=new Date(fecha); var dow=d.getDay();
  var diff=(dow===0)?-6:1-dow;
  d.setDate(d.getDate()+diff); d.setHours(0,0,0,0); return d;
}

/* Reloj */
function tickClock(){
  var n=new Date();
  document.getElementById("clk-time").innerHTML=pad(n.getHours())+":"+pad(n.getMinutes());
  document.getElementById("clk-date").innerHTML=DIAS_FULL[n.getDay()]+" "+pad(n.getDate())+" "+MESES[n.getMonth()]+" "+n.getFullYear();
}
setInterval(tickClock,1000); tickClock();

/* Layout dims */
// tabla: 1904 x 1004
// corner + 5 day cols: left=148, width=(1904-148)/5 = 351px cada una
var CORNER_W = 148;
var TABLE_W  = 1904;
var TABLE_H  = 1004;
var HEAD_H   = 52;
var N_DAYS   = 5;
var COL_W    = Math.floor((TABLE_W - CORNER_W) / N_DAYS); // 351
var SALAS_NAMES = ["Sala 1","Sala 2","Sala 3","Sala 4","Sala 5","Sala 6","Sala Villarica"];
var N_SALAS  = SALAS_NAMES.length; // 7
var ROW_H    = Math.floor((TABLE_H - HEAD_H) / N_SALAS); // ~136

var EST_COLORS = { libre:"#3ED68A", ocupada:"#FF7D10", pronto:"#5599FF", error:"#888" };

function renderGrid(data){
  var salas = data.salas || data;
  if(!salas||!salas.length){ ocultarOverlay(); return; }

  var ahora  = new Date();
  var lunes  = getLunes(ahora);
  var hoyTs  = soloFecha(ahora);

  // Construir mapa: nombre -> sala
  var salaMap = {};
  for(var i=0;i<salas.length;i++) salaMap[salas[i].nombre]=salas[i];

  // Limpiar tabla excepto corner
  var tabla = document.getElementById("tabla");
  var viejos = tabla.querySelectorAll(".sala-row,.day-head");
  for(var i=0;i<viejos.length;i++) viejos[i].parentNode.removeChild(viejos[i]);

  // ── Cabeceras de días ──
  var filaHead = document.getElementById("fila-header");
  for(var d=0;d<N_DAYS;d++){
    var fecha = new Date(lunes); fecha.setDate(lunes.getDate()+d);
    var esHoy = (soloFecha(fecha)===hoyTs);
    var dh = document.createElement("div");
    dh.className = "day-head" + (esHoy?" hoy":"");
    dh.style.left  = (CORNER_W + d*COL_W)+"px";
    dh.style.width  = COL_W+"px";
    dh.style.borderRadius = (d===0?"0":"0")+" "+(d===N_DAYS-1?"8px":"0")+" 0 0";
    var nombreDia = DIAS_SEM[d];
    var numDia = pad(fecha.getDate())+"/"+pad(fecha.getMonth()+1);
    dh.innerHTML = nombreDia+"<span>"+numDia+"</span>";
    filaHead.appendChild(dh);
  }

  // ── Filas de salas ──
  for(var si=0;si<SALAS_NAMES.length;si++){
    var nombreSala = SALAS_NAMES[si];
    var s = salaMap[nombreSala];
    var topRow = HEAD_H + si*ROW_H;

    var row = document.createElement("div");
    row.className = "sala-row";
    row.style.top    = topRow+"px";
    row.style.height = ROW_H+"px";

    // Label sala
    var color = s ? (EST_COLORS[s.estado]||"#888") : "#888";
    var lbl = document.createElement("div");
    lbl.className = "sala-lbl";
    lbl.style.height = ROW_H+"px";
    lbl.style.borderRadius = (si===SALAS_NAMES.length-1?"0 0 0 8px":"0");
    var shortName = nombreSala==="Sala Villarica"?"S. Villarica":nombreSala;
    lbl.innerHTML = '<div class="sala-lbl-inner"><div class="sala-dot" style="background:'+color+'"></div>'+esc(shortName)+'</div>';
    row.appendChild(lbl);

    // Celdas de días
    for(var d=0;d<N_DAYS;d++){
      var fecha = new Date(lunes); fecha.setDate(lunes.getDate()+d);
      var fechaTs = soloFecha(fecha);
      var esHoy   = (fechaTs===hoyTs);
      var isLast  = (si===SALAS_NAMES.length-1);
      var isLastD = (d===N_DAYS-1);

      var cell = document.createElement("div");
      cell.className = "day-cell"+(esHoy?" hoy":"");
      cell.style.left   = (CORNER_W + d*COL_W)+"px";
      cell.style.width  = COL_W+"px";
      cell.style.height = ROW_H+"px";
      cell.style.borderRadius = (isLast&&isLastD?"0 0 8px 0":isLast&&d===0?"0 0 0 0":"0");

      // Filtrar eventos de este día para esta sala
      var evsDia = [];
      if(s && s.eventosSemana){
        for(var ei=0;ei<s.eventosSemana.length;ei++){
          var ev = s.eventosSemana[ei];
          if(soloFecha(new Date(ev.inicio))===fechaTs) evsDia.push(ev);
        }
      }

      if(evsDia.length===0){
        // Libre
        var lt = document.createElement("div"); lt.className="libre-txt";
        lt.innerHTML='<span style="font-size:12px;color:rgba(255,255,255,0.2);font-style:italic;">Libre</span>';
        cell.appendChild(lt);
      } else {
        // Ordenar eventos por hora
        evsDia.sort(function(a,b){ return new Date(a.inicio)-new Date(b.inicio); });

        var EVH = Math.floor((ROW_H-8)/evsDia.length); // altura por evento
        EVH = Math.min(EVH, 50); // máximo 50px
        var now = Date.now();

        for(var ei=0;ei<evsDia.length;ei++){
          var ev = evsDia[ei];
          var iniMs = new Date(ev.inicio).getTime();
          var finMs = new Date(ev.fin).getTime();
          var cls;
          if(iniMs<=now && finMs>now)                    cls="ev-ocup";
          else if(iniMs>now && iniMs<=now+30*60*1000)    cls="ev-pronto";
          else if(finMs<=now)                             cls="ev-pasada";
          else                                            cls="ev-proxima";

          var bloque = document.createElement("div");
          bloque.className = "ev-bloque "+cls;
          bloque.style.top    = (4 + ei*(EVH+3))+"px";
          bloque.style.height = EVH+"px";
          bloque.innerHTML = '<span class="ev-hora">'+fmtH(ev.inicio)+" - "+fmtH(ev.fin)+'</span>'
                           + (ev.creador?'<span class="ev-user">'+esc(ev.creador)+'</span>':"");
          cell.appendChild(bloque);
        }
      }

      row.appendChild(cell);
    }

    tabla.appendChild(row);
  }

  // Actualizar header semana
  var viernes = new Date(lunes); viernes.setDate(lunes.getDate()+4);
  document.getElementById("act-txt").innerHTML =
    "Semana "+pad(lunes.getDate())+"/"+pad(lunes.getMonth()+1)+" - "+pad(viernes.getDate())+"/"+pad(viernes.getMonth()+1)
    +"   |   Act. "+pad(ahora.getHours())+":"+pad(ahora.getMinutes())+":"+pad(ahora.getSeconds());

  ocultarOverlay();
}

function ocultarOverlay(){ var ov=document.getElementById("overlay"); if(ov)ov.style.display="none"; }

var cbCount=0;
function cargarDatos(){
  cbCount++; var cn="cb"+cbCount;
  window[cn]=function(data){
    renderGrid(data);
    try{ var el=document.getElementById("jsonp-script"); if(el)el.parentNode.removeChild(el); delete window[cn]; }catch(e){}
  };
  var sc=document.createElement("script"); sc.id="jsonp-script";
  sc.src=SCRIPT_URL+"?callback="+cn+"&t="+Date.now();
  document.getElementsByTagName("head")[0].appendChild(sc);
}
cargarDatos();
setInterval(cargarDatos,60000);
</script>
</body>
</html>
