<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <title>Salas de Reunion</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    /* FIXED 1920x1080 CANVAS - compatible MagicInfo S3 */
    html, body { width:1920px; height:1080px; overflow:hidden; background:#020B3A; color:#fff; font-family:Arial, Helvetica, sans-serif; }

    /* HEADER */
    #header {
      position:absolute; left:0; top:0; width:1920px; height:70px;
      background:#003399;
      border-bottom:4px solid #FF7D10;
    }
    #logo-img  { position:absolute; left:24px; top:13px; height:44px; }
    #logo-sub  {
      position:absolute; left:160px; top:26px;
      font-size:11px; letter-spacing:4px; text-transform:uppercase;
      color:#AECDFF; font-weight:700;
      border-left:2px solid #FF7D10; padding-left:14px;
    }
    #leg-dot-d { position:absolute; left:670px;  top:29px; width:16px; height:16px; border-radius:8px; background:#3ED68A; }
    #leg-disp  { position:absolute; left:694px;  top:26px; font-size:15px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#E2E2E2; }
    #leg-dot-p { position:absolute; left:910px;  top:29px; width:16px; height:16px; border-radius:8px; background:#5599FF; }
    #leg-prox  { position:absolute; left:934px;  top:26px; font-size:15px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#E2E2E2; }
    #leg-dot-o { position:absolute; left:1180px; top:29px; width:16px; height:16px; border-radius:8px; background:#FF7D10; }
    #leg-ocup  { position:absolute; left:1204px; top:26px; font-size:15px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#E2E2E2; }
    #act-txt   { position:absolute; right:24px;  top:6px;  font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#AECDFF; }
    #clk-time  { position:absolute; right:24px;  top:16px; font-size:46px; font-weight:800; letter-spacing:4px; color:#fff; }
    #clk-date  { position:absolute; right:24px;  top:63px; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#AECDFF; }

    /* PLANO */
    #plano {
      position:absolute; left:10px; top:82px; width:290px; height:988px;
      background:#002080;
      border:2px solid rgba(200,200,255,0.3);
      border-radius:12px; overflow:hidden;
    }
    #plano-title {
      position:absolute; left:0; top:0; width:290px; height:34px;
      background:#C8D8FF;
      font-size:11px; letter-spacing:5px; text-transform:uppercase;
      color:#020B3A; text-align:center; line-height:34px; font-weight:900;
    }

    /* Celda genérica */
    .pr-room {
      position:absolute;
      border-radius:12px; border:2px solid rgba(255,255,255,0.4);
      text-align:center; overflow:hidden;
    }
    .pr-num { position:absolute; left:0; width:100%; font-size:26px; font-weight:900; color:#fff; text-align:center; }
    .pr-est { position:absolute; left:0; width:100%; font-size:9px;  font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,0.92); text-align:center; }

    /* Villarica */
    #pr-villarica           { left:10px; top:44px; width:270px; height:88px; }
    #pr-villarica .pr-num   { top:20px; }
    #pr-villarica .pr-est   { top:56px; }

    /* Col izquierda: S6, S4, S2 */
    #pr-6 { left:10px;  top:143px; width:126px; height:138px; }
    #pr-4 { left:10px;  top:291px; width:126px; height:138px; }
    #pr-2 { left:10px;  top:439px; width:126px; height:138px; }
    /* Col derecha:  S5, S3, S1 */
    #pr-5 { left:154px; top:143px; width:126px; height:138px; }
    #pr-3 { left:154px; top:291px; width:126px; height:138px; }
    #pr-1 { left:154px; top:439px; width:126px; height:138px; }

    #pr-6 .pr-num, #pr-5 .pr-num,
    #pr-4 .pr-num, #pr-3 .pr-num,
    #pr-2 .pr-num, #pr-1 .pr-num { top:36px; font-size:28px; }
    #pr-6 .pr-est, #pr-5 .pr-est,
    #pr-4 .pr-est, #pr-3 .pr-est,
    #pr-2 .pr-est, #pr-1 .pr-est { top:78px; }

    /* Estados */
    .libre   { background:#28A86E !important; border-color:rgba(255,255,255,0.5) !important; }
    .ocupada { background:#D95E00 !important; border-color:rgba(255,255,255,0.5) !important; }
    .pronto  { background:#2266DD !important; border-color:rgba(255,255,255,0.5) !important; }

    /* AREA CALENDARIO */
    #cal-area { position:absolute; left:310px; top:82px; width:1600px; height:988px; }

    /* Encabezados de columna */
    .col-head {
      position:absolute; top:0; height:70px;
      background:#003399;
      border:1px solid rgba(255,255,255,0.25);
      border-radius:10px 10px 0 0;
      text-align:center; overflow:hidden;
    }
    .col-head-short { display:block; margin-top:8px; font-size:22px; font-weight:900; text-transform:uppercase; letter-spacing:3px; color:#fff; }
    .col-head-full  { display:block; font-size:10px; color:#AECDFF; text-transform:uppercase; letter-spacing:1px; margin-top:2px; }
    .col-badge {
      display:inline-block; margin-top:4px;
      padding:3px 12px; border-radius:20px;
      font-size:10px; font-weight:800; letter-spacing:1px; text-transform:uppercase;
    }
    .b-libre   { background:#3ED68A; color:#012A1A; }
    .b-ocupada { background:#FF7D10; color:#fff; }
    .b-pronto  { background:#5599FF; color:#fff; }
    .b-error   { background:#444; color:#aaa; }

    /* Eje horas */
    #cal-axis { position:absolute; left:0; top:70px; width:54px; height:918px; }
    .axis-lbl { position:absolute; right:6px; font-size:11px; color:#7AA8FF; font-weight:700; white-space:nowrap; }

    /* Columnas */
    .cal-col {
      position:absolute; top:70px; height:918px;
      background:#001F70;
      border:1px solid rgba(255,255,255,0.15);
      border-radius:0 0 10px 10px; overflow:hidden;
    }
    .hour-line { position:absolute; left:0; right:0; height:1px; background:#fff; opacity:0.12; }
    .half-line { position:absolute; left:0; right:0; height:1px; background:#fff; opacity:0.05; }

    /* Eventos */
    .cal-event { position:absolute; left:4px; right:4px; border-radius:8px; padding:5px 8px; border-left:4px solid transparent; overflow:hidden; }
    .ev-ocup   { background:#C85200; border-color:#fff; }
    .ev-pronto { background:#1A55CC; border-color:#fff; }
    .ev-proxima{ background:rgba(255,255,255,0.09); border-color:rgba(255,255,255,0.3); }
    .ev-t { font-size:12px; font-weight:700; display:block; white-space:nowrap; color:#fff; }
    .ev-q { font-size:12px; font-weight:600; display:block; white-space:nowrap; overflow:hidden; color:#fff; }
    .ev-proxima .ev-t { color:#AECDFF; }
    .ev-proxima .ev-q { color:#7AA8FF; }

    /* Línea ahora */
    .now-line { position:absolute; left:0; right:0; height:3px; background:#FF7D10; z-index:10; }
    .now-dot  { position:absolute; left:-6px; top:-6px; width:14px; height:14px; border-radius:7px; background:#FF7D10; border:2px solid #fff; }

    /* OVERLAY */
    #overlay { position:fixed; left:0; top:0; width:1920px; height:1080px; background:#020B3A; z-index:999; }
    .spinner {
      position:absolute; left:944px; top:490px; width:48px; height:48px;
      border:5px solid #002080; border-top-color:#FF7D10; border-radius:24px;
      -webkit-animation:spin .9s linear infinite; animation:spin .9s linear infinite;
    }
    .ov-txt { position:absolute; left:0; top:556px; width:1920px; font-size:12px; color:#AECDFF; letter-spacing:4px; text-transform:uppercase; font-weight:700; text-align:center; }
    @-webkit-keyframes spin { to { -webkit-transform:rotate(360deg); } }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<div id="overlay">
  <div class="spinner"></div>
  <span class="ov-txt">Cargando...</span>
</div>

<div id="header">
  <img id="logo-img" src="https://i.imgur.com/fXLdGez.png" alt="Prodalam"/>
  <span id="logo-sub">Estado en tiempo real</span>
  <div id="leg-dot-d"></div><span id="leg-disp">Disponible</span>
  <div id="leg-dot-p"></div><span id="leg-prox">Proxima (&lt;30 min)</span>
  <div id="leg-dot-o"></div><span id="leg-ocup">Ocupada</span>
  <span id="act-txt">Actualizando...</span>
  <span id="clk-time">--:--</span>
  <span id="clk-date">---</span>
</div>

<div id="plano">
  <div id="plano-title">Plano de Salas</div>
  <div class="pr-room libre" id="pr-villarica"><span class="pr-num">VLL</span><span class="pr-est">Disponible</span></div>
  <div class="pr-room libre" id="pr-6"><span class="pr-num">S.6</span><span class="pr-est">Disponible</span></div>
  <div class="pr-room libre" id="pr-5"><span class="pr-num">S.5</span><span class="pr-est">Disponible</span></div>
  <div class="pr-room libre" id="pr-4"><span class="pr-num">S.4</span><span class="pr-est">Disponible</span></div>
  <div class="pr-room libre" id="pr-3"><span class="pr-num">S.3</span><span class="pr-est">Disponible</span></div>
  <div class="pr-room libre" id="pr-2"><span class="pr-num">S.2</span><span class="pr-est">Disponible</span></div>
  <div class="pr-room libre" id="pr-1"><span class="pr-num">S.1</span><span class="pr-est">Disponible</span></div>
</div>

<div id="cal-area">
  <div id="cal-axis"></div>
</div>

<script>
var SCRIPT_URL="https://script.google.com/macros/s/AKfycbyn7VSKT-IFULCC2bPx2SlK2W2GlaXQNoKZ44WLQq5Ev94ESTC45vlJgcpmPgaN_IYQ/exec";
var HORA_INI=7, HORA_FIN=21, TOTAL_H=14;
var DIAS=["Domingo","Lunes","Martes","Miercoles","Jueves","Viernes","Sabado"];
var MESES=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
var COL_HEIGHT=918;

function pad(n){ return n<10?"0"+n:""+n; }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtH(iso){ if(!iso)return"--:--"; var d=new Date(iso); return pad(d.getHours())+":"+pad(d.getMinutes()); }
function horaPx(iso){ var d=new Date(iso),m=(d.getHours()-HORA_INI)*60+d.getMinutes(); return Math.round(Math.max(0,Math.min(1,m/(TOTAL_H*60)))*COL_HEIGHT); }

function tickClock(){
  var n=new Date();
  document.getElementById("clk-time").innerHTML=pad(n.getHours())+":"+pad(n.getMinutes());
  document.getElementById("clk-date").innerHTML=DIAS[n.getDay()]+" "+pad(n.getDate())+" "+MESES[n.getMonth()]+" "+n.getFullYear();
}
setInterval(tickClock,1000); tickClock();

function buildAxis(){
  var ax=document.getElementById("cal-axis"); ax.innerHTML="";
  var rowH=COL_HEIGHT/TOTAL_H;
  for(var h=HORA_INI;h<=HORA_FIN;h++){
    var lbl=document.createElement("span"); lbl.className="axis-lbl";
    lbl.style.top=Math.round((h-HORA_INI)*rowH-7)+"px";
    lbl.innerHTML=(h<12?h+"AM":(h===12?"12PM":(h-12)+"PM"));
    ax.appendChild(lbl);
  }
}

function buildLines(col){
  var rowH=COL_HEIGHT/TOTAL_H;
  for(var h=0;h<=TOTAL_H;h++){
    var top=Math.round(h*rowH);
    var l=document.createElement("div"); l.className="hour-line"; l.style.top=top+"px"; col.appendChild(l);
    if(h<TOTAL_H){
      var lh=document.createElement("div"); lh.className="half-line"; lh.style.top=(top+Math.round(rowH/2))+"px"; col.appendChild(lh);
    }
  }
}

function buildNow(col){
  var now=new Date(),mins=(now.getHours()-HORA_INI)*60+now.getMinutes();
  if(mins<0||mins>TOTAL_H*60)return;
  var top=Math.round(mins/(TOTAL_H*60)*COL_HEIGHT);
  var l=document.createElement("div"); l.className="now-line"; l.style.top=top+"px";
  l.innerHTML='<div class="now-dot"></div>'; col.appendChild(l);
}

function buildEvent(col,ev,cls){
  var top=horaPx(ev.inicio), bot=horaPx(ev.fin), h=Math.max(bot-top,18);
  var d=document.createElement("div"); d.className="cal-event "+cls;
  d.style.top=top+"px"; d.style.height=h+"px";
  d.innerHTML='<span class="ev-t">'+fmtH(ev.inicio)+" - "+fmtH(ev.fin)+"</span>"+(ev.creador?'<span class="ev-q">'+esc(ev.creador)+"</span>":"");
  col.appendChild(d);
}

var PLANO_MAP={"Sala 1":"pr-1","Sala 2":"pr-2","Sala 3":"pr-3","Sala 4":"pr-4","Sala 5":"pr-5","Sala 6":"pr-6","Sala Villarica":"pr-villarica"};
var EST_TXT={libre:"Disponible",ocupada:"Ocupada",pronto:"Proxima",error:"Error"};
function updatePlano(salas){
  for(var i=0;i<salas.length;i++){
    var s=salas[i],id=PLANO_MAP[s.nombre]; if(!id)continue;
    var el=document.getElementById(id); if(!el)continue;
    el.className=el.className.replace(/\s*(libre|ocupada|pronto|error)/g,"")+" "+(s.estado||"error");
    var est=el.querySelector(".pr-est"); if(est)est.innerHTML=EST_TXT[s.estado]||"";
  }
}

var SHORT={"Sala 1":"S.1","Sala 2":"S.2","Sala 3":"S.3","Sala 4":"S.4","Sala 5":"S.5","Sala 6":"S.6","Sala Villarica":"VLL"};

function renderGrid(salas){
  if(!salas||!salas.length){ocultarOverlay();return;}
  buildAxis(); updatePlano(salas);

  var area=document.getElementById("cal-area");
  var old=area.querySelectorAll(".cal-col,.col-head");
  for(var i=0;i<old.length;i++) old[i].parentNode.removeChild(old[i]);

  var n=salas.length, gap=4, axisW=54;
  var totalW=1600-axisW;
  var colW=Math.floor((totalW-gap*(n-1))/n);

  for(var i=0;i<n;i++){
    var s=salas[i];
    var lft=axisW+i*(colW+gap);
    var bc=s.estado==="libre"?"b-libre":s.estado==="ocupada"?"b-ocupada":s.estado==="pronto"?"b-pronto":"b-error";
    var bt=s.estado==="libre"?"Disponible":s.estado==="ocupada"?"Ocupada":s.estado==="pronto"?"Proxima":"Error";
    var sh=SHORT[s.nombre]||s.nombre;

    var ch=document.createElement("div"); ch.className="col-head";
    ch.style.left=lft+"px"; ch.style.width=colW+"px";
    ch.innerHTML='<span class="col-head-short">'+sh+'</span><span class="col-head-full">'+esc(s.nombre)+'</span><span class="col-badge '+bc+'">'+bt+'</span>';
    area.appendChild(ch);

    var col=document.createElement("div"); col.className="cal-col";
    col.style.left=lft+"px"; col.style.width=colW+"px";
    buildLines(col);
    if(s.actual) buildEvent(col,s.actual,"ev-ocup");
    if(s.proximas){
      for(var j=0;j<s.proximas.length;j++){
        var ev=s.proximas[j];
        buildEvent(col,ev,(new Date(ev.inicio)-Date.now()<30*60*1000)?"ev-pronto":"ev-proxima");
      }
    }
    buildNow(col);
    area.appendChild(col);
  }

  var n2=new Date();
  document.getElementById("act-txt").innerHTML="Act. "+pad(n2.getHours())+":"+pad(n2.getMinutes())+":"+pad(n2.getSeconds());
  ocultarOverlay();
}

function ocultarOverlay(){ var ov=document.getElementById("overlay"); if(ov)ov.style.display="none"; }

var cbCount=0;
function cargarDatos(){
  cbCount++; var cn="cb"+cbCount;
  window[cn]=function(data){
    renderGrid(data.salas||data);
    try{ var el=document.getElementById("jsonp-script"); if(el)el.parentNode.removeChild(el); delete window[cn]; }catch(e){}
  };
  var sc=document.createElement("script"); sc.id="jsonp-script";
  sc.src=SCRIPT_URL+"?callback="+cn+"&t="+Date.now();
  document.getElementsByTagName("head")[0].appendChild(sc);
}
cargarDatos();
setInterval(cargarDatos,60000);
setInterval(function(){
  var cols=document.querySelectorAll(".cal-col");
  for(var i=0;i<cols.length;i++){
    var nls=cols[i].querySelectorAll(".now-line");
    for(var j=0;j<nls.length;j++) nls[j].parentNode.removeChild(nls[j]);
    buildNow(cols[i]);
  }
},60000);
</script>
</body>
</html>
