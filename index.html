<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salas de Reunion – Prodalam</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; overflow:hidden;
      background:#f0f4fa;
      font-family:Arial, Helvetica, sans-serif;
    }
    .app { display:flex; flex-direction:column; width:100vw; height:100vh; }

    /* ══════════════════════════════════════
       HEADER — altura fija, 3 zonas claras
    ══════════════════════════════════════ */
    .header {
      flex-shrink:0; height:80px;
      background:#00267C;
      border-bottom:5px solid #FF7D10;
      display:flex; align-items:center;
      padding:0 28px;
    }
    /* Logo — 25% */
    .h-logo-zone {
      flex:0 0 25%;
      display:flex; align-items:center; gap:12px;
      border-right:1px solid rgba(255,255,255,0.2);
      padding-right:20px;
    }
    .h-logo { height:44px; display:block; }
    .h-sub  {
      font-size:11px; letter-spacing:2px; text-transform:uppercase;
      color:#AECDFF; font-weight:600; white-space:nowrap;
    }

    /* Leyenda — 50% */
    .h-legend-zone {
      flex:0 0 50%;
      display:flex; align-items:center; justify-content:center; gap:36px;
    }
    .leg { display:flex; align-items:center; gap:10px; }
    .leg-dot { width:16px; height:16px; border-radius:50%; flex-shrink:0; }
    .leg-txt { font-size:16px; font-weight:700; color:#fff; white-space:nowrap; }

    /* Reloj — 25% */
    .h-clock-zone {
      flex:0 0 25%;
      display:flex; flex-direction:column; align-items:flex-end;
      border-left:1px solid rgba(255,255,255,0.2);
      padding-left:20px;
    }
    .clk-meta  { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#AECDFF; white-space:nowrap; }
    .clk-time  { font-size:52px; font-weight:900; letter-spacing:4px; color:#fff; line-height:1; }
    .clk-fecha { font-size:12px; letter-spacing:2px; text-transform:uppercase; color:#AECDFF; white-space:nowrap; }

    /* ══════════════════════════════════════
       MAIN
    ══════════════════════════════════════ */
    .main { flex:1; display:flex; overflow:hidden; min-height:0; padding:10px; gap:10px; }

    /* ══ PLANO ══ */
    .plano {
      flex-shrink:0; width:190px;
      background:#00267C;
      border:2px solid #0A52C6;
      border-radius:12px;
      display:flex; flex-direction:column; overflow:hidden;
    }
    .plano-hdr {
      background:#0A52C6; padding:10px 6px;
      font-size:12px; letter-spacing:3px; text-transform:uppercase;
      color:#fff; text-align:center; font-weight:900; flex-shrink:0;
    }
    .plano-body {
      flex:1; display:flex; flex-direction:column;
      padding:10px; gap:8px; min-height:0;
    }
    .pr-vll {
      flex-shrink:0; height:62px; border-radius:10px;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
      border:2px solid #1a5a30; background:#1a5a30;
      transition:background .3s, border-color .3s;
    }
    .pr-grid {
      flex:1; display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:repeat(3,1fr);
      gap:8px; min-height:0;
    }
    .pr-room {
      border-radius:10px; border:2px solid #1a5a30; background:#1a5a30;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
      transition:background .3s, border-color .3s;
    }
    .st-libre   { background:#1a6b3a !important; border-color:#2ecc71 !important; }
    .st-ocupada { background:#c44a00 !important; border-color:#FF7D10 !important; }
    .st-pronto  { background:#1a3a7a !important; border-color:#AECDFF !important; }

    .pr-num { font-size:clamp(18px,1.8vw,30px); font-weight:900; color:#fff; line-height:1; }
    .pr-lbl { font-size:clamp(7px,0.6vw,10px); font-weight:700; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,.85); }

    /* ══ TABLA ══ */
    .tabla { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; background:#fff; border-radius:12px; border:1px solid #dde3f0; }

    /* Cabecera días */
    .tb-head { flex-shrink:0; display:flex; border-bottom:3px solid #FF7D10; }
    .th-sala {
      flex:0 0 130px; background:#00267C;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:#fff;
      border-right:2px solid #FF7D10;
    }
    .th-dia {
      flex:1; background:#00267C; padding:10px 6px; text-align:center;
      border-right:1px solid rgba(255,255,255,0.15);
    }
    .th-dia:last-child { border-right:none; }
    .th-dia.hoy { background:#0A52C6; border-bottom:3px solid #FF7D10; }
    .th-dia-nombre {
      font-size:clamp(13px,1.3vw,20px); font-weight:900;
      text-transform:uppercase; letter-spacing:2px; color:#fff; display:block;
    }
    .th-dia-fecha {
      font-size:clamp(10px,0.8vw,13px); color:#AECDFF;
      letter-spacing:1px; display:block; margin-top:3px;
    }
    .th-dia.hoy .th-dia-fecha { color:#FFD080; }

    /* Cuerpo */
    .tb-body { flex:1; display:flex; flex-direction:column; min-height:0; overflow:hidden; }
    .tb-row  { flex:1; display:flex; border-bottom:1px solid #dde3f0; min-height:0; }
    .tb-row:last-child { border-bottom:none; }

    /* Celda sala */
    .tc-sala {
      flex:0 0 130px; background:#f8faff;
      border-right:2px solid #FF7D10;
      display:flex; align-items:center; padding:0 14px; gap:10px;
      flex-shrink:0;
    }
    .sala-barra { width:5px; height:70%; border-radius:3px; flex-shrink:0; background:#2ecc71; }
    .sala-barra.ocupada { background:#FF7D10; }
    .sala-barra.pronto  { background:#AECDFF; }
    .sala-info { display:flex; flex-direction:column; gap:2px; }
    .sala-nombre  { font-size:clamp(13px,1.2vw,18px); font-weight:900; color:#00267C; }
    .sala-estado  { font-size:clamp(9px,0.7vw,11px); font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#2ecc71; }
    .sala-estado.ocupada { color:#FF7D10; }
    .sala-estado.pronto  { color:#0A52C6; }

    /* Celda día */
    .tc-dia {
      flex:1; position:relative; overflow:hidden;
      border-right:1px solid #dde3f0; background:#fff;
    }
    .tc-dia:last-child { border-right:none; }
    .tc-dia.hoy { background:#f0f6ff; }
    .tc-libre-txt {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      font-size:clamp(11px,0.85vw,14px); color:#b0bcd0; font-style:italic;
    }

    /* Evento */
    .ev-block {
      position:absolute; left:5px; right:5px;
      border-radius:6px; padding:5px 8px; overflow:hidden;
      border-left:5px solid transparent;
    }
    .ev-block.ocupada { background:#fff3ec; border-color:#FF7D10; }
    .ev-block.pronto  { background:#eaf0ff; border-color:#0A52C6; }
    .ev-block.proxima { background:#eafaf1; border-color:#2ecc71; }
    .ev-hora  { font-size:clamp(11px,0.9vw,14px); font-weight:900; display:block; white-space:nowrap; color:#333; }
    .ev-quien { font-size:clamp(12px,1vw,15px); font-weight:700; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#00267C; }
    .ev-block.ocupada .ev-hora { color:#c44a00; }
    .ev-block.pronto  .ev-hora { color:#0A52C6; }
    .ev-block.proxima .ev-hora { color:#1a6b3a; }

    /* Overlay */
    #overlay {
      position:fixed; inset:0; background:#00267C; z-index:999;
      display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px;
    }
    .spinner { width:48px; height:48px; border:5px solid rgba(255,255,255,.2); border-top-color:#FF7D10; border-radius:50%; animation:spin .9s linear infinite; }
    .ov-txt { font-size:13px; color:#fff; letter-spacing:3px; text-transform:uppercase; font-weight:700; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<div id="overlay">
  <div class="spinner"></div>
  <span class="ov-txt">Cargando...</span>
</div>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="h-logo-zone">
      <img src="https://i.imgur.com/fXLdGez.png" class="h-logo" alt="Prodalam"/>
      <span class="h-sub">Tiempo real</span>
    </div>
    <div class="h-legend-zone">
      <div class="leg"><div class="leg-dot" style="background:#2ecc71"></div><span class="leg-txt">Disponible</span></div>
      <div class="leg"><div class="leg-dot" style="background:#AECDFF"></div><span class="leg-txt">Próxima &lt;30 min</span></div>
      <div class="leg"><div class="leg-dot" style="background:#FF7D10"></div><span class="leg-txt">Ocupada</span></div>
    </div>
    <div class="h-clock-zone">
      <span class="clk-meta"  id="clkMeta">---</span>
      <span class="clk-time"  id="clkTime">--:--</span>
      <span class="clk-fecha" id="clkFecha">---</span>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- PLANO — orden visual: VLL arriba, S6/S5, S4/S3, S2/S1 -->
    <div class="plano">
      <div class="plano-hdr">Plano de Salas</div>
      <div class="plano-body">
        <div class="pr-vll st-libre" id="pr-villarica">
          <div class="pr-num">VLL</div>
          <div class="pr-lbl">Villarica</div>
        </div>
        <div class="pr-grid">
          <div class="pr-room st-libre" id="pr-6"><div class="pr-num">S.6</div><div class="pr-lbl">Disponible</div></div>
          <div class="pr-room st-libre" id="pr-5"><div class="pr-num">S.5</div><div class="pr-lbl">Disponible</div></div>
          <div class="pr-room st-libre" id="pr-4"><div class="pr-num">S.4</div><div class="pr-lbl">Disponible</div></div>
          <div class="pr-room st-libre" id="pr-3"><div class="pr-num">S.3</div><div class="pr-lbl">Disponible</div></div>
          <div class="pr-room st-libre" id="pr-2"><div class="pr-num">S.2</div><div class="pr-lbl">Disponible</div></div>
          <div class="pr-room st-libre" id="pr-1"><div class="pr-num">S.1</div><div class="pr-lbl">Disponible</div></div>
        </div>
      </div>
    </div>

    <!-- TABLA -->
    <div class="tabla">
      <div class="tb-head" id="tb-head"></div>
      <div class="tb-body" id="tb-body"></div>
    </div>

  </div>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyn7VSKT-IFULCC2bPx2SlK2W2GlaXQNoKZ44WLQq5Ev94ESTC45vlJgcpmPgaN_IYQ/exec";

var DIAS_FULL  = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
var DIAS_CORTO = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
var MESES      = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

function pad(n){ return n<10?"0"+n:""+n; }

function tickClock(){
  var n=new Date();
  document.getElementById("clkTime").textContent  = pad(n.getHours())+":"+pad(n.getMinutes());
  document.getElementById("clkFecha").textContent = DIAS_FULL[n.getDay()]+" "+pad(n.getDate())+" "+MESES[n.getMonth()]+" "+n.getFullYear();
  var lun=new Date(n); lun.setDate(n.getDate()-(n.getDay()===0?6:n.getDay()-1));
  var vie=new Date(lun); vie.setDate(lun.getDate()+4);
  document.getElementById("clkMeta").textContent  =
    "Semana "+pad(lun.getDate())+"/"+pad(lun.getMonth()+1)+" – "+pad(vie.getDate())+"/"+pad(vie.getMonth()+1)
    +"  |  Act. "+pad(n.getHours())+":"+pad(n.getMinutes())+":"+pad(n.getSeconds());
}
setInterval(tickClock,1000); tickClock();

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtH(iso){ if(!iso)return"--:--"; var d=new Date(iso); return pad(d.getHours())+":"+pad(d.getMinutes()); }

function diasSemana(){
  var hoy=new Date(), dias=[], lun=new Date(hoy);
  lun.setDate(hoy.getDate()-(hoy.getDay()===0?6:hoy.getDay()-1));
  for(var i=0;i<5;i++){ var d=new Date(lun); d.setDate(lun.getDate()+i); dias.push(d); }
  return dias;
}
function mismodia(iso,fecha){
  var d=new Date(iso);
  return d.getDate()===fecha.getDate()&&d.getMonth()===fecha.getMonth()&&d.getFullYear()===fecha.getFullYear();
}

/* PLANO */
var PLANO_MAP={"Sala 1":"pr-1","Sala 2":"pr-2","Sala 3":"pr-3","Sala 4":"pr-4","Sala 5":"pr-5","Sala 6":"pr-6","Sala Villarica":"pr-villarica"};
function updatePlano(salas){
  for(var i=0;i<salas.length;i++){
    var s=salas[i], id=PLANO_MAP[s.nombre]; if(!id)continue;
    var el=document.getElementById(id); if(!el)continue;
    el.className=el.className.replace(/\s*st-(libre|ocupada|pronto|error)/g,"");
    el.className+=" st-"+(s.estado==="ocupada"?"ocupada":s.estado==="pronto"?"pronto":"libre");
    var lbl=el.querySelector(".pr-lbl");
    if(lbl) lbl.textContent=s.estado==="ocupada"?"Ocupada":s.estado==="pronto"?"Próxima":"Disponible";
  }
}

/* Orden INVERTIDO: Villarica primero (arriba), Sala 1 último (abajo) */
var ORDEN = ["Sala Villarica","Sala 6","Sala 5","Sala 4","Sala 3","Sala 2","Sala 1"];
var SHORT = {"Sala 1":"Sala 1","Sala 2":"Sala 2","Sala 3":"Sala 3","Sala 4":"Sala 4","Sala 5":"Sala 5","Sala 6":"Sala 6","Sala Villarica":"Villarica"};
var COLORES_BARRA = {"Sala 1":"#9B59B6","Sala 2":"#3498DB","Sala 3":"#E74C3C","Sala 4":"#2ECC71","Sala 5":"#F1C40F","Sala 6":"#1ABC9C","Sala Villarica":"#0A52C6"};

function renderGrid(salas){
  if(!salas||!salas.length){ ocultarOverlay(); return; }
  updatePlano(salas);

  var dias=diasSemana(), hoy=new Date();
  var idx={};
  for(var i=0;i<salas.length;i++) idx[salas[i].nombre]=salas[i];

  /* CABECERA */
  var head=document.getElementById("tb-head");
  head.innerHTML='<div class="th-sala">SALA</div>';
  for(var d=0;d<dias.length;d++){
    var dia=dias[d];
    var esHoy=(dia.getDate()===hoy.getDate()&&dia.getMonth()===hoy.getMonth());
    var th=document.createElement("div");
    th.className="th-dia"+(esHoy?" hoy":"");
    th.innerHTML='<span class="th-dia-nombre">'+DIAS_CORTO[dia.getDay()]+'</span>'
                +'<span class="th-dia-fecha">'+pad(dia.getDate())+"/"+pad(dia.getMonth()+1)+'</span>';
    head.appendChild(th);
  }

  /* FILAS — orden Villarica → Sala 1 */
  var body=document.getElementById("tb-body");
  body.innerHTML="";

  for(var r=0;r<ORDEN.length;r++){
    var nombre=ORDEN[r], sala=idx[nombre];
    if(!sala) continue;

    var estadoActual = sala.estado||"libre";
    var fila=document.createElement("div");
    fila.className="tb-row";

    /* Celda nombre sala */
    var cSala=document.createElement("div");
    cSala.className="tc-sala";
    var barraColor = COLORES_BARRA[nombre]||"#2ecc71";
    var estadoTxt  = estadoActual==="ocupada"?"Ocupada":estadoActual==="pronto"?"Próxima":"Disponible";
    var estadoCls  = estadoActual==="ocupada"?"ocupada":estadoActual==="pronto"?"pronto":"";
    cSala.innerHTML=
      '<div class="sala-barra '+estadoCls+'" style="background:'+barraColor+'"></div>'
     +'<div class="sala-info">'
     +'<span class="sala-nombre">'+esc(SHORT[nombre]||nombre)+'</span>'
     +'<span class="sala-estado '+estadoCls+'">● '+estadoTxt+'</span>'
     +'</div>';
    fila.appendChild(cSala);

    /* Celdas por día */
    for(var d=0;d<dias.length;d++){
      var dia=dias[d];
      var esHoy2=(dia.getDate()===hoy.getDate()&&dia.getMonth()===hoy.getMonth());
      var cDia=document.createElement("div");
      cDia.className="tc-dia"+(esHoy2?" hoy":"");

      var evs=[];
      if(sala.actual&&mismodia(sala.actual.inicio,dia)) evs.push({ev:sala.actual,cls:"ocupada"});
      if(sala.proximas){
        for(var p=0;p<sala.proximas.length;p++){
          if(mismodia(sala.proximas[p].inicio,dia)){
            var cls2=(new Date(sala.proximas[p].inicio)-Date.now()<30*60*1000)?"pronto":"proxima";
            evs.push({ev:sala.proximas[p],cls:cls2});
          }
        }
      }

      if(evs.length===0){
        cDia.innerHTML='<span class="tc-libre-txt">Sin reservas</span>';
      } else {
        var pct=100/evs.length;
        for(var e=0;e<evs.length;e++){
          var blk=document.createElement("div");
          blk.className="ev-block "+evs[e].cls;
          blk.style.top=(e*pct+1)+"%";
          blk.style.height=(pct-2)+"%";
          blk.innerHTML='<span class="ev-hora">'+fmtH(evs[e].ev.inicio)+" – "+fmtH(evs[e].ev.fin)+'</span>'
                       +(evs[e].ev.creador?'<span class="ev-quien">'+esc(evs[e].ev.creador)+'</span>':"");
          cDia.appendChild(blk);
        }
      }
      fila.appendChild(cDia);
    }
    body.appendChild(fila);
  }
  ocultarOverlay();
}

function ocultarOverlay(){ var ov=document.getElementById("overlay"); if(ov)ov.style.display="none"; }

var cbCount=0;
function cargarDatos(){
  cbCount++; var cn="cb"+cbCount;
  window[cn]=function(data){
    renderGrid(data.salas||data);
    try{ var el=document.getElementById("jsonp-script"); if(el)el.parentNode.removeChild(el); delete window[cn]; }catch(e){}
  };
  var sc=document.createElement("script"); sc.id="jsonp-script";
  sc.src=SCRIPT_URL+"?callback="+cn+"&t="+Date.now(); document.head.appendChild(sc);
}
cargarDatos();
setInterval(cargarDatos,60000);
</script>
</body>
</html>
