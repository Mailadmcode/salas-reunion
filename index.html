<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <title>Salas – Prodalam</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%; overflow:hidden;
      background:#EEF2FB;
      font-family:'Barlow', Arial, sans-serif;
    }

    #header {
      width:100%; height:88px;
      background:#fff;
      border-bottom:6px solid #FF7D10;
      display:table;
      table-layout:fixed;
    }
    .h-logo-zone {
      display:table-cell;
      width:22%;
      vertical-align:middle;
      padding:0 20px;
      border-right:2px solid #E0E8F4;
    }
    .h-logo-inner { display:table; }
    .h-logo-inner td { vertical-align:middle; padding-right:12px; }
    #logo-img { height:48px; display:block; }
    .h-sub {
      font-size:12px; letter-spacing:3px; text-transform:uppercase;
      color:#0047CC; font-weight:800; white-space:nowrap;
      font-family:'Barlow Condensed', sans-serif;
      border-left:3px solid #FF7D10; padding-left:10px;
    }
    .h-legend-zone {
      display:table-cell;
      width:56%;
      vertical-align:middle;
      text-align:center;
    }
    .h-legend-inner { display:inline-table; }
    .h-legend-inner td { vertical-align:middle; padding:0 18px; white-space:nowrap; }
    .leg-dot { width:20px; height:20px; border-radius:50%; display:inline-block; vertical-align:middle; margin-right:8px; }
    .leg-txt {
      font-size:20px; font-weight:800; color:#1A2E6E;
      font-family:'Barlow Condensed', sans-serif; letter-spacing:1px;
      vertical-align:middle;
    }
    .h-clock-zone {
      display:table-cell;
      width:22%;
      vertical-align:middle;
      text-align:right;
      padding:0 20px;
      border-left:2px solid #E0E8F4;
    }
    .clk-meta {
      font-size:11px; letter-spacing:1px; text-transform:uppercase;
      color:#5572A0; display:block; white-space:nowrap;
      font-family:'Barlow Condensed', sans-serif; font-weight:700;
    }
    #clk-time {
      font-size:58px; font-weight:900; letter-spacing:3px;
      color:#0047CC; line-height:1; display:block;
      font-family:'Barlow Condensed', sans-serif;
    }
    #clk-date {
      font-size:13px; letter-spacing:1px; text-transform:uppercase;
      color:#5572A0; display:block; white-space:nowrap;
      font-family:'Barlow Condensed', sans-serif; font-weight:700;
    }

    #tabla-wrap {
      width:100%;
      overflow:auto;
      background:#fff;
      border:2px solid #D0DCEE;
      margin:6px 10px 8px 10px;
      flex: 1;
    }

    #grid {
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    #grid thead tr { height:72px; background:#0047CC; }
    #grid thead td {
      background:#0047CC;
      border-right:1px solid rgba(255,255,255,0.15);
      border-bottom:5px solid #FF7D10;
      text-align:center;
      vertical-align:middle;
      padding:4px 0;
    }
    #grid thead td.corner {
      background:#003399;
      font-size:20px; font-weight:900; letter-spacing:3px;
      color:#fff; width:200px;
    }
    .dh-nom { font-size:28px; font-weight:900; color:#fff; display:block; }
    .dh-fec { font-size:16px; color:rgba(255,255,255,0.85); display:block; margin-top:1px; }
    .hoy-badge { background:#FF7D10; font-size:11px; padding:2px 8px; border-radius:4px; display:inline-block; margin-top:2px; }

    td.sala-lbl {
      background:#F4F7FF;
      border-right:3px solid #D8E4F4;
      vertical-align:middle;
      padding:0 12px;
      width:200px;
    }
    .sala-nombre {
      font-size:28px; font-weight:800; color:#0A1F5C;
      font-family:'Barlow Condensed', sans-serif; line-height:1; display:block;
    }
    .sala-estado {
      font-size:14px; font-weight:700; line-height:1;
      display:block; margin-top:3px;
    }

    td.day-cell {
      background:#fff;
      border-right:1px solid #E8EEF8;
      vertical-align:top;
      padding:4px 5px;
      overflow-y: auto;
    }
    td.day-cell.hoy {
      background:#F0F6FF;
      border-left:4px solid #FF7D10;
    }

    /* Eventos */
    .ev-container {
      width:100%;
      display:block;
    }
    .ev-bloque {
      display:block;
      width:100%;
      border-radius:8px;
      padding: 10px 12px;
      border-left:6px solid transparent;
      margin-bottom:6px;
      min-height: 68px;
    }
    .ev-ocup    { background:#FFF3EA; border-color:#FF7D10; }
    .ev-pronto  { background:#EBF0FF; border-color:#0047CC; }
    .ev-proxima { background:#EAF7EE; border-color:#1CB85B; }
    .ev-hora {
      font-size: 22px;
      font-weight:900;
      white-space:nowrap;
      font-family:'Barlow Condensed', sans-serif;
      line-height:1.2;
    }
    .ev-user {
      font-size: 18px;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-top: 4px;
    }
    .ev-ocup .ev-hora, .ev-ocup .ev-user { color:#CC5000; }
    .ev-pronto .ev-hora, .ev-pronto .ev-user { color:#0047CC; }
    .ev-proxima .ev-hora, .ev-proxima .ev-user { color:#0A6B30; }

    /* Ajuste cuando hay muchos eventos */
    .ev-container.muchos .ev-hora { font-size: 18px; }
    .ev-container.muchos .ev-user { font-size: 15px; }
    .ev-container.muchos .ev-bloque { padding: 6px 10px; min-height: 52px; margin-bottom:4px; }

    #overlay {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:#EEF2FB; z-index:999;
      text-align:center;
    }
    .spinner {
      width:56px; height:56px;
      border:7px solid #C8D8F0; border-top:7px solid #0047CC;
      border-radius:50%;
      display:inline-block;
      margin-top:40%;
    }
  </style>
</head>
<body>
<div id="overlay"><div class="spinner" id="spinner"></div><div>Cargando...</div></div>

<div id="header">
  <div class="h-logo-zone">
    <table class="h-logo-inner"><tr>
      <td><img id="logo-img" src="https://i.imgur.com/fXLdGez.png" onerror="this.style.display='none';document.getElementById('logo-txt').style.display='inline';" alt="Prodalam"/><span id="logo-txt" style="display:none;font-size:30px;font-weight:900;color:#0047CC;">Prodalam</span></td>
      <td><span class="h-sub">Tiempo real</span></td>
    </table></table>
  </div>
  <div class="h-legend-zone">
    <table class="h-legend-inner"><tr>
      <tr><span class="leg-dot" style="background:#1CB85B"></span><span class="leg-txt">Disponible</span></td>
      <tr><span class="leg-dot" style="background:#0047CC"></span><span class="leg-txt">Próxima &lt;30 min</span></td>
      <tr><span class="leg-dot" style="background:#FF7D10"></span><span class="leg-txt">Ocupada ahora</span></td>
    </table></table>
  </div>
  <div class="h-clock-zone">
    <span class="clk-meta" id="clk-meta">---</span>
    <span id="clk-time">--:--</span>
    <span id="clk-date">---</span>
  </div>
</div>

<div id="tabla-wrap">
  <table id="grid">
    <thead><tr><td class="corner">SALA</td></tr></thead>
    <tbody id="grid-body"></tbody>
  </table>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyn7VSKT-IFULCC2bPx2SlK2W2GlaXQNoKZ44WLQq5Ev94ESTC45vlJgcpmPgaN_IYQ/exec";
var DIAS_CORT = ["LUN","MAR","MIÉ","JUE","VIE"];
var MESES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
var DIAS_FULL = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];

// Orden: Sala 2,3,4,5,6, Villarica, Sala 1 (vacía)
var SALAS = ["Sala 2","Sala 3","Sala 4","Sala 5","Sala 6","Sala Villarica","Sala 1"];
var SHORT = {"Sala 1":"Sala 1","Sala 2":"Sala 2","Sala 3":"Sala 3","Sala 4":"Sala 4","Sala 5":"Sala 5","Sala 6":"Sala 6","Sala Villarica":"Villarica"};
var COLORES = {"Sala 1":"#AB47BC","Sala 2":"#29B6F6","Sala 3":"#FF5722","Sala 4":"#26C6A6","Sala 5":"#C6D000","Sala 6":"#00BCD4","Sala Villarica":"#2196F3"};

function pad(n){ return n<10?"0"+n:""+n; }
function esc(s){ return String(s||"").replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
function fmtH(iso){ var d=new Date(iso); return pad(d.getHours())+":"+pad(d.getMinutes()); }
function onlyDate(d){ var x=new Date(d); x.setHours(0,0,0,0); return x.getTime(); }

// Obtener días desde hoy hasta viernes (máximo 5)
function getDaysFromToday(now) {
  var today = new Date(now); today.setHours(0,0,0,0);
  var dayOfWeek = today.getDay(); // 0 domingo, 1 lunes...
  var start = new Date(today);
  var end = new Date(today);
  if (dayOfWeek === 0) { start.setDate(today.getDate()+1); end.setDate(today.getDate()+5); }
  else if (dayOfWeek === 6) { start.setDate(today.getDate()+2); end.setDate(today.getDate()+6); }
  else { end.setDate(today.getDate() + (5 - dayOfWeek)); }
  var days = [];
  var current = new Date(start);
  while (current <= end && days.length < 5) {
    days.push(new Date(current));
    current.setDate(current.getDate()+1);
  }
  return days;
}

// Spinner
var spinAngle=0, spinTimer;
function startSpinner(){
  var el=document.getElementById("spinner");
  spinTimer=setInterval(function(){
    spinAngle=(spinAngle+15)%360;
    if(el) el.style.cssText="width:56px;height:56px;border:7px solid #C8D8F0;border-top:7px solid #0047CC;border-radius:50%;display:inline-block;transform:rotate("+spinAngle+"deg);";
  },50);
}
function stopSpinner(){ if(spinTimer) clearInterval(spinTimer); var ov=document.getElementById("overlay"); if(ov) ov.style.display="none"; }
startSpinner();

// Reloj
function tickClock(){
  var n=new Date();
  document.getElementById("clk-time").innerHTML=pad(n.getHours())+":"+pad(n.getMinutes());
  document.getElementById("clk-date").innerHTML=DIAS_FULL[n.getDay()]+" "+pad(n.getDate())+" "+MESES[n.getMonth()]+" "+n.getFullYear();
  var lun = (function(d){ d.setDate(d.getDate()-(d.getDay()===0?6:d.getDay()-1)); d.setHours(0,0,0,0); return d;})(new Date(n));
  var vie = new Date(lun); vie.setDate(lun.getDate()+4);
  document.getElementById("clk-meta").innerHTML = "Semana "+pad(lun.getDate())+"/"+pad(lun.getMonth()+1)+" – "+pad(vie.getDate())+"/"+pad(vie.getMonth()+1)+"  |  Act. "+pad(n.getHours())+":"+pad(n.getMinutes())+":"+pad(n.getSeconds());
}
setInterval(tickClock,1000); tickClock();

// Ajuste de altura de fila: cada fila tendrá altura según su celda con más eventos, pero con un máximo
function ajustarAlturaFilas() {
  var rows = document.querySelectorAll("#grid-body tr");
  if(!rows.length) return;
  var maxAlturaPorFila = [];
  for(var i=0;i<rows.length;i++){
    var celdas = rows[i].querySelectorAll("td.day-cell");
    var maxAltura = 0;
    for(var c=0;c<celdas.length;c++){
      var evs = celdas[c].querySelectorAll(".ev-bloque");
      // Cada bloque tiene min-height 68px (o 52px si muchos) + margin-bottom 6px
      var alturaNecesaria = 0;
      for(var e=0;e<evs.length;e++){
        var bloque = evs[e];
        var estilo = window.getComputedStyle(bloque);
        var minH = parseInt(estilo.minHeight) || 68;
        var marginBottom = parseInt(estilo.marginBottom) || 6;
        alturaNecesaria += minH + marginBottom;
      }
      if(alturaNecesaria > maxAltura) maxAltura = alturaNecesaria;
    }
    // Si no hay eventos, altura mínima 40px
    if(maxAltura === 0) maxAltura = 40;
    // Limitar a 300px máximo para evitar filas descomunales
    if(maxAltura > 300) maxAltura = 300;
    maxAlturaPorFila.push(maxAltura);
  }
  // Aplicar altura a cada fila
  for(var i=0;i<rows.length;i++){
    rows[i].style.height = maxAlturaPorFila[i] + "px";
  }
}

function renderGrid(data){
  var salas = data.salas || data;
  if(!salas || !salas.length){ stopSpinner(); return; }

  var ahora = new Date();
  var ahoraMs = ahora.getTime();
  var hoyTs = onlyDate(ahora);
  var dias = getDaysFromToday(ahora);
  if(dias.length === 0) dias = [new Date(ahora)];

  var map = {};
  for(var i=0;i<salas.length;i++) map[salas[i].nombre] = salas[i];

  // Cabeceras
  var theadTr = document.querySelector("#grid thead tr");
  var viejosHd = theadTr.querySelectorAll(".day-hd");
  for(var i=0;i<viejosHd.length;i++) viejosHd[i].parentNode.removeChild(viejosHd[i]);
  for(var d=0;d<dias.length;d++){
    var fecha = dias[d];
    var esHoy = (onlyDate(fecha) === hoyTs);
    var td = document.createElement("td");
    td.className = "day-hd"+(esHoy?" hoy":"");
    var idx = fecha.getDay();
    var nombreDia = idx===0?"DOM":idx===1?"LUN":idx===2?"MAR":idx===3?"MIÉ":idx===4?"JUE":idx===5?"VIE":"SÁB";
    td.innerHTML = '<span class="dh-nom">'+nombreDia+'</span><span class="dh-fec">'+pad(fecha.getDate())+"/"+pad(fecha.getMonth()+1)+'</span>'+(esHoy?'<span class="hoy-badge">HOY</span>':'');
    theadTr.appendChild(td);
  }

  var tbody = document.getElementById("grid-body");
  tbody.innerHTML = "";

  for(var si=0; si<SALAS.length; si++){
    var nombre = SALAS[si];
    var s = map[nombre];
    var esSala1 = (nombre === "Sala 1");
    var tr = document.createElement("tr");

    var estadoColor = (!esSala1 && s) ? (s.estado==="ocupada"?"#FF7D10":s.estado==="pronto"?"#0047CC":"#1CB85B") : "#888";
    var estadoTxt = (!esSala1 && s) ? (s.estado==="ocupada"?"● Ocupada ahora":s.estado==="pronto"?"● Próxima reserva":"● Disponible") : "";
    var colorBar = COLORES[nombre] || "#0047CC";

    var tdLbl = document.createElement("td");
    tdLbl.className = "sala-lbl";
    tdLbl.innerHTML = '<div style="display:flex; align-items:center; gap:10px;"><div style="width:8px; height:48px; background:'+colorBar+'; border-radius:6px;"></div><div><div class="sala-nombre">'+esc(SHORT[nombre]||nombre)+'</div><div class="sala-estado" style="color:'+estadoColor+'">'+estadoTxt+'</div></div></div>';
    tr.appendChild(tdLbl);

    for(var d=0; d<dias.length; d++){
      var fecha = dias[d];
      var fechaTs = onlyDate(fecha);
      var esHoy2 = (fechaTs === hoyTs);
      var tdCell = document.createElement("td");
      tdCell.className = "day-cell"+(esHoy2?" hoy":"");

      if(esSala1){
        tdCell.innerHTML = '';
      } else {
        var evsDia = [];
        if(s && s.eventosSemana){
          for(var ei=0; ei<s.eventosSemana.length; ei++){
            var ev = s.eventosSemana[ei];
            var evInicio = new Date(ev.inicio);
            var evFin = new Date(ev.fin);
            if(onlyDate(evInicio) !== fechaTs) continue;
            if(esHoy2 && evFin.getTime() <= ahoraMs) continue;
            evsDia.push(ev);
          }
        }
        if(esHoy2 && s){
          if(s.actual && onlyDate(new Date(s.actual.inicio)) === fechaTs) evsDia.push(s.actual);
          if(s.proximas){
            for(var pi=0; pi<s.proximas.length; pi++){
              if(onlyDate(new Date(s.proximas[pi].inicio)) === fechaTs) evsDia.push(s.proximas[pi]);
            }
          }
          // dedup
          var seen = {}, uniq=[];
          for(var ei=0; ei<evsDia.length; ei++) if(!seen[evsDia[ei].inicio]){ seen[evsDia[ei].inicio]=1; uniq.push(evsDia[ei]); }
          evsDia = uniq;
        }

        if(evsDia.length === 0){
          tdCell.innerHTML = '';
        } else {
          evsDia.sort(function(a,b){ return new Date(a.inicio)-new Date(b.inicio); });
          var now = Date.now();
          var muchos = evsDia.length >= 4;
          var html = '<div class="ev-container'+(muchos?" muchos":"")+'">';
          for(var ei=0; ei<evsDia.length; ei++){
            var ev = evsDia[ei];
            var iniMs = new Date(ev.inicio).getTime();
            var finMs = new Date(ev.fin).getTime();
            var cls = "ev-proxima";
            if(iniMs <= now && finMs > now) cls = "ev-ocup";
            else if(iniMs > now && iniMs <= now+1800000) cls = "ev-pronto";
            html += '<div class="ev-bloque '+cls+'"><span class="ev-hora">'+fmtH(ev.inicio)+" – "+fmtH(ev.fin)+'</span>'+(ev.creador?'<span class="ev-user">'+esc(ev.creador)+'</span>':'')+'</div>';
          }
          html += '</div>';
          tdCell.innerHTML = html;
        }
      }
      tr.appendChild(tdCell);
    }
    tbody.appendChild(tr);
  }
  stopSpinner();
  setTimeout(ajustarAlturaFilas, 50);
}

// Redimensionar al cargar y cada cierto tiempo
window.addEventListener('resize', function(){ setTimeout(ajustarAlturaFilas, 100); });
setInterval(ajustarAlturaFilas, 2000);

// JSONP
var cbCount=0;
function cargarDatos(){
  cbCount++; var cn="cb"+cbCount;
  window[cn]=function(data){
    try{ renderGrid(data); }catch(e){}
    try{ var el=document.getElementById("jsonp-script"); if(el) el.remove(); delete window[cn]; }catch(e){}
  };
  var sc=document.createElement("script"); sc.id="jsonp-script"; sc.src=SCRIPT_URL+"?callback="+cn+"&t="+Date.now();
  document.head.appendChild(sc);
}
cargarDatos();
setInterval(cargarDatos, 60000);
</script>
</body>
</html>
