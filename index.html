<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salas de Reunion</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; overflow:hidden;
      background:#090d18; color:#e6e9f0;
      font-family:Arial, Helvetica, sans-serif;
    }

    /* ══ APP ══ */
    .app { display:flex; flex-direction:column; width:100vw; height:100vh; }

    /* ══ HEADER ══ */
    .header {
      flex-shrink:0; height:64px;
      background:#0d1528; border-bottom:2px solid #1c2840;
      display:flex; align-items:center; padding:0 20px; gap:20px;
    }
    .h-logo { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .h-logo img { height:38px; }
    .h-logo-sub { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:#5a6a88; }
    .h-legend { flex:1; display:flex; justify-content:center; gap:24px; }
    .leg-item { display:flex; align-items:center; gap:6px; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#5a6a88; }
    .leg-dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .h-clock  { flex-shrink:0; text-align:right; }
    .clock-lbl  { font-size:9px; letter-spacing:1px; text-transform:uppercase; color:#5a6a88; display:block; }
    .clock-time { font-size:38px; font-weight:700; letter-spacing:4px; color:#fff; line-height:1; display:block; }
    .clock-date { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#5a6a88; margin-top:2px; display:block; }

    /* ══ MAIN ══ */
    .main { flex:1; display:flex; overflow:hidden; min-height:0; padding:10px; gap:10px; }

    /* ══ PLANO ══ */
    .plano {
      flex-shrink:0; width:130px;
      background:#0d1528; border:1px solid #1c2840; border-radius:10px;
      display:flex; flex-direction:column; overflow:hidden;
    }
    .plano-title {
      font-size:9px; letter-spacing:2px; text-transform:uppercase;
      color:#5a6a88; text-align:center; padding:8px 4px;
      border-bottom:1px solid #1c2840; flex-shrink:0;
    }
    .plano-body { flex:1; display:flex; flex-direction:column; padding:8px; gap:5px; min-height:0; }

    /* Villarica ocupa el ancho, salas 1-6 se dividen en dos columnas */
    .plano-villarica {
      flex-shrink:0; height:48px;
      border-radius:6px; border:1.5px solid #1c2840; background:#101623;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    }
    .plano-grid {
      flex:1; display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:repeat(3,1fr);
      gap:5px; min-height:0;
    }
    .plano-room {
      border-radius:6px; border:1.5px solid #1c2840; background:#101623;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
      transition:background .4s, border-color .4s;
    }
    /* Orden en grid: Sala 6 top-left, Sala 5 top-right, etc → abajo-izq Sala 1 */
    /* grid-template: row1=[6,5], row2=[4,3], row3=[2,1]  col1=izq col2=der */
    .plano-room.libre   { background:#0a2e1e; border-color:#00e5a0; }
    .plano-room.ocupada { background:#2e0a10; border-color:#ff4060; }
    .plano-room.pronto  { background:#2e2000; border-color:#ffb800; }
    .plano-villarica.libre   { background:#0a2e1e; border-color:#00e5a0; }
    .plano-villarica.ocupada { background:#2e0a10; border-color:#ff4060; }
    .plano-villarica.pronto  { background:#2e2000; border-color:#ffb800; }

    .pr-name { font-size:10px; font-weight:700; color:#fff; text-align:center; line-height:1.1; }
    .pr-dot  { width:7px; height:7px; border-radius:50%; background:#1c2840; }
    .plano-room.libre   .pr-dot { background:#00e5a0; }
    .plano-room.ocupada .pr-dot { background:#ff4060; }
    .plano-room.pronto  .pr-dot { background:#ffb800; }
    .plano-villarica.libre   .pr-dot { background:#00e5a0; }
    .plano-villarica.ocupada .pr-dot { background:#ff4060; }
    .plano-villarica.pronto  .pr-dot { background:#ffb800; }

    /* ══ CALENDARIO ══ */
    .cal { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }

    /* Cabecera de columnas (salas) */
    .cal-head {
      flex-shrink:0; display:flex;
      padding-left:44px; /* ancho eje horas */
      gap:4px; margin-bottom:4px;
    }
    .col-head {
      flex:1; min-width:0;
      background:#0d1528; border:1px solid #1c2840; border-radius:8px 8px 0 0;
      padding:6px 4px; text-align:center;
    }
    .col-head-name {
      font-size:clamp(10px,1vw,15px); font-weight:700;
      text-transform:uppercase; letter-spacing:1px; color:#fff;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block;
    }
    .col-badge {
      display:inline-block; margin-top:4px;
      padding:2px 8px; border-radius:20px;
      font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    }
    .b-libre   { background:#0a2e1e; color:#00e5a0; border:1px solid #00e5a0; }
    .b-ocupada { background:#2e0a10; color:#ff4060; border:1px solid #ff4060; }
    .b-pronto  { background:#2e2000; color:#ffb800; border:1px solid #ffb800; }
    .b-error   { background:#1a1a1a; color:#888;    border:1px solid #444; }

    /* Grid de horas */
    .cal-grid { flex:1; display:flex; min-height:0; overflow:hidden; }

    .cal-axis {
      flex-shrink:0; width:44px;
      display:flex; flex-direction:column;
    }
    .axis-slot {
      flex:1; display:flex; align-items:flex-start;
      justify-content:flex-end; padding-right:6px;
    }
    .axis-slot span {
      font-size:9px; color:#3a4a62; letter-spacing:1px;
      transform:translateY(-50%); white-space:nowrap;
    }

    .cal-cols { flex:1; display:flex; gap:4px; min-width:0; }
    .cal-col  {
      flex:1; min-width:0; position:relative;
      background:#0d1528; border:1px solid #1c2840; border-radius:0 0 8px 8px;
      overflow:hidden;
    }

    .hour-line { position:absolute; left:0; right:0; height:1px; background:#1c2840; }
    .half-line { position:absolute; left:0; right:0; height:1px; background:#111928; }

    .cal-event {
      position:absolute; left:3px; right:3px;
      border-radius:5px; padding:3px 6px;
      border-left:3px solid transparent; overflow:hidden;
    }
    .cal-event.ocupada { background:rgba(46,10,16,0.9); border-color:#ff4060; }
    .cal-event.pronto  { background:rgba(46,32,0,0.9);  border-color:#ffb800; }
    .cal-event.proxima { background:rgba(10,46,30,0.9); border-color:#00e5a0; }
    .ev-t { font-size:clamp(8px,0.65vw,10px); font-weight:700; display:block; white-space:nowrap; }
    .ev-q { font-size:clamp(9px,0.7vw,11px); color:#e6e9f0; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cal-event.ocupada .ev-t { color:#ff4060; }
    .cal-event.pronto  .ev-t { color:#ffb800; }
    .cal-event.proxima .ev-t { color:#00e5a0; }

    .now-line {
      position:absolute; left:0; right:0; height:2px;
      background:#3b82f6; z-index:10; pointer-events:none;
    }
    .now-dot {
      position:absolute; left:-4px; top:-4px;
      width:10px; height:10px; border-radius:50%; background:#3b82f6;
    }

    /* ══ OVERLAY ══ */
    #overlay {
      position:fixed; inset:0; background:#090d18; z-index:999;
      display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px;
    }
    .spinner { width:38px; height:38px; border:3px solid #1c2840; border-top-color:#3b82f6; border-radius:50%; animation:spin .9s linear infinite; }
    .ov-txt { font-size:10px; color:#5a6a88; letter-spacing:3px; text-transform:uppercase; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<div id="overlay">
  <div class="spinner"></div>
  <span class="ov-txt">Cargando...</span>
</div>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="h-logo">
      <img src="https://i.imgur.com/fXLdGez.png" alt="Logo"/>
      <span class="h-logo-sub">Estado en tiempo real</span>
    </div>
    <div class="h-legend">
      <div class="leg-item"><div class="leg-dot" style="background:#00e5a0"></div>Disponible</div>
      <div class="leg-item"><div class="leg-dot" style="background:#ffb800"></div>Próxima (&lt;30 min)</div>
      <div class="leg-item"><div class="leg-dot" style="background:#ff4060"></div>Ocupada</div>
    </div>
    <div class="h-clock">
      <span class="clock-lbl" id="actTxt">Actualizando...</span>
      <span class="clock-time" id="clkTime">--:--</span>
      <span class="clock-date" id="clkDate">---</span>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- PLANO -->
    <div class="plano">
      <div class="plano-title">Plano de Salas</div>
      <div class="plano-body">
        <!-- Villarica arriba -->
        <div class="plano-villarica" id="pr-villarica">
          <div class="pr-name">Villarica</div>
          <div class="pr-dot"></div>
        </div>
        <!-- Grid 2x3: fila1=[6,5] fila2=[4,3] fila3=[2,1] -->
        <div class="plano-grid">
          <div class="plano-room" id="pr-6"><div class="pr-name">Sala 6</div><div class="pr-dot"></div></div>
          <div class="plano-room" id="pr-5"><div class="pr-name">Sala 5</div><div class="pr-dot"></div></div>
          <div class="plano-room" id="pr-4"><div class="pr-name">Sala 4</div><div class="pr-dot"></div></div>
          <div class="plano-room" id="pr-3"><div class="pr-name">Sala 3</div><div class="pr-dot"></div></div>
          <div class="plano-room" id="pr-2"><div class="pr-name">Sala 2</div><div class="pr-dot"></div></div>
          <div class="plano-room" id="pr-1"><div class="pr-name">Sala 1</div><div class="pr-dot"></div></div>
        </div>
      </div>
    </div>

    <!-- CALENDARIO -->
    <div class="cal">
      <div class="cal-head" id="cal-head"></div>
      <div class="cal-grid">
        <div class="cal-axis" id="cal-axis"></div>
        <div class="cal-cols" id="cal-cols"></div>
      </div>
    </div>

  </div>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyn7VSKT-IFULCC2bPx2SlK2W2GlaXQNoKZ44WLQq5Ev94ESTC45vlJgcpmPgaN_IYQ/exec";

var HORA_INI = 7;
var HORA_FIN = 21;
var TOTAL_H  = HORA_FIN - HORA_INI;

var DIAS  = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
var MESES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

function pad(n){ return n<10?"0"+n:""+n; }

function tickClock(){
  var n = new Date();
  document.getElementById("clkTime").textContent = pad(n.getHours())+":"+pad(n.getMinutes());
  document.getElementById("clkDate").textContent = DIAS[n.getDay()]+" "+pad(n.getDate())+" "+MESES[n.getMonth()]+" "+n.getFullYear();
}
setInterval(tickClock,1000);
tickClock();

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtH(iso){ if(!iso)return"--:--"; var d=new Date(iso); return pad(d.getHours())+":"+pad(d.getMinutes()); }

function horaPct(iso){
  var d = new Date(iso);
  var mins = (d.getHours()-HORA_INI)*60+d.getMinutes();
  return Math.max(0,Math.min(100, mins/(TOTAL_H*60)*100));
}

/* ── EJE HORAS ── */
function buildAxis(){
  var ax = document.getElementById("cal-axis");
  ax.innerHTML = "";
  for(var h=HORA_INI; h<=HORA_FIN; h++){
    var s = document.createElement("div");
    s.className = "axis-slot";
    var lbl = h<12? h+"AM": (h===12?"12PM":(h-12)+"PM");
    s.innerHTML = "<span>"+lbl+"</span>";
    ax.appendChild(s);
  }
}

/* ── LÍNEAS HORA ── */
function buildLines(col){
  for(var h=0; h<=TOTAL_H; h++){
    var pct = h/TOTAL_H*100;
    var l = document.createElement("div");
    l.className = "hour-line"; l.style.top = pct+"%"; col.appendChild(l);
    if(h<TOTAL_H){
      var lh = document.createElement("div");
      lh.className = "half-line"; lh.style.top = (pct+50/TOTAL_H)+"%"; col.appendChild(lh);
    }
  }
}

/* ── LÍNEA AHORA ── */
function buildNow(col){
  var now = new Date();
  var mins = (now.getHours()-HORA_INI)*60+now.getMinutes();
  if(mins<0||mins>TOTAL_H*60) return;
  var pct = mins/(TOTAL_H*60)*100;
  var l = document.createElement("div");
  l.className="now-line"; l.style.top=pct+"%";
  l.innerHTML='<div class="now-dot"></div>';
  col.appendChild(l);
}

/* ── EVENTO ── */
function buildEvent(col, ev, cls){
  var top = horaPct(ev.inicio);
  var bot = horaPct(ev.fin);
  var h   = Math.max(bot-top, 1.5);
  var d   = document.createElement("div");
  d.className = "cal-event "+cls;
  d.style.top    = top+"%";
  d.style.height = h+"%";
  d.innerHTML =
    '<span class="ev-t">'+fmtH(ev.inicio)+"–"+fmtH(ev.fin)+'</span>'+
    (ev.creador?'<span class="ev-q">'+esc(ev.creador)+'</span>':"");
  col.appendChild(d);
}

/* ── PLANO ── */
var PLANO_MAP = {
  "Sala 1":"pr-1","Sala 2":"pr-2","Sala 3":"pr-3",
  "Sala 4":"pr-4","Sala 5":"pr-5","Sala 6":"pr-6",
  "Sala Villarica":"pr-villarica"
};
function updatePlano(salas){
  for(var i=0;i<salas.length;i++){
    var s = salas[i];
    var id = PLANO_MAP[s.nombre];
    if(!id) continue;
    var el = document.getElementById(id);
    if(!el) continue;
    el.className = el.className.replace(/\s*(libre|ocupada|pronto|error)/g,"");
    el.className += " "+(s.estado||"error");
  }
}

/* ── RENDER ── */
function renderGrid(salas){
  if(!salas||!salas.length){ ocultarOverlay(); return; }

  buildAxis();
  updatePlano(salas);

  var head = document.getElementById("cal-head");
  var cols = document.getElementById("cal-cols");
  head.innerHTML = "";
  cols.innerHTML = "";

  for(var i=0;i<salas.length;i++){
    var s = salas[i];
    var bc = s.estado==="libre"?"b-libre":s.estado==="ocupada"?"b-ocupada":s.estado==="pronto"?"b-pronto":"b-error";
    var bt = s.estado==="libre"?"Disponible":s.estado==="ocupada"?"Ocupada":s.estado==="pronto"?"Próxima":"Error";

    /* cabecera */
    var ch = document.createElement("div");
    ch.className = "col-head";
    ch.innerHTML = '<span class="col-head-name">'+esc(s.nombre)+'</span>'
                 + '<span class="col-badge '+bc+'">'+bt+'</span>';
    head.appendChild(ch);

    /* columna */
    var col = document.createElement("div");
    col.className = "cal-col";
    buildLines(col);

    if(s.actual)   buildEvent(col, s.actual, "ocupada");
    if(s.proximas){
      for(var j=0;j<s.proximas.length;j++){
        var ev = s.proximas[j];
        var cls = (new Date(ev.inicio)-Date.now()<30*60*1000)?"pronto":"proxima";
        buildEvent(col, ev, cls);
      }
    }
    buildNow(col);
    cols.appendChild(col);
  }

  var n = new Date();
  document.getElementById("actTxt").textContent = "Act. "+pad(n.getHours())+":"+pad(n.getMinutes())+":"+pad(n.getSeconds());
  ocultarOverlay();
}

function ocultarOverlay(){
  var ov=document.getElementById("overlay");
  if(ov) ov.style.display="none";
}

/* ── JSONP ── */
var cbCount=0;
function cargarDatos(){
  cbCount++;
  var cbName="cb"+cbCount;
  window[cbName]=function(data){
    renderGrid(data.salas||data);
    try{
      var el=document.getElementById("jsonp-script");
      if(el) el.parentNode.removeChild(el);
      delete window[cbName];
    }catch(e){}
  };
  var sc=document.createElement("script");
  sc.id="jsonp-script";
  sc.src=SCRIPT_URL+"?callback="+cbName+"&t="+Date.now();
  document.head.appendChild(sc);
}

cargarDatos();
setInterval(cargarDatos,60000);

/* Refrescar línea de ahora cada minuto */
setInterval(function(){
  document.querySelectorAll(".now-line").forEach(function(l){l.parentNode.removeChild(l);});
  document.querySelectorAll(".cal-col").forEach(buildNow);
},60000);
</script>
</body>
</html>
