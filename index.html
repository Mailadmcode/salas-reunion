<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <title>Salas – Prodalam</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%; overflow:hidden;
      background:#EEF2FB;
      font-family:'Barlow', Arial, sans-serif;
    }

    /* ══ LAYOUT PRINCIPAL ══ */
    #main-wrap {
      width:100%; height:100%;
      display:table;
      table-layout:fixed;
    }

    /* ══ HEADER ══ */
    #header {
      width:100%; height:88px;
      background:#fff;
      border-bottom:6px solid #FF7D10;
      display:table;
      table-layout:fixed;
    }
    .h-logo-zone {
      display:table-cell;
      width:22%;
      vertical-align:middle;
      padding:0 20px;
      border-right:2px solid #E0E8F4;
    }
    .h-logo-inner { display:table; }
    .h-logo-inner td { vertical-align:middle; padding-right:12px; }
    #logo-img { height:48px; display:block; }
    .h-sub {
      font-size:12px; letter-spacing:3px; text-transform:uppercase;
      color:#0047CC; font-weight:800; white-space:nowrap;
      font-family:'Barlow Condensed', sans-serif;
      border-left:3px solid #FF7D10; padding-left:10px;
    }
    .h-legend-zone {
      display:table-cell;
      width:56%;
      vertical-align:middle;
      text-align:center;
    }
    .h-legend-inner { display:inline-table; }
    .h-legend-inner td { vertical-align:middle; padding:0 18px; white-space:nowrap; }
    .leg-dot { width:20px; height:20px; border-radius:50%; display:inline-block; vertical-align:middle; margin-right:8px; }
    .leg-txt {
      font-size:20px; font-weight:800; color:#1A2E6E;
      font-family:'Barlow Condensed', sans-serif; letter-spacing:1px;
      vertical-align:middle;
    }
    .h-clock-zone {
      display:table-cell;
      width:22%;
      vertical-align:middle;
      text-align:right;
      padding:0 20px;
      border-left:2px solid #E0E8F4;
    }
    .clk-meta {
      font-size:11px; letter-spacing:1px; text-transform:uppercase;
      color:#5572A0; display:block; white-space:nowrap;
      font-family:'Barlow Condensed', sans-serif; font-weight:700;
    }
    #clk-time {
      font-size:58px; font-weight:900; letter-spacing:3px;
      color:#0047CC; line-height:1; display:block;
      font-family:'Barlow Condensed', sans-serif;
    }
    #clk-date {
      font-size:13px; letter-spacing:1px; text-transform:uppercase;
      color:#5572A0; display:block; white-space:nowrap;
      font-family:'Barlow Condensed', sans-serif; font-weight:700;
    }

    /* ══ CONTENEDOR TABLA ══ */
    #tabla-wrap {
      width:100%;
      overflow:auto; /* scroll si no caben todas las filas */
      background:#fff;
      border:2px solid #D0DCEE;
      margin:6px 10px 8px 10px;
    }

    /* ══ GRID ══ */
    #grid {
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    /* Cabecera de días */
    #grid thead tr { height:72px; }
    #grid thead td {
      background:#0047CC;
      border-right:1px solid rgba(255,255,255,0.15);
      border-bottom:5px solid #FF7D10;
      text-align:center;
      vertical-align:middle;
      padding:4px 0;
    }
    #grid thead td.corner {
      background:#003399;
      border-right:2px solid rgba(255,255,255,0.2);
      font-size:20px; font-weight:900; letter-spacing:3px;
      text-transform:uppercase; color:#fff;
      font-family:'Barlow Condensed', sans-serif;
      width:200px;
    }
    #grid thead td.day-hd.hoy { background:rgba(255,125,16,0.35); }
    .dh-nom {
      font-size:28px; font-weight:900; text-transform:uppercase;
      letter-spacing:2px; color:#fff; line-height:1;
      font-family:'Barlow Condensed', sans-serif; display:block;
    }
    .dh-fec {
      font-size:16px; color:rgba(255,255,255,0.85);
      font-family:'Barlow Condensed', sans-serif; font-weight:600; display:block; margin-top:1px;
    }
    .hoy-badge {
      display:inline-block; background:#FF7D10; color:#fff;
      font-size:11px; font-weight:900; letter-spacing:1px;
      padding:2px 8px; border-radius:4px; margin-top:2px;
      font-family:'Barlow Condensed', sans-serif;
    }

    /* Filas de salas */
    #grid tbody tr {
      border-bottom:2px solid #E0E8F4;
    }
    #grid tbody tr:last-child { border-bottom:none; }
    /* Filas completamente vacías: altura mínima */
    #grid tbody tr.fila-vacia {
      height: 24px;
    }
    #grid tbody tr.fila-vacia td {
      padding: 0 !important;
      height: 24px;
    }

    /* Celda etiqueta sala */
    td.sala-lbl {
      background:#F4F7FF;
      border-right:3px solid #D8E4F4;
      vertical-align:middle;
      padding:0 12px;
      white-space:nowrap;
      width:200px;
    }
    .sala-lbl-inner { display:table; width:100%; }
    .sala-lbl-inner td { vertical-align:middle; }
    .sala-colorbar {
      width:8px; border-radius:5px;
      display:inline-block; vertical-align:middle;
      margin-right:10px;
    }
    .sala-nombre {
      font-size:28px; font-weight:800; color:#0A1F5C;
      font-family:'Barlow Condensed', sans-serif; line-height:1; display:block;
    }
    .sala-estado {
      font-size:14px; font-weight:700; line-height:1;
      display:block; margin-top:3px;
    }

    /* Celdas de días */
    td.day-cell {
      background:#fff;
      border-right:1px solid #E8EEF8;
      vertical-align:top;
      padding:4px 5px;
      overflow:hidden;
      position:relative;
    }
    td.day-cell.hoy {
      background:#F0F6FF;
      border-left:4px solid #FF7D10;
    }
    /* Celda vacía: sin padding extra, altura automática pequeña */
    td.day-cell.vacia {
      padding: 2px 5px;
    }

    /* ══ BLOQUES DE EVENTOS ══ */
    .ev-container {
      width:100%; height:100%;
      display:block;
    }

    .ev-bloque {
      display:block;
      width:100%;
      border-radius:8px;
      padding: 10px 12px;
      border-left:6px solid transparent;
      margin-bottom:6px;
      overflow:hidden;
      min-height: 68px;
    }

    .ev-ocup    { background:#FFF3EA; border-color:#FF7D10; }
    .ev-pronto  { background:#EBF0FF; border-color:#0047CC; }
    .ev-proxima { background:#EAF7EE; border-color:#1CB85B; }

    .ev-hora {
      font-size: 22px;
      font-weight:900;
      display:block;
      white-space:nowrap;
      font-family:'Barlow Condensed', sans-serif;
      line-height:1.2;
    }
    .ev-ocup .ev-hora    { color:#CC5000; }
    .ev-pronto .ev-hora  { color:#0047CC; }
    .ev-proxima .ev-hora { color:#0A6B30; }

    .ev-user {
      font-size: 18px;
      font-weight:700;
      display:block;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.2;
      margin-top: 4px;
    }
    .ev-ocup .ev-user    { color:#7A3000; }
    .ev-pronto .ev-user  { color:#003099; }
    .ev-proxima .ev-user { color:#0A4A20; }

    /* Muchos eventos */
    .ev-container.muchos .ev-hora { font-size: 18px; }
    .ev-container.muchos .ev-user { font-size: 15px; }
    .ev-container.muchos .ev-bloque { padding: 6px 10px; min-height: 52px; margin-bottom:4px; }

    /* Overlay carga */
    #overlay {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:#EEF2FB; z-index:999;
      text-align:center;
    }
    .ov-inner { display:inline-block; margin-top:40%; }
    .spinner {
      width:56px; height:56px;
      border:7px solid #C8D8F0; border-top:7px solid #0047CC;
      border-radius:50%;
      display:inline-block;
    }
    .ov-txt {
      display:block; margin-top:16px;
      font-size:20px; color:#0047CC; letter-spacing:4px;
      text-transform:uppercase; font-weight:800;
      font-family:'Barlow Condensed', sans-serif;
    }
  </style>
</head>
<body>

<div id="overlay">
  <div class="ov-inner">
    <div class="spinner" id="spinner"></div>
    <span class="ov-txt">Cargando...</span>
  </div>
</div>

<!-- HEADER -->
<div id="header">
  <div class="h-logo-zone">
    <table class="h-logo-inner"><tr>
      <tr><img id="logo-img" src="https://i.imgur.com/fXLdGez.png"
               onerror="this.style.display='none';document.getElementById('logo-txt').style.display='inline';"
               alt="Prodalam"/><span id="logo-txt" style="display:none;font-size:30px;font-weight:900;color:#0047CC;font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;">Prodalam</span></td>
      <tr><span class="h-sub">Tiempo real</span></td>
    </table></table>
  </div>
  <div class="h-legend-zone">
    <table class="h-legend-inner"><tr>
      <tr><span class="leg-dot" style="background:#1CB85B"></span><span class="leg-txt">Disponible</span></td>
      <tr><span class="leg-dot" style="background:#0047CC"></span><span class="leg-txt">Próxima &lt;30 min</span></td>
      <tr><span class="leg-dot" style="background:#FF7D10"></span><span class="leg-txt">Ocupada ahora</span></td>
    </table></table>
  </div>
  <div class="h-clock-zone">
    <span class="clk-meta" id="clk-meta">---</span>
    <span id="clk-time">--:--</span>
    <span id="clk-date">---</span>
  </div>
</div>

<!-- TABLA PRINCIPAL -->
<div id="tabla-wrap">
  <table id="grid">
    <thead>
      <tr>
        <td class="corner">SALA</td>
        <!-- días se insertan por JS -->
      </tr>
    </thead>
    <tbody id="grid-body">
      <!-- filas se insertan por JS -->
    </tbody>
  </table>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyn7VSKT-IFULCC2bPx2SlK2W2GlaXQNoKZ44WLQq5Ev94ESTC45vlJgcpmPgaN_IYQ/exec";

var DIAS_FULL = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
var DIAS_CORT = ["DOM","LUN","MAR","MIÉ","JUE","VIE","SÁB"];
var MESES     = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

// NUEVO ORDEN: Sala 1 arriba, luego 2,3,4,5,6, Villarica abajo
var SALAS  = ["Sala 1","Sala 2","Sala 3","Sala 4","Sala 5","Sala 6","Sala Villarica"];
var SHORT  = {"Sala 1":"Sala 1","Sala 2":"Sala 2","Sala 3":"Sala 3","Sala 4":"Sala 4","Sala 5":"Sala 5","Sala 6":"Sala 6","Sala Villarica":"Villarica"};
var COLORES= {"Sala 1":"#AB47BC","Sala 2":"#29B6F6","Sala 3":"#FF5722","Sala 4":"#26C6A6","Sala 5":"#C6D000","Sala 6":"#00BCD4","Sala Villarica":"#2196F3"};

// ── HELPERS ─────────────────────────────────────────────────
function pad(n){ return n<10?"0"+n:""+n; }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtH(iso){ var d=new Date(iso); return pad(d.getHours())+":"+pad(d.getMinutes()); }
function soloFecha(d){ var x=new Date(d); x.setHours(0,0,0,0); return x.getTime(); }

// Obtener días desde hoy hasta viernes (excluyendo días anteriores)
function getDaysFromTodayToFriday(ahora){
  var hoy = new Date(ahora);
  hoy.setHours(0,0,0,0);
  var diaSemana = hoy.getDay(); // 0 domingo, 1 lunes...
  var dias = [];
  var fecha = new Date(hoy);
  var viernes = new Date(hoy);
  // Calcular el próximo viernes
  var diasHastaViernes = (5 - diaSemana + 7) % 7;
  if (diasHastaViernes === 0 && diaSemana !== 5) diasHastaViernes = 7;
  viernes.setDate(hoy.getDate() + diasHastaViernes);
  
  // Si hoy es sábado o domingo, empezar desde el próximo lunes
  if (diaSemana === 0) { // domingo
    fecha.setDate(hoy.getDate() + 1);
    viernes.setDate(hoy.getDate() + 5);
  } else if (diaSemana === 6) { // sábado
    fecha.setDate(hoy.getDate() + 2);
    viernes.setDate(hoy.getDate() + 6);
  }
  
  while (fecha <= viernes && dias.length < 5) {
    dias.push(new Date(fecha));
    fecha.setDate(fecha.getDate() + 1);
  }
  return dias;
}

// ── SPINNER manual ─────────────────────────────────────────
var spinAngle=0, spinTimer=null;
function startSpinner(){
  var el=document.getElementById("spinner");
  spinTimer=setInterval(function(){
    spinAngle=(spinAngle+15)%360;
    if(el) el.style.cssText="width:56px;height:56px;border:7px solid #C8D8F0;border-top:7px solid #0047CC;border-radius:50%;display:inline-block;-ms-transform:rotate("+spinAngle+"deg);transform:rotate("+spinAngle+"deg);";
  },50);
}
function stopSpinner(){
  if(spinTimer){ clearInterval(spinTimer); spinTimer=null; }
  var ov=document.getElementById("overlay");
  if(ov){ ov.style.display="none"; }
}
startSpinner();

// ── RELOJ ────────────────────────────────────────────────────
function tickClock(){
  var n=new Date();
  document.getElementById("clk-time").innerHTML=pad(n.getHours())+":"+pad(n.getMinutes());
  document.getElementById("clk-date").innerHTML=DIAS_FULL[n.getDay()]+" "+pad(n.getDate())+" "+MESES[n.getMonth()]+" "+n.getFullYear();
  var lun = (function(d){ var x=new Date(d); var dow=x.getDay(); x.setDate(x.getDate()-(dow===0?6:dow-1)); x.setHours(0,0,0,0); return x; })(n);
  var vie = new Date(lun); vie.setDate(lun.getDate()+4);
  document.getElementById("clk-meta").innerHTML=
    "Semana "+pad(lun.getDate())+"/"+pad(lun.getMonth()+1)+" – "+pad(vie.getDate())+"/"+pad(vie.getMonth()+1)
    +"  |  Act. "+pad(n.getHours())+":"+pad(n.getMinutes())+":"+pad(n.getSeconds());
}
setInterval(tickClock,1000); tickClock();

// ── AJUSTAR ALTO DEL WRAP ────────────────────────────────────
function ajustarAlto(){
  var hdr=document.getElementById("header");
  var wrap=document.getElementById("tabla-wrap");
  if(!hdr||!wrap) return;
  var hdrH=hdr.offsetHeight||88;
  var total=window.innerHeight||document.documentElement.clientHeight||768;
  wrap.style.height=(total - hdrH - 20)+"px";
  wrap.style.width=(( window.innerWidth||document.documentElement.clientWidth||1366)-20)+"px";
}
ajustarAlto();
setInterval(ajustarAlto, 2000);

// ── RENDER ───────────────────────────────────────────────────
function renderGrid(data){
  var salasData=data.salas||data;
  if(!salasData||!salasData.length){ stopSpinner(); return; }

  var ahora=new Date();
  var ahoraMs=ahora.getTime();
  var hoyTs=soloFecha(ahora);
  
  // Días a mostrar: desde hoy hasta viernes
  var diasMostrar = getDaysFromTodayToFriday(ahora);
  if(diasMostrar.length===0) diasMostrar = [new Date(ahora)];
  
  // Mapa de datos por sala
  var map={};
  for(var i=0;i<salasData.length;i++) map[salasData[i].nombre]=salasData[i];
  
  // ── Cabeceras días ──
  var theadTr=document.querySelector("#grid thead tr");
  var viejosHd=theadTr.querySelectorAll(".day-hd");
  for(var i=0;i<viejosHd.length;i++) if(viejosHd[i]) viejosHd[i].parentNode.removeChild(viejosHd[i]);
  
  for(var d=0;d<diasMostrar.length;d++){
    var fecha = diasMostrar[d];
    var esHoy=(soloFecha(fecha)===hoyTs);
    var td=document.createElement("td");
    td.className="day-hd"+(esHoy?" hoy":"");
    td.innerHTML='<span class="dh-nom">'+DIAS_CORT[fecha.getDay()]+'</span>'
                +'<span class="dh-fec">'+pad(fecha.getDate())+"/"+pad(fecha.getMonth()+1)+'</span>'
                +(esHoy?'<span class="hoy-badge">HOY</span>':"");
    theadTr.appendChild(td);
  }
  
  // ── Filas salas (con Sala 1 vacía) ──
  var tbody=document.getElementById("grid-body");
  tbody.innerHTML="";
  
  for(var si=0;si<SALAS.length;si++){
    var nombre=SALAS[si];
    var s=map[nombre];
    var esSala1 = (nombre === "Sala 1");
    var tr=document.createElement("tr");
    
    // Determinar si toda la fila está vacía (sin eventos en ningún día mostrado)
    var filaVacia = true;
    if(!esSala1 && s){
      for(var d=0;d<diasMostrar.length;d++){
        var fecha = diasMostrar[d];
        var fechaTs = soloFecha(fecha);
        var tieneEvento = false;
        if(s.eventosSemana){
          for(var ei=0;ei<s.eventosSemana.length;ei++){
            var ev=s.eventosSemana[ei];
            if(soloFecha(new Date(ev.inicio))===fechaTs){
              tieneEvento = true;
              break;
            }
          }
        }
        if(tieneEvento) { filaVacia = false; break; }
      }
    } else if(esSala1){
      filaVacia = true; // Sala 1 siempre vacía
    } else {
      filaVacia = true;
    }
    
    if(filaVacia) tr.className = "fila-vacia";
    
    // Celda etiqueta sala
    var estadoColor = (!esSala1 && s) ? (s.estado==="ocupada"?"#FF7D10":s.estado==="pronto"?"#0047CC":"#1CB85B") : "#888";
    var estadoTxt = (!esSala1 && s) ? (s.estado==="ocupada"?"● Ocupada ahora":s.estado==="pronto"?"● Próxima reserva":"● Disponible") : "";
    var colorBar  = COLORES[nombre]||"#0047CC";
    
    var tdLbl=document.createElement("td");
    tdLbl.className="sala-lbl";
    tdLbl.innerHTML='<div style="display:table;width:100%"><div style="display:table-cell;vertical-align:middle;width:12px;padding-right:10px;">'
      +'<div class="sala-colorbar" style="background:'+colorBar+';height:48px;width:8px;"></div>'
      +'</div><div style="display:table-cell;vertical-align:middle;">'
      +'<span class="sala-nombre">'+esc(SHORT[nombre]||nombre)+'</span>'
      +'<span class="sala-estado" style="color:'+estadoColor+'">'+estadoTxt+'</span>'
      +'</div></div>';
    tr.appendChild(tdLbl);
    
    // Celdas de días (solo los días desde hoy)
    for(var d=0;d<diasMostrar.length;d++){
      var fecha = diasMostrar[d];
      var fechaTs = soloFecha(fecha);
      var esHoy2 = (fechaTs===hoyTs);
      
      var tdCell=document.createElement("td");
      tdCell.className="day-cell"+(esHoy2?" hoy":"");
      
      if(esSala1){
        // Sala 1: siempre vacía
        tdCell.innerHTML = '';
        tdCell.classList.add("vacia");
      } else if(!s){
        tdCell.innerHTML = '';
        tdCell.classList.add("vacia");
      } else {
        var evsDia=[];
        if(s.eventosSemana){
          for(var ei=0;ei<s.eventosSemana.length;ei++){
            var ev=s.eventosSemana[ei];
            if(soloFecha(new Date(ev.inicio))!==fechaTs) continue;
            // Para hoy: filtrar los que ya terminaron
            if(esHoy2 && new Date(ev.fin).getTime()<=ahoraMs) continue;
            evsDia.push(ev);
          }
        }
        if(esHoy2 && s){
          if(s.actual && soloFecha(new Date(s.actual.inicio))===fechaTs) evsDia.push(s.actual);
          if(s.proximas){
            for(var pi=0;pi<s.proximas.length;pi++){
              if(soloFecha(new Date(s.proximas[pi].inicio))===fechaTs) evsDia.push(s.proximas[pi]);
            }
          }
          // deduplicar
          var seen={},uniq=[];
          for(var ei=0;ei<evsDia.length;ei++){
            if(!seen[evsDia[ei].inicio]){seen[evsDia[ei].inicio]=1;uniq.push(evsDia[ei]);}
          }
          evsDia=uniq;
        }
        
        if(evsDia.length===0){
          tdCell.innerHTML = '';
          tdCell.classList.add("vacia");
        } else {
          evsDia.sort(function(a,b){return new Date(a.inicio)-new Date(b.inicio);});
          var now=Date.now();
          var muchos=evsDia.length>=4;
          var html='<div class="ev-container'+(muchos?" muchos":"")+'">';
          for(var ei=0;ei<evsDia.length;ei++){
            var ev=evsDia[ei];
            var iniMs=new Date(ev.inicio).getTime(), finMs=new Date(ev.fin).getTime();
            var cls="ev-proxima";
            if(iniMs<=now && finMs>now) cls="ev-ocup";
            else if(iniMs>now && iniMs<=now+1800000) cls="ev-pronto";
            html+='<div class="ev-bloque '+cls+'">'
                 +'<span class="ev-hora">'+fmtH(ev.inicio)+" – "+fmtH(ev.fin)+'</span>'
                 +(ev.creador?'<span class="ev-user">'+esc(ev.creador)+'</span>':"")
                 +'</div>';
          }
          html+='</div>';
          tdCell.innerHTML=html;
        }
      }
      tr.appendChild(tdCell);
    }
    tbody.appendChild(tr);
  }
  stopSpinner();
}

// ── CARGA DATOS JSONP ────────────────────────────────────────
var cbCount=0;
function cargarDatos(){
  cbCount++; var cn="cb"+cbCount;
  window[cn]=function(data){
    try{ renderGrid(data); }catch(err){ console.warn(err); }
    try{ var el=document.getElementById("jsonp-script"); if(el&&el.parentNode) el.parentNode.removeChild(el); delete window[cn]; }catch(e){}
  };
  var sc=document.createElement("script");
  sc.id="jsonp-script";
  sc.src=SCRIPT_URL+"?callback="+cn+"&t="+Date.now();
  document.getElementsByTagName("head")[0].appendChild(sc);
}
