<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <title>Salas – Prodalam</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700;800&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }

    html, body { width:1920px; height:1080px; overflow:hidden; background:#EEF2FB; font-family:'Barlow',Arial,sans-serif; }

    /* HEADER */
    #header    { position:absolute; left:0; top:0; width:1920px; height:80px; background:#fff; border-bottom:6px solid #FF7D10; box-shadow:0 2px 8px rgba(0,0,0,0.10); }
    #logo-img  { position:absolute; left:24px; top:14px; height:50px; }
    #logo-sub  { position:absolute; left:168px; top:30px; font-size:13px; letter-spacing:3px; text-transform:uppercase; color:#0047CC; font-weight:800; border-left:3px solid #FF7D10; padding-left:14px; font-family:'Barlow Condensed',sans-serif; }
    #leg-dot-d { position:absolute; left:560px;  top:32px; width:22px; height:22px; border-radius:11px; background:#1CB85B; }
    #leg-disp  { position:absolute; left:588px;  top:28px; font-size:22px; font-weight:800; color:#1A2E6E; font-family:'Barlow Condensed',sans-serif; }
    #leg-dot-p { position:absolute; left:760px;  top:32px; width:22px; height:22px; border-radius:11px; background:#0047CC; }
    #leg-prox  { position:absolute; left:788px;  top:28px; font-size:22px; font-weight:800; color:#1A2E6E; font-family:'Barlow Condensed',sans-serif; }
    #leg-dot-o { position:absolute; left:1010px; top:32px; width:22px; height:22px; border-radius:11px; background:#FF7D10; }
    #leg-ocup  { position:absolute; left:1038px; top:28px; font-size:22px; font-weight:800; color:#1A2E6E; font-family:'Barlow Condensed',sans-serif; }
    #clk-time  { position:absolute; right:24px; top:6px;  font-size:60px; font-weight:900; letter-spacing:2px; color:#0047CC; line-height:1; font-family:'Barlow Condensed',sans-serif; }
    #clk-date  { position:absolute; right:24px; top:68px; font-size:13px; letter-spacing:1px; text-transform:uppercase; color:#5572A0; font-family:'Barlow Condensed',sans-serif; font-weight:700; }
    #act-txt   { position:absolute; right:220px; top:68px; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:#5572A0; font-family:'Barlow Condensed',sans-serif; }

    /* TABLA */
    #tabla       { position:absolute; left:10px; top:92px; width:1900px; height:978px; background:#fff; border-radius:12px; border:2px solid #D0DCEE; overflow:hidden; }
    #fila-header { position:absolute; left:0; top:0; width:1900px; height:70px; background:#0047CC; border-bottom:5px solid #FF7D10; }
    #corner      { position:absolute; left:0; top:0; width:200px; height:70px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:#fff; border-right:2px solid rgba(255,255,255,0.15); font-family:'Barlow Condensed',sans-serif; }

    .day-head      { position:absolute; top:0; height:70px; border-right:1px solid rgba(255,255,255,0.12); display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .day-head.hoy  { background:rgba(255,125,16,0.30); }
    .day-head-nom  { font-size:26px; font-weight:900; text-transform:uppercase; letter-spacing:2px; color:#fff; line-height:1; font-family:'Barlow Condensed',sans-serif; }
    .day-head-fec  { font-size:16px; color:rgba(255,255,255,0.80); font-family:'Barlow Condensed',sans-serif; font-weight:600; margin-top:2px; }
    .day-head.hoy .day-head-fec { color:#FFD080; }
    .hoy-badge     { display:inline-block; background:#FF7D10; color:#fff; font-size:10px; font-weight:900; letter-spacing:1px; padding:1px 7px; border-radius:3px; margin-top:3px; font-family:'Barlow Condensed',sans-serif; }

    .sala-row  { position:absolute; left:0; width:1900px; border-bottom:2px solid #E0E8F4; }
    .sala-row:last-child { border-bottom:none; }

    .sala-lbl  { position:absolute; left:0; width:200px; height:100%; background:#F4F7FF; border-right:3px solid #D8E4F4; display:flex; align-items:center; padding:0 14px; gap:10px; }
    .sala-colorbar { width:8px; border-radius:4px; flex-shrink:0; }
    .sala-nombre   { font-size:26px; font-weight:800; color:#0A1F5C; font-family:'Barlow Condensed',sans-serif; line-height:1; display:block; }
    .sala-estado   { font-size:14px; font-weight:700; line-height:1; display:block; margin-top:3px; }

    .day-cell     { position:absolute; height:100%; border-right:1px solid #E8EEF8; background:#fff; overflow:hidden; }
    .day-cell.hoy { background:#F4F8FF; border-left:4px solid #FF7D10; }
    .libre-txt    { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:15px; color:#C8D4E8; font-style:italic; white-space:nowrap; }

    .ev-bloque  { position:absolute; left:6px; right:6px; border-radius:7px; padding:5px 10px; border-left:6px solid transparent; overflow:hidden; display:flex; flex-direction:column; justify-content:center; }
    .ev-ocup    { background:#FFF3EA; border-color:#FF7D10; }
    .ev-pronto  { background:#EBF0FF; border-color:#0047CC; }
    .ev-proxima { background:#EAF7EE; border-color:#1CB85B; }
    .ev-hora    { font-size:17px; font-weight:800; display:block; white-space:nowrap; font-family:'Barlow Condensed',sans-serif; }
    .ev-ocup .ev-hora   { color:#CC5000; }
    .ev-pronto .ev-hora { color:#0047CC; }
    .ev-proxima .ev-hora{ color:#0A6B30; }
    .ev-user    { font-size:15px; font-weight:700; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ev-ocup .ev-user   { color:#7A3000; }
    .ev-pronto .ev-user { color:#003099; }
    .ev-proxima .ev-user{ color:#0A4A20; }

    #overlay { position:fixed; left:0; top:0; width:1920px; height:1080px; background:#EEF2FB; z-index:999; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px; }
    .spinner { width:56px; height:56px; border:6px solid #C8D8F0; border-top-color:#0047CC; border-radius:50%; -webkit-animation:spin .85s linear infinite; animation:spin .85s linear infinite; }
    .ov-txt  { font-size:16px; color:#0047CC; letter-spacing:4px; text-transform:uppercase; font-weight:800; font-family:'Barlow Condensed',sans-serif; }
    @-webkit-keyframes spin { to { -webkit-transform:rotate(360deg); } }
    @keyframes spin { to { transform:rotate(360deg); } }

    .sala-colorbar { height:55%; }
  </style>
</head>
<body>

<div id="overlay"><div class="spinner"></div><span class="ov-txt">Cargando...</span></div>

<div id="header">
  <img id="logo-img" src="https://i.imgur.com/fXLdGez.png" alt="Prodalam"/>
  <span id="logo-sub">Tiempo real</span>
  <div id="leg-dot-d"></div><span id="leg-disp">Disponible</span>
  <div id="leg-dot-p"></div><span id="leg-prox">Próxima &lt;30 min</span>
  <div id="leg-dot-o"></div><span id="leg-ocup">Ocupada ahora</span>
  <span id="clk-time">--:--</span>
  <span id="clk-date">---</span>
  <span id="act-txt"></span>
</div>

<div id="tabla">
  <div id="fila-header"><div id="corner">SALA</div></div>
</div>

<script>
var SCRIPT_URL="https://script.google.com/macros/s/AKfycbyn7VSKT-IFULCC2bPx2SlK2W2GlaXQNoKZ44WLQq5Ev94ESTC45vlJgcpmPgaN_IYQ/exec";
var DIAS_FULL=["Domingo","Lunes","Martes","Miercoles","Jueves","Viernes","Sabado"];
var DIAS_SEM =["Lunes","Martes","Miércoles","Jueves","Viernes"];
var DIAS_CORT=["LUN","MAR","MIÉ","JUE","VIE"];
var MESES    =["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
var SALAS    =["Sala 1","Sala 2","Sala 3","Sala 4","Sala 5","Sala 6","Sala Villarica"];
var COLORES  ={"Sala 1":"#AB47BC","Sala 2":"#29B6F6","Sala 3":"#FF5722","Sala 4":"#26C6A6","Sala 5":"#C6D000","Sala 6":"#00BCD4","Sala Villarica":"#2196F3"};
var SHORT    ={"Sala 1":"Sala 1","Sala 2":"Sala 2","Sala 3":"Sala 3","Sala 4":"Sala 4","Sala 5":"Sala 5","Sala 6":"Sala 6","Sala Villarica":"Villarica"};

var CW=200, TW=1900, TH=978, HH=70, ND=5;
var COLW=Math.floor((TW-CW)/ND);
var NSW=SALAS.length;
var RH=Math.floor((TH-HH)/NSW);

function pad(n){return n<10?"0"+n:""+n;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmtH(iso){var d=new Date(iso);return pad(d.getHours())+":"+pad(d.getMinutes());}
function soloFecha(d){var x=new Date(d);x.setHours(0,0,0,0);return x.getTime();}
function getLunes(f){var d=new Date(f),dow=d.getDay();d.setDate(d.getDate()+(dow===0?-6:1-dow));d.setHours(0,0,0,0);return d;}

function tickClock(){
  var n=new Date();
  document.getElementById("clk-time").innerHTML=pad(n.getHours())+":"+pad(n.getMinutes());
  document.getElementById("clk-date").innerHTML=DIAS_FULL[n.getDay()]+" "+pad(n.getDate())+" "+MESES[n.getMonth()];
}
setInterval(tickClock,1000); tickClock();

function renderGrid(data){
  var salas=data.salas||data;
  if(!salas||!salas.length){ocultarOverlay();return;}
  var ahora=new Date(), ahoraMs=ahora.getTime();
  var lunes=getLunes(ahora), hoyTs=soloFecha(ahora);
  var map={};
  for(var i=0;i<salas.length;i++) map[salas[i].nombre]=salas[i];

  var tabla=document.getElementById("tabla");
  var viejos=tabla.querySelectorAll(".sala-row,.day-head");
  for(var i=0;i<viejos.length;i++) viejos[i].parentNode.removeChild(viejos[i]);

  var fh=document.getElementById("fila-header");
  for(var d=0;d<ND;d++){
    var fecha=new Date(lunes); fecha.setDate(lunes.getDate()+d);
    var esHoy=(soloFecha(fecha)===hoyTs);
    var dh=document.createElement("div");
    dh.className="day-head"+(esHoy?" hoy":"");
    dh.style.left=(CW+d*COLW)+"px";
    dh.style.width=COLW+"px";
    dh.innerHTML='<span class="day-head-nom">'+DIAS_CORT[d]+'</span>'
                +'<span class="day-head-fec">'+pad(fecha.getDate())+"/"+pad(fecha.getMonth()+1)+'</span>'
                +(esHoy?'<span class="hoy-badge">HOY</span>':"");
    fh.appendChild(dh);
  }

  for(var si=0;si<SALAS.length;si++){
    var nombre=SALAS[si], s=map[nombre];
    var row=document.createElement("div");
    row.className="sala-row";
    row.style.top=(HH+si*RH)+"px";
    row.style.height=RH+"px";

    var color=s?(s.estado==="ocupada"?"#FF7D10":s.estado==="pronto"?"#0047CC":"#1CB85B"):"#888";
    var estadoTxt=s?(s.estado==="ocupada"?"● Ocupada ahora":s.estado==="pronto"?"● Próxima reserva":"● Disponible"):"";
    var lbl=document.createElement("div"); lbl.className="sala-lbl";
    var cb=document.createElement("div"); cb.className="sala-colorbar";
    cb.style.background=COLORES[nombre]||"#0047CC";
    var info=document.createElement("div");
    info.innerHTML='<span class="sala-nombre">'+esc(SHORT[nombre]||nombre)+'</span>'
                  +'<span class="sala-estado" style="color:'+color+'">'+estadoTxt+'</span>';
    lbl.appendChild(cb); lbl.appendChild(info);
    row.appendChild(lbl);

    for(var d=0;d<ND;d++){
      var fecha=new Date(lunes); fecha.setDate(lunes.getDate()+d);
      var fechaTs=soloFecha(fecha), esHoy2=(fechaTs===hoyTs);
      var cell=document.createElement("div");
      cell.className="day-cell"+(esHoy2?" hoy":"");
      cell.style.left=(CW+d*COLW)+"px";
      cell.style.width=COLW+"px";

      var evsDia=[];
      if(s&&s.eventosSemana){
        for(var ei=0;ei<s.eventosSemana.length;ei++){
          var ev=s.eventosSemana[ei];
          if(soloFecha(new Date(ev.inicio))!==fechaTs) continue;
          if(esHoy2 && new Date(ev.fin).getTime()<=ahoraMs) continue;
          evsDia.push(ev);
        }
      }

      if(evsDia.length===0){
        var lt=document.createElement("div"); lt.className="libre-txt"; lt.textContent="Sin reservas";
        cell.appendChild(lt);
      } else {
        evsDia.sort(function(a,b){return new Date(a.inicio)-new Date(b.inicio);});
        var EVH=Math.min(Math.floor((RH-8)/evsDia.length),60);
        var now=Date.now();
        for(var ei=0;ei<evsDia.length;ei++){
          var ev=evsDia[ei];
          var iniMs=new Date(ev.inicio).getTime(), finMs=new Date(ev.fin).getTime();
          var cls=iniMs<=now&&finMs>now?"ev-ocup":iniMs>now&&iniMs<=now+1800000?"ev-pronto":"ev-proxima";
          var blk=document.createElement("div");
          blk.className="ev-bloque "+cls;
          blk.style.top=(4+ei*(EVH+3))+"px";
          blk.style.height=EVH+"px";
          blk.innerHTML='<span class="ev-hora">'+fmtH(ev.inicio)+" – "+fmtH(ev.fin)+'</span>'
                       +(ev.creador?'<span class="ev-user">'+esc(ev.creador)+'</span>':"");
          cell.appendChild(blk);
        }
      }
      row.appendChild(cell);
    }
    tabla.appendChild(row);
  }

  var viernes=new Date(lunes); viernes.setDate(lunes.getDate()+4);
  document.getElementById("act-txt").innerHTML=
    "Semana "+pad(lunes.getDate())+"/"+pad(lunes.getMonth()+1)+" – "+pad(viernes.getDate())+"/"+pad(viernes.getMonth()+1);
  ocultarOverlay();
}

function ocultarOverlay(){var ov=document.getElementById("overlay");if(ov)ov.style.display="none";}

var cbCount=0;
function cargarDatos(){
  cbCount++; var cn="cb"+cbCount;
  window[cn]=function(data){
    renderGrid(data);
    try{var el=document.getElementById("jsonp-script");if(el)el.parentNode.removeChild(el);delete window[cn];}catch(e){}
  };
  var sc=document.createElement("script"); sc.id="jsonp-script";
  sc.src=SCRIPT_URL+"?callback="+cn+"&t="+Date.now();
  document.getElementsByTagName("head")[0].appendChild(sc);
}
cargarDatos();
setInterval(cargarDatos,60000);
</script>
</body>
</html>f
