<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#EEF2FB; font-family:'Barlow', Arial, sans-serif; }
    #page-wrap { display:flex; flex-direction:column; width:100%; height:100vh; }

    /* HEADER */
    #header { flex:0 0 auto; height:90px; background:#fff; border-bottom:6px solid #FF7D10; display:table; table-layout:fixed; width:100%; }
    .h-logo-zone { display:table-cell; width:20%; vertical-align:middle; padding:0 20px; border-right:2px solid #E0E8F4; }
    #logo-img { height:48px; }
    .h-legend-zone { display:table-cell; width:46%; vertical-align:middle; text-align:center; }
    .leg-dot { width:18px; height:18px; border-radius:50%; display:inline-block; vertical-align:middle; margin-right:6px; }
    .leg-txt { font-size:18px; font-weight:800; color:#1A2E6E; font-family:'Barlow Condensed'; margin-right:15px; }
    .h-clock-zone { display:table-cell; width:34%; vertical-align:middle; padding:0 20px; border-left:2px solid #E0E8F4; text-align:right; }
    #clk-time { font-size:60px; font-weight:900; color:#0047CC; font-family:'Barlow Condensed'; line-height:1; }

    /* TABLA */
    #tabla-wrap { flex:1; margin:10px; background:#fff; border:2px solid #D0DCEE; display:flex; flex-direction:column; overflow:hidden; }
    #grid { width:100%; height:100%; border-collapse:collapse; table-layout:fixed; }
    
    /* Cabecera */
    #grid thead tr { height:50px; background:#0047CC; color:#fff; }
    #grid thead td { text-align:center; border-right:1px solid rgba(255,255,255,0.2); border-bottom:4px solid #FF7D10; font-family:'Barlow Condensed'; }
    .corner { width:160px; font-weight:900; letter-spacing:2px; }
    
    /* Filas y Celdas */
    #grid tbody tr { border-bottom:1px solid #E0E8F4; transition: height 0.4s ease; }
    .sala-lbl { background:#F4F7FF; border-right:3px solid #D8E4F4; padding:5px 10px; }
    .sala-nombre { font-size:24px; font-weight:800; color:#0A1F5C; font-family:'Barlow Condensed'; display:block; }
    .sala-estado { font-size:12px; font-weight:700; display:block; }
    
    .day-cell { border-right:1px solid #E8EEF8; padding:4px; vertical-align:top; position:relative; }
    .day-cell.hoy { background:#F0F6FF; border-left:2px solid #FF7D10; }

    /* Eventos */
    .ev-container { display:flex; flex-direction:column; gap:2px; height:100%; }
    .ev-bloque { flex:1; border-radius:4px; padding:4px 8px; border-left:4px solid; display:flex; flex-direction:column; justify-content:center; overflow:hidden; }
    .ev-ocup { background:#FFF3EA; border-color:#FF7D10; }
    .ev-pronto { background:#EBF0FF; border-color:#0047CC; }
    .ev-proxima { background:#EAF7EE; border-color:#1CB85B; }
    .ev-hora { font-size:18px; font-weight:900; font-family:'Barlow Condensed'; line-height:1; }
    .ev-user { font-size:14px; font-weight:700; white-space:nowrap; text-overflow:ellipsis; overflow:hidden; }

    #overlay { position:fixed; inset:0; background:#EEF2FB; z-index:99; display:flex; align-items:center; justify-content:center; }
  </style>
</head>
<body>

<div id="overlay"><h1>CARGANDO...</h1></div>

<div id="page-wrap">
  <div id="header">
    <div class="h-logo-zone"><img id="logo-img" src="https://i.imgur.com/fXLdGez.png"></div>
    <div class="h-legend-zone">
      <span class="leg-dot" style="background:#1CB85B"></span><span class="leg-txt">Disponible</span>
      <span class="leg-dot" style="background:#0047CC"></span><span class="leg-txt">Próxima</span>
      <span class="leg-dot" style="background:#FF7D10"></span><span class="leg-txt">Ocupada</span>
    </div>
    <div class="h-clock-zone"><span id="clk-time">00:00</span></div>
  </div>

  <div id="tabla-wrap">
    <table id="grid">
      <thead>
        <tr><td class="corner">SALA</td><td class="day-hd">LUN</td><td class="day-hd">MAR</td><td class="day-hd">MIE</td><td class="day-hd">JUE</td><td class="day-hd">VIE</td></tr>
      </thead>
      <tbody id="grid-body"></tbody>
    </table>
  </div>
</div>

<script>
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyn7VSKT-IFULCC2bPx2SlK2W2GlaXQNoKZ44WLQq5Ev94ESTC45vlJgcpmPgaN_IYQ/exec";
var SALAS = ["Sala Villarica","Sala 6","Sala 5","Sala 4","Sala 3","Sala 2","Sala 1"];
var SHORT = {"Sala Villarica":"Villarica","Sala 1":"Sala 1","Sala 2":"Sala 2","Sala 3":"Sala 3","Sala 4":"Sala 4","Sala 5":"Sala 5","Sala 6":"Sala 6"};

function pad(n){ return n<10?'0'+n:n; }

function ajustarPantalla() {
    var containerH = document.getElementById("tabla-wrap").clientHeight - 50; // Menos cabecera
    var rows = document.querySelectorAll("#grid-body tr");
    if(rows.length === 0) return;

    var pesos = [];
    var totalPeso = 0;
    var MIN_H = 45; // Altura para salas sin reuniones

    // 1. Calcular peso por fila (máximo de reuniones en un día para esa sala)
    for(var i=0; i<rows.length; i++) {
        var celdas = rows[i].querySelectorAll(".ev-bloque");
        // Agrupamos por celda para ver cuál es el día más cargado de esa fila
        var maxInRow = 0;
        var dayCells = rows[i].querySelectorAll(".day-cell");
        for(var c=0; c<dayCells.length; c++) {
            var count = dayCells[c].querySelectorAll(".ev-bloque").length;
            if(count > maxInRow) maxInRow = count;
        }
        
        // Si no tiene reuniones, peso mínimo. Si tiene, peso = cantidad.
        var p = (maxInRow === 0) ? 1 : maxInRow * 2; 
        pesos.push(p);
        totalPeso += p;
    }

    // 2. Aplicar alturas proporcionales
    for(var j=0; j<rows.length; j++) {
        var altura = Math.floor((pesos[j] / totalPeso) * containerH);
        if(altura < MIN_H) altura = MIN_H;
        rows[j].style.height = altura + "px";
        
        // Ajuste fino de fuentes según espacio
        var fontH = Math.min(22, Math.max(14, Math.floor(altura / 4)));
        var labels = rows[j].querySelectorAll(".ev-hora");
        for(var k=0; k<labels.length; k++) labels[k].style.fontSize = fontH + "px";
    }
}

function render(data) {
    var tbody = document.getElementById("grid-body");
    tbody.innerHTML = "";
    var ahora = new Date();
    
    for(var i=0; i<SALAS.length; i++) {
        var sNom = SALAS[i];
        var sData = null;
        for(var x=0; x<data.length; x++) { if(data[x].nombre === sNom) sData = data[x]; }

        var tr = document.createElement("tr");
        // Celda Nombre
        var tdN = document.createElement("td");
        tdN.className = "sala-lbl";
        tdN.innerHTML = '<span class="sala-nombre">'+(SHORT[sNom]||sNom)+'</span>';
        tr.appendChild(tdN);

        // Celdas de días (Lunes a Viernes)
        for(var d=0; d<5; d++) {
            var tdD = document.createElement("td");
            tdD.className = "day-cell";
            
            if(sData && sData.eventosSemana) {
                var html = '<div class="ev-container">';
                var count = 0;
                for(var e=0; e<sData.eventosSemana.length; e++) {
                    var ev = sData.eventosSemana[e];
                    var ini = new Date(ev.inicio);
                    // Solo mostrar si es del día correspondiente (simplificado para el ejemplo)
                    if(ini.getDay() === (d+1)) { 
                        var cls = (new Date(ev.fin) < ahora) ? "hide" : "ev-proxima"; 
                        if(new Date(ev.inicio) <= ahora && new Date(ev.fin) >= ahora) cls = "ev-ocup";
                        
                        html += '<div class="ev-bloque '+cls+'">' +
                                '<span class="ev-hora">'+pad(ini.getHours())+':'+pad(ini.getMinutes())+'</span>' +
                                '<span class="ev-user">'+(ev.creador || '')+'</span></div>';
                        count++;
                    }
                }
                html += '</div>';
                if(count > 0) tdD.innerHTML = html;
            }
            tr.appendChild(tdD);
        }
        tbody.appendChild(tr);
    }
    document.getElementById("overlay").style.display = "none";
    ajustarPantalla();
}

function getData() {
    var cb = "callback_" + Math.floor(Math.random()*100000);
    window[cb] = function(d){ render(d.salas || d); };
    var s = document.createElement("script");
    s.src = SCRIPT_URL + "?callback=" + cb;
    document.head.appendChild(s);
}

setInterval(function(){ 
    var n = new Date();
    document.getElementById("clk-time").innerHTML = pad(n.getHours())+":"+pad(n.getMinutes());
}, 1000);

getData();
setInterval(getData, 300000); // Refresca cada 5 min
window.onresize = ajustarPantalla;
</script>

</body>
</html>
